name: Dependabot Release Label

# Absent-label backstop for Dependabot PRs.
#
# Policy: a dependency bump is at most a project PATCH. Dependencies are not
# shipped in the skill bundle (github-actions is CI infra; requirements-dev.txt
# is dev-only), so a dependency's own semver-major is NOT the project's major.
# `.github/dependabot.yaml` statically labels every PR it opens `release: patch`,
# and that is the final label for every Dependabot PR — this workflow does NOT
# escalate any bump to `release: major`. (It used to, which drove the computed
# release version to a spurious major from CI-only action upgrades.) A bump that
# genuinely warrants a larger project bump is a maintainer call: apply
# `release: minor` / `release: major` by hand and this workflow preserves it.
#
# The only thing this workflow does is BACKFILL `release: patch` when a PR
# carries no `release:` label at all — e.g. a built-in security-update group that
# does not inherit the static label list from `.github/dependabot.yaml`. Without
# it such a PR would fail the required `verify-pr-release-label` check. An
# existing `release:` label (the static default or a maintainer override) is
# always left untouched; the workflow never reclassifies.
#
# Why no update-type classification: the auto-merge hold for semver-major and
# trust-boundary-action bumps does NOT rely on this label — both
# `dependabot-auto-merge.yaml` and `dependabot-reconciler.yaml` gate on the
# Dependabot update-type metadata, independent of the release label. So the label
# carries no hold semantics and never needs to encode the update-type; this
# workflow needs neither `dependabot/fetch-metadata` nor a classifier.
#
# Trigger scope is `opened`/`reopened` only — whether a `release:` label is
# present does not change on a rebase/force-push, so `synchronize` would only
# risk re-fighting a maintainer override. Known benign race: Dependabot's static
# `release: patch` can land just after the `opened` run queries; if the backstop
# already added `release: patch` the two are identical (`--add-label` is
# idempotent, no duplicate), and any other late label is left for
# `verify-pr-release-label` and the maintainer.

on:
  pull_request:
    types:
      - opened
      - reopened

# Queue concurrent runs on the same PR rather than cancel them. The label edit is
# idempotent and runs in 1-2 s.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

# `gh pr edit --add-label` mutates labels through GitHub's issue-labels API (PRs
# are issues for labeling), which can require `issues: write` — `pull-requests:
# write` alone is not reliably sufficient across gh's REST/GraphQL label paths.
# Grant both so the write cannot 403 at runtime; `pull-requests: write` also
# covers the `gh pr view` / `gh pr edit` PR context. The `release:` labels already
# exist, so the create-label path is never exercised.
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  add-release-label:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Backfill release: patch when no release label is present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          # Count existing release: labels. The backstop acts only when none is
          # present; an existing label (the dependabot.yaml static `release: patch`
          # or a maintainer override) is always preserved — never reclassified.
          current_count=$(gh pr view "$PR_URL" --json labels \
            --jq '[.labels[].name | select(startswith("release: "))] | length')

          if [ "$current_count" = "0" ]; then
            echo "No release label present; adding 'release: patch' (a dependency bump is at most a project patch)."
            gh pr edit "$PR_URL" --add-label "release: patch"
          else
            echo "A release label is already present (static default or maintainer override); leaving it untouched."
          fi
