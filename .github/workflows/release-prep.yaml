name: Release prep

# Dispatch-driven release preparation: bumps the version across the
# three manifest files in lockstep, prepends a generated changelog
# section, runs validation/audit/tests, and opens a release PR.  See
# issue #106 for the rationale and CLAUDE.md (Release Process) for the
# post-merge tag/publish flow.

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Semver version to release (X.Y.Z, no leading v, no
          prerelease suffix).  Leave empty to compute the bump from the
          release: labels of PRs merged since the last tag (highest bump
          wins; release: skip contributes nothing).  Pre-releases are
          intentionally not supported by this workflow.
        required: false
        type: string
      dry_run:
        description: >-
          When true, run input validation, bump, changelog generation,
          validate, and audit — but skip pushing the branch, running
          the reusable test matrix, and opening the PR.  Useful to
          verify input correctness and the gates against the current
          main; it does NOT exercise the reusable workflow_call to
          python-tests.yaml or the gh pr create step.
        required: false
        type: boolean
        default: false

# Default the workflow-wide token to read-only so steps that only
# clone, install dependencies, and run scripts cannot accidentally
# push or open a PR.  The two jobs that actually need write scopes
# elevate explicitly via job-level ``permissions`` (``prepare`` writes
# the release branch, ``open-pr`` opens the release PR).
permissions:
  contents: read

# Workflow-wide concurrency: a release-prep PR should land before
# another is opened.  cancel-in-progress: false so a queued dispatch
# does not abort an in-flight one.
concurrency:
  group: release-prep
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Needs write to push the release branch; the rest of the steps
    # (checkout, dependency install, bump, changelog, validate, audit,
    # commit) only read.  Granted at the job level so the workflow-wide
    # default stays read-only.
    permissions:
      contents: write
      # The resolve step's ``gh pr list`` reads merged-PR labels when the
      # version is computed from labels; everything else in the job only
      # reads or writes repository contents.
      pull-requests: read
    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: main
          # Full history so the resolve step and 'generate_changelog.py'
          # can reach the previous release tag (the version window and the
          # changelog range).
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # @v5 as 6.2.0
        with:
          python-version: '3.12'

      - name: Resolve release version
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
          # GITHUB_TOKEN with pull-requests: read is enough for the
          # 'gh pr list' the compute path runs against this repo.
          GH_TOKEN: ${{ github.token }}
        # An explicit dispatch version wins (the override). When the input
        # is empty, compute_release_version.py derives the bump from the
        # release: labels of PRs merged since the last tag and prints the
        # X.Y.Z to stdout (its decision summary and any fail-and-list go to
        # stderr; a non-zero exit aborts the step here). Either way the
        # resolved version is validated against bump_version.py's strict
        # SemVer core grammar before it becomes the branch name and the
        # bump argument.
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
            echo "Using explicit dispatch version: $VERSION"
          else
            echo "No version input; computing from release: labels since the last tag."
            VERSION="$(python scripts/compute_release_version.py)"
          fi
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::resolved version must match ^(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)$ (X.Y.Z, no leading zeros, no leading v, no prerelease); got '$VERSION'"
            exit 1
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "branch=release/v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      # No ``pip install`` step: ``compute_release_version.py``,
      # ``bump_version.py``, ``generate_changelog.py``, ``validate_skill.py``,
      # and ``audit_skill_system.py`` are stdlib-only (a non-negotiable
      # repository constraint).  ``coverage`` is the only dev dependency
      # and is exercised by the reusable ``python-tests.yaml``, which
      # runs in its own ``contents: read`` job.  Skipping the install
      # here keeps third-party package execution out of the
      # ``contents: write`` prepare job.

      - name: Abort if release branch exists on remote
        env:
          BRANCH: ${{ steps.resolve.outputs.branch }}
        run: |
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" >/dev/null 2>&1; then
            echo "::error::remote branch '$BRANCH' already exists; another release prep is in flight or a previous one was not cleaned up."
            exit 1
          fi
          echo "Remote branch '$BRANCH' is free."

      - name: Create release branch
        env:
          BRANCH: ${{ steps.resolve.outputs.branch }}
        run: git checkout -b "$BRANCH"

      - name: Bump version
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        # ``bump_version.py`` is the single writer for both the manifest
        # files and ``CHANGELOG.md``: it updates SKILL.md / plugin.json /
        # marketplace.json in lockstep, then invokes
        # ``generate_changelog.py --in-place`` to prepend the new
        # section.  The previous-tag, until-ref, and date are derived
        # internally from the manifest's current version, ``HEAD``, and
        # today (UTC), so we do not run ``git describe`` ourselves and
        # do not call the changelog generator a second time — a second
        # ``--in-place`` invocation would trip the duplicate-section
        # guard once a section for ``$VERSION`` is already present.
        run: python scripts/bump_version.py "$VERSION"

      - name: Extract release section for PR body
        # Pull the section ``bump_version.py`` just prepended out of
        # ``CHANGELOG.md`` (everything from the first ``## [`` heading
        # up to — but not including — the next one).  Written outside
        # the workspace so the later ``git add -A`` cannot accidentally
        # stage the artifact alongside the bump.
        run: |
          awk '
            /^## \[/ { count++; if (count == 2) exit }
            count >= 1 { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/pr-body-section.md"
          if [[ ! -s "$RUNNER_TEMP/pr-body-section.md" ]]; then
            echo "::error::could not extract release section from CHANGELOG.md; bump_version.py did not prepend a section."
            exit 1
          fi
          echo "--- extracted ---"
          cat "$RUNNER_TEMP/pr-body-section.md"

      - name: Validate skill (foundry self)
        working-directory: skill-system-foundry
        run: python scripts/validate_skill.py . --allow-nested-references --foundry-self

      - name: Audit skill system (repo root, includes version-drift rule)
        # One warning about a missing 'skills/' directory is expected
        # in this distribution repository (per CLAUDE.md, distribution-
        # repo mode).  The audit script exits 0 on warnings and
        # non-zero only on LEVEL_FAIL findings, so the warning does
        # not fail the step.
        run: python skill-system-foundry/scripts/audit_skill_system.py .

      - name: Dry-build the release bundle
        # Prove the distribution bundle builds, passes the yaml-conformance
        # exclusion check, AND that the checksum write/self-verify path succeeds
        # BEFORE any release tag is cut.  release.yaml runs the same
        # .github/scripts/build-skill-bundle.sh with CHECKSUM_PATH set at publish
        # time, so CHECKSUM_PATH is set here too — otherwise the helper takes the
        # early exit and the checksum branch would stay untested until after the
        # immutable tag is pushed.  A green dry-build here means the post-merge
        # build cannot fail and burn the tag.  Output goes to RUNNER_TEMP so the
        # git add -A below never stages it.
        run: BUNDLE_PATH="$RUNNER_TEMP/dry-build.zip" CHECKSUM_PATH="$RUNNER_TEMP/dry-build.zip.sha256" bash .github/scripts/build-skill-bundle.sh

      - name: Commit release bump
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          git add -A
          git commit -m "Release v$VERSION"

      - name: Push release branch
        if: ${{ ! inputs.dry_run }}
        env:
          BRANCH: ${{ steps.resolve.outputs.branch }}
        run: git push origin "$BRANCH"

      - name: Upload PR body artifact
        if: ${{ ! inputs.dry_run }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # @v4 as 7.0.1
        with:
          name: release-pr-body
          path: ${{ runner.temp }}/pr-body-section.md
          if-no-files-found: error

  test:
    needs: prepare
    if: ${{ ! inputs.dry_run }}
    # python-tests.yaml is contents:read-only now (badge publishing moved to the
    # separate coverage-badge.yaml), so the reusable call needs no more than
    # read. A called workflow's jobs cannot request more permission than the
    # caller grants, and GitHub validates that cap at startup.
    permissions:
      contents: read
    uses: ./.github/workflows/python-tests.yaml
    with:
      ref: ${{ needs.prepare.outputs.branch }}

  open-pr:
    needs: [prepare, test]
    if: ${{ ! inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Two-identity auto-merge, mirroring the fleet pattern in
    # milanhorvatovic/codex-ai-code-review-action.  ``GITHUB_TOKEN`` stays
    # read-only: oss-release-bot opens the PR (so its push/pull_request events
    # trigger the required CI — GitHub does not fire downstream workflows for
    # ``GITHUB_TOKEN``-authored events) and oss-automation-bot submits the
    # approving review (a bot cannot approve its own PR, so a second identity is
    # required to satisfy ``required_approving_review_count: 1``).  GitHub then
    # enforces the ruleset normally — no admin bypass — and squash-merges on
    # green via ``gh pr merge --auto``.
    permissions:
      contents: read
    steps:
      - name: Mint release App token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # @v3 as 3.2.0
        with:
          client-id: ${{ vars.RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: main

      - name: Download PR body artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # @v4 as 8.0.1
        with:
          name: release-pr-body
          path: ${{ runner.temp }}

      - name: Compose PR body
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          PREP_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "Prepared by [release-prep run]($PREP_RUN_URL) and opened by oss-release-bot so CI fires automatically."
            echo
            echo "## Changelog section"
            echo
            cat "$RUNNER_TEMP/pr-body-section.md"
            echo
            echo "## Automated flow"
            echo
            echo "oss-automation-bot approves this PR, then GitHub auto-merges (squash) once the required checks pass.  On merge, \`release-on-merge.yaml\` tags \`v$VERSION\`, and the tag push triggers \`release.yaml\`, which builds the zip bundle + SHA256 checksum and creates the GitHub Release with both attached at creation (immutable-safe)."
            echo
            echo "If Copilot leaves an unresolved review thread, auto-merge waits until it is resolved.  To halt the release entirely, close this PR before the checks turn green."
            echo
            echo "## Optional follow-up"
            echo
            echo "- Review version prose in \`.agents/skills/git-release/SKILL.md\` if any examples reference an outdated release."
          } > "$RUNNER_TEMP/pr-body.md"

      - name: Open release PR (oss-release-bot)
        id: open
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BRANCH: ${{ needs.prepare.outputs.branch }}
        # The release PR is labeled ``release: skip`` in a later step under the
        # automation App, not here with ``gh pr create --label``: label writes go
        # through GitHub's issue-labels API and need ``issues: write``, which
        # oss-release-bot does not have (oss-automation-bot does).
        run: |
          set -euo pipefail
          url=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release v$VERSION" \
            --body-file "$RUNNER_TEMP/pr-body.md")
          echo "Opened $url"
          number=$(gh pr view "$url" --json number --jq '.number')
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Mint automation App token
        id: automation-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # @v3 as 3.2.0
        with:
          client-id: ${{ vars.AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_PRIVATE_KEY }}

      - name: Self-label the release PR (oss-automation-bot)
        env:
          GH_TOKEN: ${{ steps.automation-token.outputs.token }}
          PR_NUMBER: ${{ steps.open.outputs.number }}
        # Label the release PR ``release: skip`` so it carries exactly one release
        # label for the (eventually-required) verify-pr-release-label gate without
        # counting toward the next computed version — compute already excludes it
        # from the window by commit membership, so this is for the gate, not the
        # version math.  Done under the automation App because label writes go
        # through GitHub's issue-labels API and need ``issues: write``, which
        # oss-automation-bot has and oss-release-bot does not.
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" --add-label "release: skip"

      - name: Approve release PR (oss-automation-bot)
        env:
          GH_TOKEN: ${{ steps.automation-token.outputs.token }}
          PR_NUMBER: ${{ steps.open.outputs.number }}
        # A second identity satisfies the ruleset's one-approval requirement; the
        # release PR touches only manifests + CHANGELOG (no CODEOWNER-owned path),
        # so an App approval is sufficient — no code-owner PAT needed.
        run: |
          set -euo pipefail
          gh pr review --approve \
            --body "Auto-approved by the release-prep workflow (oss-automation-bot) so the release PR can auto-merge on green." \
            "$PR_NUMBER"

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ steps.automation-token.outputs.token }}
          PR_NUMBER: ${{ steps.open.outputs.number }}
        run: |
          set -euo pipefail
          gh pr merge --auto --squash --delete-branch "$PR_NUMBER"
