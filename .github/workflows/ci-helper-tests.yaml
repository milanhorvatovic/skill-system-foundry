name: CI helper tests

# Runs the unittest suite under ``.github/tests/`` against the helper
# scripts under ``.github/scripts/``.  Kept separate from
# ``python-tests.yaml`` (which covers the meta-skill itself) so
# helper checks stay isolated from the meta-skill matrix and helper
# failures surface as their own clear signal in PR checks.  Note
# that ``python-tests.yaml`` runs on every PR with no path filter,
# so the meta-skill matrix still exercises any change that touches
# its tree — the isolation here is about scope/clarity, not skipping.
#
# The path filter includes ``configuration.yaml`` because the helper
# test suite has a real-configuration canary that reads the live
# catalog schema; a PR that edits the catalog without touching the
# helper or its tests must still run this suite.  It also includes
# ``tool-catalog-drift.yaml`` because that workflow is the only
# production caller of the helper — it owns the CLI-flag, output
# file, and JSON-parsing contract — so a change there is part of
# the integration surface this suite covers.

on:
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/tests/**"
      - ".github/workflows/ci-helper-tests.yaml"
      - ".github/workflows/tool-catalog-drift.yaml"
      - "skill-system-foundry/scripts/lib/configuration.yaml"
  push:
    branches: [main]
    paths:
      - ".github/scripts/**"
      - ".github/tests/**"
      - ".github/workflows/ci-helper-tests.yaml"
      - ".github/workflows/tool-catalog-drift.yaml"
      - "skill-system-foundry/scripts/lib/configuration.yaml"

permissions:
  contents: read

jobs:
  helper-tests:
    # Matrix mirrors ``python-tests.yaml`` so the helper test surface
    # is exercised on the same OS/Python pair as the meta-skill.  The
    # helper script uses portable APIs (os.path, tempfile, open with
    # explicit encoding and newline) and the test suite already runs
    # locally on POSIX; running on windows-latest closes the
    # cross-platform contract gap without expanding scope.
    #
    # Job id is ``helper-tests`` (not ``test``) so this workflow's
    # check contexts (``helper-tests (ubuntu-latest, 3.12)`` and
    # ``helper-tests (windows-latest, 3.12)``) are distinct from
    # ``python-tests.yaml``'s ``test (...)`` contexts.  GitHub
    # registers the context as the bare job-name + matrix suffix,
    # so reusing the ``test`` id would produce duplicate context
    # names across workflows and leave branch protection unable to
    # cleanly distinguish meta-skill vs helper failures (raised in
    # PR #143 review by both Codex and Copilot).
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # @v6 as 6.0.3

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # @v5 as 7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run helper test suite
        run: python -m unittest discover -s .github/tests -p "test_*.py" -v
        env:
          PYTHONUTF8: "1"
