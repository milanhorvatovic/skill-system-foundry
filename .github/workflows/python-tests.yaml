name: Python tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      ref:
        description: >-
          Git ref (branch, tag, or commit SHA) to check out for testing.
          When empty (or unset, as on push/pull_request), checkout falls
          back to ``github.sha`` so the triggering commit is tested.
          Used by release-prep.yml to test the bumped release branch
          before opening the release PR.
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          # ``inputs.ref`` is only populated by ``workflow_call``; on
          # push/pull_request runs it evaluates to empty.  Passing an
          # empty ``ref:`` to actions/checkout falls back to the
          # repository's default branch instead of the triggering
          # commit, which on a PR would test ``main`` instead of the
          # PR head.  Fall back to ``github.sha`` so push/PR runs
          # check out the triggering revision and ``workflow_call``
          # callers (release-prep.yml) still get the ref they passed.
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # @v5 as 5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        id: run-tests
        run: python -m coverage run -m unittest discover -s tests -p "test_*.py" -v
        env:
          PYTHONUTF8: "1"

      - name: Generate coverage JSON
        run: python -m coverage json

      - name: Check per-file coverage
        # Coverage thresholds are enforced against the Ubuntu run only;
        # Windows numbers are advisory because branch coverage can vary
        # with platform-conditional code paths.
        if: matrix.os == 'ubuntu-latest'
        run: |
          python .github/scripts/check-per-file-coverage.py \
            --file-threshold skill-system-foundry/scripts/lib/prose_yaml.py=90 \
            --file-threshold skill-system-foundry/scripts/yaml_conformance_report.py=90 \
            --file-threshold skill-system-foundry/scripts/lib/yaml_conformance_runner.py=90 \
            --file-threshold .github/scripts/preflight-yaml-upgrade.py=90 \
            --file-threshold .github/scripts/refresh-yaml-corpus-digests.py=90 \
            --file-threshold .github/scripts/verify-action-pins.py=90

      - name: Generate coverage HTML report
        if: always() && steps.run-tests.outcome != 'skipped'
        run: python -m coverage html

      - name: Upload coverage report
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4 as 4.6.2
        with:
          name: coverage-report-${{ matrix.os }}
          path: htmlcov/

      - name: Write coverage total
        if: matrix.os == 'ubuntu-latest'
        run: |
          TOTAL_RAW=$(python -m coverage report --format=total --fail-under=0)
          TOTAL_STRIPPED=${TOTAL_RAW%\%}
          printf '%.0f\n' "$TOTAL_STRIPPED" > coverage-total.txt

      - name: Upload coverage total
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4 as 4.6.2
        with:
          name: coverage-total
          path: coverage-total.txt

      - name: Check coverage threshold
        run: python -m coverage report

  validate-examples:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # @v5 as 5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate reference examples
        run: python .github/scripts/validate-examples.py
        env:
          PYTHONUTF8: "1"

  update-badge:
    needs:
      - test
      - validate-examples
    # Restrict to genuine pushes to main; this skips reusable
    # workflow_call invocations (e.g. release-prep.yml) where
    # github.event_name is the caller's event (workflow_dispatch) and
    # the badge must not be updated from a release branch's coverage.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: update-badge-main
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Download coverage total
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # @v4 as 4.3.0
        with:
          name: coverage-total

      - name: Update coverage badge
        run: |
          TOTAL=$(cat coverage-total.txt)
          export TOTAL
          bash .github/scripts/update-coverage-badge.sh
