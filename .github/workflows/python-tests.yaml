name: Python tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    outputs:
      coverage-total: ${{ steps.coverage-total.outputs.total }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # @v5 as 5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: python -m coverage run -m unittest discover -s tests -p "test_*.py" -v
        env:
          PYTHONUTF8: "1"

      - name: Generate coverage HTML report
        run: python -m coverage html

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4 as 4.6.2
        with:
          name: coverage-report-${{ matrix.os }}
          path: htmlcov/

      - name: Check coverage threshold
        run: python -m coverage report

      - name: Extract coverage total
        id: coverage-total
        if: matrix.os == 'ubuntu-latest'
        run: |
          TOTAL=$(python -m coverage report --format=total)
          echo "total=${TOTAL%%.*}" >> $GITHUB_OUTPUT

  update-badge:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: main

      - name: Update coverage badge
        env:
          TOTAL: ${{ needs.test.outputs.coverage-total }}
        run: bash .github/scripts/update-coverage-badge.sh
