name: Python tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      ref:
        description: >-
          Git ref (branch, tag, or commit SHA) to check out for testing.
          When empty (or unset, as on push/pull_request), checkout falls
          back to ``github.sha`` so the triggering commit is tested.
          Used by release-prep.yaml to test the bumped release branch
          before opening the release PR.
        required: false
        type: string
        default: ''

permissions:
  contents: read

# Concurrency: PR runs share a ref-based group so a new push to the PR cancels
# the superseded run. Push-to-main and workflow_call (release-prep) runs instead
# get a unique per-run group, so they neither cancel nor queue behind each other
# — a shared group on refs/heads/main would serialize mainline CI and delay the
# coverage-badge workflow_run that fires on a successful push run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # 3.12 is the required floor — only the (ubuntu, 3.12) and
        # (windows, 3.12) contexts are listed as required status checks
        # in the main ruleset. 3.13 and 3.14 are advisory (non-required)
        # forward-compat signals exercising the project's "3.12+" claim.
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # @v6 as 6.0.3
        with:
          # ``inputs.ref`` is only populated by ``workflow_call``; on
          # push/pull_request runs it evaluates to empty.  Passing an
          # empty ``ref:`` to actions/checkout falls back to the
          # repository's default branch instead of the triggering
          # commit, which on a PR would test ``main`` instead of the
          # PR head.  Fall back to ``github.sha`` so push/PR runs
          # check out the triggering revision and ``workflow_call``
          # callers (release-prep.yaml) still get the ref they passed.
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # @v5 as 6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        id: run-tests
        run: python -m coverage run -m unittest discover -s tests -p "test_*.py" -v
        env:
          PYTHONUTF8: "1"

      - name: Generate coverage JSON
        # Only the 3.12 floor feeds the per-file coverage check below.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python -m coverage json

      - name: Check per-file coverage
        # Coverage thresholds are enforced against the Ubuntu 3.12 floor only;
        # Windows numbers are advisory because branch coverage can vary
        # with platform-conditional code paths, and 3.13/3.14 are advisory
        # forward-compat signals.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python .github/scripts/check-per-file-coverage.py \
            --file-threshold skill-system-foundry/scripts/lib/prose_yaml.py=90 \
            --file-threshold skill-system-foundry/scripts/yaml_conformance_report.py=90 \
            --file-threshold skill-system-foundry/scripts/lib/yaml_conformance_runner.py=90 \
            --file-threshold .github/scripts/preflight-yaml-upgrade.py=90 \
            --file-threshold .github/scripts/refresh-yaml-corpus-digests.py=90 \
            --file-threshold .github/scripts/verify-action-pins.py=90 \
            --file-threshold skill-system-foundry/scripts/lib/description_eval.py=90 \
            --file-threshold skill-system-foundry/scripts/evaluate_descriptions.py=90

      - name: Generate coverage HTML report
        # Gated to the 3.12 floor so the per-OS artifact name below
        # stays unique across the matrix — upload-artifact@v4 rejects
        # duplicate names within a run.
        if: always() && steps.run-tests.outcome != 'skipped' && matrix.python-version == '3.12'
        run: python -m coverage html

      - name: Upload coverage report
        if: always() && steps.run-tests.outcome != 'skipped' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # @v4 as 7.0.1
        with:
          name: coverage-report-${{ matrix.os }}
          path: htmlcov/

      - name: Write coverage total
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          TOTAL_RAW=$(python -m coverage report --format=total --fail-under=0)
          TOTAL_STRIPPED=${TOTAL_RAW%\%}
          printf '%.0f\n' "$TOTAL_STRIPPED" > coverage-total.txt

      - name: Upload coverage total
        # Gated to the 3.12 floor so the fixed artifact name stays
        # unique across the matrix; coverage-badge.yaml downloads this
        # exact name from the triggering run.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # @v4 as 7.0.1
        with:
          name: coverage-total
          path: coverage-total.txt

      - name: Check coverage threshold
        # Applies .coveragerc fail_under on every matrix cell as a
        # cross-version regression gate; no artifact, so no collision.
        run: python -m coverage report

  validate-examples:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # @v6 as 6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # @v5 as 6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate reference examples
        run: python .github/scripts/validate-examples.py
        env:
          PYTHONUTF8: "1"

      - name: Evaluate skill descriptions (heuristic, soft)
        working-directory: skill-system-foundry
        run: >
          python scripts/evaluate_descriptions.py
          ../tests/skill-corpus/skill-system-foundry
          --skill-set . --soft --json
        env:
          PYTHONUTF8: "1"

      - name: Audit corpus coverage (repo root)
        # The corpus-coverage rules fire only at the repo root, where
        # tests/skill-corpus resolves and discover_units finds the
        # meta-skill.  One "No skills/ directory" WARN is expected here
        # (distribution-repo mode); the audit exits 0 on warnings and
        # non-zero only on LEVEL_FAIL (e.g. an undersized committed
        # corpus), so coverage drift surfaces on every PR per CLAUDE.md.
        run: python skill-system-foundry/scripts/audit_skill_system.py .
        env:
          PYTHONUTF8: "1"

  reference-conformance:
    # Gates the meta-skill's link graph against the file-relative
    # path-resolution rule (see skill-system-foundry/references/path-resolution.md).
    # The report exits non-zero if any internal link fails to resolve
    # under standard markdown semantics or any markdown file under the
    # skill is unreachable from SKILL.md / capability.md roots.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # @v6 as 6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # @v5 as 6.2.0
        with:
          python-version: "3.12"

      - name: Reference conformance report
        run: |
          cd skill-system-foundry
          python scripts/reference_conformance_report.py . --verbose
        env:
          PYTHONUTF8: "1"

  bundle-extract-smoke:
    # Build a synthetic minimal skill, bundle it, extract the
    # resulting zip into a fresh location, and validate the
    # extracted tree.  Exercises the full bundle.py + validate_skill.py
    # pipeline on both runners so cross-platform regressions in path
    # handling, long-path arcnames, and case semantics surface here
    # rather than at user-extract time on a Windows machine.
    #
    # Scope: this is primarily a *pipeline-integrity* smoke test:
    # scaffold → bundle → extract → validate must stay green on both
    # runners.  A companion helper also creates tiny negative
    # fixtures for the two cross-platform failures the PR summary
    # calls out most directly (wrong-cased references and long
    # archive arcnames) so those surfaces are exercised in this
    # workflow without making the happy-path bundle step fail.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # @v6 as 6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # @v5 as 6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Scaffold a synthetic skill
        # Uses scaffold.py to build a complete minimal skill in a
        # work directory outside the repo so the bundle pipeline
        # exercises a layout with no foundry-specific quirks.  The
        # scaffolded SKILL.md ships with a placeholder description
        # longer than the 200-char Claude.ai cap, so the next step
        # rewrites the frontmatter description to a short stub —
        # the smoke test then exercises bundle.py's default
        # ``--target claude`` (the most-shipped consumer target),
        # not the more permissive ``generic`` mode.
        run: |
          python skill-system-foundry/scripts/scaffold.py skill demo --root smoke-work
        env:
          PYTHONUTF8: "1"

      - name: Replace scaffolded frontmatter with bundle-able stub
        # The scaffolded SKILL.md uses a YAML folded scalar for the
        # description that exceeds the Claude.ai 200-char cap, so the
        # bundle pipeline rejects it under ``--target claude``.  The
        # rewrite is delegated to ``smoke-rewrite-frontmatter.py``
        # rather than embedded inline because shell-escape semantics
        # for the embedded ``\"\"`` and ``\n`` literals differ between
        # bash on ubuntu and PowerShell on windows-latest — a quoted
        # ``python -c`` one-liner was brittle on cross-shell parsing.
        # The helper file documents the stub's frontmatter coverage
        # surface inline.
        run: |
          python .github/scripts/smoke-rewrite-frontmatter.py smoke-work/skills/demo/SKILL.md
        env:
          PYTHONUTF8: "1"

      - name: Exercise cross-platform negative fixtures
        # Keeps the happy-path bundle smoke focused on a valid skill,
        # while still proving the workflow would catch the
        # case-exact and long-path regressions it is meant to guard.
        # The Python helper avoids shell-specific heredoc quoting
        # across bash and PowerShell.
        run: |
          python .github/scripts/smoke-cross-platform-fixtures.py
        env:
          PYTHONUTF8: "1"

      - name: Bundle the synthetic skill
        # Default target is ``claude`` — the most-shipped consumer
        # platform — so the smoke job catches regressions in the
        # Claude.ai-specific tightenings rather than only the
        # permissive ``generic`` mode.
        run: |
          python skill-system-foundry/scripts/bundle.py smoke-work/skills/demo --output smoke-bundle.zip
        env:
          PYTHONUTF8: "1"

      - name: Extract the bundle
        # Use Python's stdlib zipfile so the same step runs on both
        # runners without depending on a host unzip implementation.
        run: |
          python -c "import zipfile; zipfile.ZipFile('smoke-bundle.zip').extractall('smoke-extracted')"
        env:
          PYTHONUTF8: "1"

      - name: Validate the extracted bundle
        # Walks the extracted tree.  bundle.py emits the skill under
        # its own basename inside the archive, so the helper
        # resolves the discovered SKILL.md and validates from
        # there.  The Python helper avoids cross-shell escaping
        # in a multi-statement ``python -c`` block (bash on
        # ubuntu vs. PowerShell on windows-latest) and surfaces a
        # clear failure when no top-level directory contains a
        # SKILL.md, instead of crashing with a ``TypeError`` from
        # passing ``None`` into ``subprocess.call``.
        run: |
          python .github/scripts/smoke-validate-extracted.py smoke-extracted skill-system-foundry/scripts/validate_skill.py
        env:
          PYTHONUTF8: "1"
