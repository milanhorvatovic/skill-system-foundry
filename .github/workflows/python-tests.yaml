name: Python tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      ref:
        description: >-
          Git ref (branch, tag, or commit SHA) to check out for testing.
          When empty (or unset, as on push/pull_request), checkout falls
          back to ``github.sha`` so the triggering commit is tested.
          Used by release-prep.yml to test the bumped release branch
          before opening the release PR.
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          # ``inputs.ref`` is only populated by ``workflow_call``; on
          # push/pull_request runs it evaluates to empty.  Passing an
          # empty ``ref:`` to actions/checkout falls back to the
          # repository's default branch instead of the triggering
          # commit, which on a PR would test ``main`` instead of the
          # PR head.  Fall back to ``github.sha`` so push/PR runs
          # check out the triggering revision and ``workflow_call``
          # callers (release-prep.yml) still get the ref they passed.
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # @v5 as 5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        id: run-tests
        run: python -m coverage run -m unittest discover -s tests -p "test_*.py" -v
        env:
          PYTHONUTF8: "1"

      - name: Generate coverage JSON
        run: python -m coverage json

      - name: Check per-file coverage
        # Coverage thresholds are enforced against the Ubuntu run only;
        # Windows numbers are advisory because branch coverage can vary
        # with platform-conditional code paths.
        if: matrix.os == 'ubuntu-latest'
        run: |
          python .github/scripts/check-per-file-coverage.py \
            --file-threshold skill-system-foundry/scripts/lib/prose_yaml.py=90 \
            --file-threshold skill-system-foundry/scripts/yaml_conformance_report.py=90 \
            --file-threshold skill-system-foundry/scripts/lib/yaml_conformance_runner.py=90 \
            --file-threshold .github/scripts/preflight-yaml-upgrade.py=90 \
            --file-threshold .github/scripts/refresh-yaml-corpus-digests.py=90 \
            --file-threshold .github/scripts/verify-action-pins.py=90

      - name: Generate coverage HTML report
        if: always() && steps.run-tests.outcome != 'skipped'
        run: python -m coverage html

      - name: Upload coverage report
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4 as 4.6.2
        with:
          name: coverage-report-${{ matrix.os }}
          path: htmlcov/

      - name: Write coverage total
        if: matrix.os == 'ubuntu-latest'
        run: |
          TOTAL_RAW=$(python -m coverage report --format=total --fail-under=0)
          TOTAL_STRIPPED=${TOTAL_RAW%\%}
          printf '%.0f\n' "$TOTAL_STRIPPED" > coverage-total.txt

      - name: Upload coverage total
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4 as 4.6.2
        with:
          name: coverage-total
          path: coverage-total.txt

      - name: Check coverage threshold
        run: python -m coverage report

  validate-examples:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # @v5 as 5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate reference examples
        run: python .github/scripts/validate-examples.py
        env:
          PYTHONUTF8: "1"

  reference-conformance:
    # Gates the meta-skill's link graph against the file-relative
    # path-resolution rule (see skill-system-foundry/references/path-resolution.md).
    # The report exits non-zero if any internal link fails to resolve
    # under standard markdown semantics or any markdown file under the
    # skill is unreachable from SKILL.md / capability.md roots.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # @v5 as 5.6.0
        with:
          python-version: "3.12"

      - name: Reference conformance report
        run: |
          cd skill-system-foundry
          python scripts/reference_conformance_report.py . --verbose
        env:
          PYTHONUTF8: "1"

  bundle-extract-smoke:
    # Build a synthetic minimal skill, bundle it, extract the
    # resulting zip into a fresh location, and validate the
    # extracted tree.  Exercises the full bundle.py + validate_skill.py
    # pipeline on both runners so cross-platform regressions in path
    # handling, long-path arcnames, and case semantics surface here
    # rather than at user-extract time on a Windows machine.
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # @v5 as 5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Scaffold a synthetic skill
        # Uses scaffold.py to build a complete minimal skill in a
        # work directory outside the repo so the bundle pipeline
        # exercises a layout with no foundry-specific quirks.  The
        # scaffolded SKILL.md ships with a placeholder description
        # longer than the 200-char Claude.ai cap, so the next step
        # rewrites the frontmatter description to a short stub —
        # the smoke test then exercises bundle.py's default
        # ``--target claude`` (the most-shipped consumer target),
        # not the more permissive ``generic`` mode.
        run: |
          python skill-system-foundry/scripts/scaffold.py skill demo --root smoke-work
        env:
          PYTHONUTF8: "1"

      - name: Replace scaffolded frontmatter with bundle-able stub
        # The scaffolded SKILL.md uses a YAML folded scalar for the
        # description (``description: >`` plus indented continuation
        # lines), so an in-place line replacement would leave the
        # continuation lines orphaned and produce a malformed
        # frontmatter block.  Rewrite the whole frontmatter as a
        # known-good stub instead — the smoke skill's frontmatter
        # is throw-away; only its shape (parses cleanly, fits under
        # the Claude.ai 200-char description cap) matters for
        # exercising the bundle pipeline.
        #
        # Stub fields cover the validator surface: ``name`` and
        # ``description`` are spec-required; ``allowed-tools: ""`` is
        # the documented opt-out the tool-coherence rule keys off;
        # ``compatibility`` exercises the optional-string check;
        # ``license`` exercises the SPDX recognition; and
        # ``metadata.version`` exercises semver validation.
        run: |
          python -c "import os; p=os.path.join('smoke-work','skills','demo','SKILL.md'); src=open(p,'r',encoding='utf-8').read(); body=src.split('---',2)[2] if src.startswith('---') else src; fm='---\nname: demo\ndescription: triggers when the demo runs\nallowed-tools: \"\"\ncompatibility: smoke test\nlicense: MIT\nmetadata:\n  version: 1.0.0\n---\n'; open(p,'w',encoding='utf-8',newline='\n').write(fm+body.lstrip())"
        env:
          PYTHONUTF8: "1"

      - name: Bundle the synthetic skill
        # Default target is ``claude`` — the most-shipped consumer
        # platform — so the smoke job catches regressions in the
        # Claude.ai-specific tightenings rather than only the
        # permissive ``generic`` mode.
        run: |
          python skill-system-foundry/scripts/bundle.py smoke-work/skills/demo --output smoke-bundle.zip
        env:
          PYTHONUTF8: "1"

      - name: Extract the bundle
        # Use Python's stdlib zipfile so the same step runs on both
        # runners without depending on a host unzip implementation.
        run: |
          python -c "import zipfile; zipfile.ZipFile('smoke-bundle.zip').extractall('smoke-extracted')"
        env:
          PYTHONUTF8: "1"

      - name: Validate the extracted bundle
        # Walks the extracted tree.  bundle.py emits the skill under
        # its own basename inside the archive, so we resolve the
        # discovered SKILL.md and validate from there.
        run: |
          python -c "import os, sys, subprocess; root='smoke-extracted'; cand=[os.path.join(root, n) for n in os.listdir(root)]; skill_dir=next((d for d in cand if os.path.isfile(os.path.join(d, 'SKILL.md'))), None); sys.exit(subprocess.call([sys.executable, 'skill-system-foundry/scripts/validate_skill.py', skill_dir]))"
        env:
          PYTHONUTF8: "1"

  update-badge:
    needs:
      - test
      - validate-examples
      - reference-conformance
      - bundle-extract-smoke
    # Restrict to genuine pushes to main; this skips reusable
    # workflow_call invocations (e.g. release-prep.yml) where
    # github.event_name is the caller's event (workflow_dispatch) and
    # the badge must not be updated from a release branch's coverage.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: update-badge-main
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Download coverage total
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # @v4 as 4.3.0
        with:
          name: coverage-total

      - name: Update coverage badge
        run: |
          TOTAL=$(cat coverage-total.txt)
          export TOTAL
          bash .github/scripts/update-coverage-badge.sh
