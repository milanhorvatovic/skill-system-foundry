name: Python tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # @v5 as 5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        id: run-tests
        run: python -m coverage run -m unittest discover -s tests -p "test_*.py" -v
        env:
          PYTHONUTF8: "1"

      - name: Generate coverage JSON
        run: python -m coverage json

      - name: Check per-file coverage
        run: python .github/scripts/check-per-file-coverage.py

      - name: Generate coverage HTML report
        if: always() && steps.run-tests.outcome != 'skipped'
        run: python -m coverage html

      - name: Upload coverage report
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4 as 4.6.2
        with:
          name: coverage-report-${{ matrix.os }}
          path: htmlcov/

      - name: Write coverage total
        if: matrix.os == 'ubuntu-latest'
        run: |
          TOTAL_RAW=$(python -m coverage report --format=total --fail-under=0)
          TOTAL_STRIPPED=${TOTAL_RAW%\%}
          printf '%.0f\n' "$TOTAL_STRIPPED" > coverage-total.txt

      - name: Upload coverage total
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4 as 4.6.2
        with:
          name: coverage-total
          path: coverage-total.txt

      - name: Check coverage threshold
        run: python -m coverage report

  # Temporary: run JS smoke test from this workflow so the introducing PR
  # is covered. Remove after script-tests.yaml exists on main.
  # PR-only to avoid double-running with script-tests.yaml on main pushes.
  script-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # @v4 as 4.4.0
        with:
          node-version: '20'

      - name: Run publish-review smoke test
        run: node .github/scripts/test-publish-review.js

  # update-badge intentionally depends only on "test" (Python coverage),
  # not "script-test". The badge tracks Python coverage, and the JS job
  # is temporary — it will be removed once script-tests.yaml exists on main.
  update-badge:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: update-badge-main
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Download coverage total
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # @v4 as 4.3.0
        with:
          name: coverage-total

      - name: Update coverage badge
        run: |
          TOTAL=$(cat coverage-total.txt)
          export TOTAL
          bash .github/scripts/update-coverage-badge.sh
