name: Verify action pins

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # @v6 as 6.0.3

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # @v5 as 7.0.0
        with:
          python-version: "3.12"

      - name: Verify action pins
        run: python .github/scripts/verify-action-pins.py
