name: Verify action pins

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # @v6 as 6.0.3

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # @v5 as 6.3.0
        with:
          python-version: "3.12"

      - name: Verify action pins
        run: python .github/scripts/verify-action-pins.py
