name: Dependabot Reconciler

# State-reconciler for open Dependabot PRs. Drives each PR toward "merged or
# definitively stuck" from whatever state it's currently in, complementing
# `dependabot-auto-merge.yaml` (which only sees `pull_request` events) with the
# things that workflow can't observe:
#
#   1. Base branch advancing under `strict_required_status_checks_policy: true`.
#      When one Dependabot PR in a Monday batch merges, every other open
#      Dependabot PR transitions to `BEHIND` and stalls — GitHub auto-merge does
#      NOT auto-rebase the head in strict-checks mode, and the `pull_request`
#      workflow doesn't re-fire on base movement.
#   2. Dismissed approvals after our own `update-branch` push. The `main` ruleset
#      sets `dismiss_stale_reviews_on_push: true`, and the synchronize triggered
#      by `gh pr update-branch` is attributed to the actor whose token authored
#      the merge commit — `oss-automation-bot[bot]` for the App-minted token this
#      workflow uses. That identity is not `dependabot[bot]`, so the resulting
#      workflow run executes in Actions-secrets context, where the auto-merge
#      workflow's Dependabot-store copy of `CODEOWNER_APPROVER_TOKEN` is
#      unreadable and its re-approve step no-ops. This workflow reads the same
#      PAT from the Actions secret store (the codeowner-approver PAT is mirrored
#      under the same name in both stores) so the re-approval can restore the
#      dismissed bot review from the Actions-side context.
#   3. Auto-merge enable that silently failed (the case `verify_auto_merge_or_terminal`
#      in dependabot-auto-merge.yaml exists to surface) and dropped post-open
#      events (a dismissed approval, or an arm that never landed) from transient
#      GitHub API errors.
#
# Coverage boundary: this workflow acts on a PR the auto-merge workflow has
# already APPROVED or ARMED, via two paths — it re-approves an ARMED PR whose
# approval was dismissed (or that the workflow could not approve from the
# Dependabot-secret context; this workflow reads the Actions-store
# CODEOWNER_APPROVER_TOKEN), and it ARMS-OR-ADVANCES an APPROVED + mergeable PR
# (arming it if unarmed, or re-issuing the idempotent merge to backstop the async
# auto-merge worker if already armed — tier 2's only merge path).
# The re-approve path re-runs every policy gate first, so the bot never approves
# a PR the policy would hold; the arm-or-advance path drops the dependency gate
# (arming/merging is ruleset-gated — a held PR cannot merge until a code-owner
# approves), keeping only the veto-label and kill-switch guards. Because the
# re-approve path approves, on an armed-but-
# unapproved PR it MAY post the first approval: the approved/armed precondition
# plus the re-run gates are the safety boundary, NOT a prior-approval check. A
# prior-approval check is not used because the two armed-but-unapproved causes are
# indistinguishable from review history — the auto-merge workflow arming as a
# fallback when its Dependabot-store approve step failed (a designed recovery this
# workflow must complete) versus a maintainer manually arming an unapproved PR —
# and gating on prior approval would break the former. A maintainer who manually
# arms or approves a PR they want held should request changes or apply a
# `trust-boundary` / `security-review-required` label, both of which the gates
# honor. A PR that is neither approved nor armed (e.g. a fully-dropped initial run
# where the `opened` event never reached the approve/arm path and no later
# `synchronize` re-fired it) is left for manual triage — re-run `Dependabot
# Auto-Merge` or push to the PR to recover it. The same dependency gates also
# guard the recreate path and — until the PR is APPROVED — the update-branch path
# (see those steps), so a held trust-boundary or semver-major bump that no
# code-owner has approved is left untouched: not branch-updated under the App
# identity (which would re-run CI with secrets in scope) and not nudged to
# recreate. Once a code-owner approval is in place the update-branch path is
# allowed (the approved version is vetted, so privileged CI on it is authorized);
# the recreate nudge stays gated regardless.
#
# Triggers:
#   - `workflow_run` on `Dependabot Auto-Merge` is the primary reactive trigger.
#     The `push: main` event is suppressed when `secrets.GITHUB_TOKEN` causes the
#     push (GitHub's anti-loop rule), which is exactly what happens when the
#     auto-merge workflow's synchronous `gh pr merge --squash` lands a Dependabot
#     PR — so `push: main` alone would miss the most important case. The
#     `workflow_run` lifecycle event is NOT subject to that suppression.
#   - `push: main` covers the remaining cases (human merges through the GitHub UI,
#     PAT-authenticated merges, force pushes by a maintainer with admin rights).
#   - `schedule` is the backstop that catches dropped post-open events (a
#     dismissed approval, a missing arm), transient API errors, and silent
#     auto-merge enable failures. It does NOT recover a fully-dropped initial run
#     (see the coverage boundary above).
#   - `workflow_dispatch` is the manual escape hatch.
#
# Conservative by design: this workflow never invokes a synchronous merge
# directly. It nudges PRs into states the existing infrastructure can complete —
# updates BEHIND branches, posts one `@dependabot recreate` comment on real
# conflicts, restores dismissed approvals on already-armed PRs, and ARMS OR
# ADVANCES approved+mergeable PRs via `gh pr merge --auto --squash` (arming an
# unarmed PR, or re-issuing the idempotent merge to advance an already-armed one
# the async worker missed). That
# last call IS the same one GitHub uses to merge synchronously when every
# required protection on the PR is already satisfied at the moment of the call
# (the common path for an APPROVED + MERGEABLE PR), so "enable auto-merge" can
# complete an immediate merge in practice. The same pattern governs
# `dependabot-auto-merge.yaml`'s `arm_auto_merge` helper. Anything outside this
# set (terminally-failed required checks, missing tokens, security-review labels,
# semver-major bumps without human approval) is left for manual triage.
#
# Policy parity with `dependabot-auto-merge.yaml`:
#   - Skips PRs labeled `trust-boundary` or `security-review-required` (re-checked
#     immediately before every state-mutating action, fail-closed on query error).
#   - Applies `check_dependency_gates` (a `version-update:semver-major` trailer,
#     or a trust-boundary action bump — `actions/create-github-app-token`,
#     `milanhorvatovic/codex-ai-code-review-action`) to RE-APPROVAL only, so the
#     bot never approves a held PR. The arm-or-advance path does NOT apply it —
#     arming/merging is ruleset-gated, so a held PR cannot merge until a code-owner
#     approves. update-branch applies it only when the PR is NOT yet APPROVED (an
#     approved held version is authorized for the privileged App-identity CI an
#     update-branch triggers); the recreate nudge keeps it unconditionally (a held
#     PR, even approved, is left for manual conflict resolution). Detection reads
#     the PR's first commit message — Dependabot's authoritative
#     `updated-dependencies:` block — because `dependabot/fetch-metadata` is only
#     available inside the `pull_request` event, not the push/schedule/workflow_run
#     triggers this workflow runs under. When a new action-level trust-boundary
#     dependency is added, extend `check_dependency_gates` here in lockstep with
#     `.github/dependabot.yaml` and `.github/workflows/dependabot-auto-merge.yaml`.
#   - Honors the `DEPENDABOT_AUTOMERGE_ENABLED` kill-switch for merge-advancing
#     actions (re-approve, arm auto-merge), matching what the switch gates in
#     `dependabot-auto-merge.yaml`. update-branch and the recreate nudge stay
#     ungated — they keep a PR healthy for a human even while auto-merge is paused.
#
# Failure isolation: per-PR work runs inside a function that handles transient
# `gh` failures with explicit warnings and early returns rather than letting
# `set -euo pipefail` abort the whole loop. One broken PR cannot strand the rest.
# A handful of severe per-PR conditions set a sticky flag that fails the run.

on:
  push:
    branches:
      - main
  workflow_run:
    # Fires when the auto-merge workflow's run completes regardless of which
    # token caused it. Required to react to `GITHUB_TOKEN`-driven merges, where
    # the resulting `push: main` event is suppressed by GitHub's anti-loop rule.
    # The `workflow_run` trigger only activates once this workflow file lives on
    # the default branch (a structural GitHub Actions requirement, not a one-time
    # merge gate).
    workflows:
      - "Dependabot Auto-Merge"
    types:
      - completed
  schedule:
    # Hourly. The reactive triggers above handle the BEHIND-after-merge case in
    # seconds; the cron catches dropped events, transient API errors, and silent
    # auto-merge enable failures that no event would re-fire.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

# Singleton: serialize runs so any of the four triggers (`workflow_run` on
# Dependabot Auto-Merge, `push: main`, `schedule`, `workflow_dispatch`) cannot
# race the others on the same set of PRs. `cancel-in-progress` stays false
# because each tick is a full reconciliation pass — canceling mid-loop would
# leave some PRs unreconciled until the next trigger.
concurrency:
  group: dependabot-reconciler
  cancel-in-progress: false

jobs:
  reconcile:
    # `workflow_run` fires for *every* completed run of the auto-merge workflow,
    # which is itself triggered by `pull_request` events on every PR opened
    # against the repo (its jobs short-circuit for non-Dependabot PRs but the
    # workflow itself still runs to completion). Without a gate, every random PR
    # opening would trigger this reconciler with write scopes and access to
    # Actions secrets (including the configured PATs) — a needless privilege-
    # escalation surface and DoS vector.
    #
    # Gate on TWO upstream-run properties, not just the branch name:
    #
    #   1. `head_repository.full_name == github.repository`. For fork PRs, GitHub
    #      still populates `head_branch` with the bare branch name, so an
    #      untrusted contributor could open a fork PR on a branch named
    #      `dependabot/anything` and satisfy a branch-only predicate. Requiring
    #      the upstream run's head repository to match `github.repository` means
    #      only in-repo branches are honored — the in-script identity filter
    #      alone cannot close this because the script reconciles every open
    #      Dependabot PR globally, not just the triggering one.
    #   2. `startsWith(head_branch, 'dependabot/')`. Dependabot's own branches
    #      always carry that prefix and the branch name is stable across the
    #      synchronize chain — a reconciler-triggered `gh pr update-branch`
    #      produces a new merge commit on the same `dependabot/...` head
    #      regardless of which identity authored that commit (here
    #      `oss-automation-bot[bot]`), so the gate still passes for the
    #      App-authenticated cascade.
    #
    # For non-`workflow_run` triggers (`push: main`, `schedule`,
    # `workflow_dispatch`) the predicate short-circuits to true via the
    # `event_name != 'workflow_run'` clause.
    #
    # In-script defense in depth: the `gh pr list --app dependabot` +
    # `.author.login` + `.isCrossRepository == false` filter below remains the
    # authoritative identity gate. A maintainer-created in-repo branch
    # coincidentally named `dependabot/...` would pass this `if:` but exit 0 at
    # the in-script filter because no Dependabot-authored PRs exist on it.
    if: >-
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.head_repository.full_name == github.repository &&
        startsWith(github.event.workflow_run.head_branch, 'dependabot/')
      )
    runs-on: ubuntu-latest
    # Cap the reconciler at 30 minutes. The per-PR work is short (`gh pr view`,
    # `gh pr update-branch`, `gh pr merge --auto`, plus an at-most-30 s mergeable
    # poll on BEHIND PRs), but a hung gh API call or an unbounded backlog could
    # otherwise tie up the singleton concurrency slot for GitHub's default 6
    # hours. 30 min matches the cap on `dependabot-auto-merge.yaml`'s
    # `auto-merge` job and is well above the observed steady-state runtime.
    timeout-minutes: 30
    permissions:
      # Scopes granted to the workflow's default GITHUB_TOKEN. `gh pr
      # update-branch` is NOT on this list — it runs with the
      # `oss-automation-bot` App-minted token (see the `app-token` step below),
      # which carries its own permission set independent of these scopes.
      #
      # GITHUB_TOKEN consumers in this workflow:
      #   - `gh pr merge --auto --squash` needs `contents: write` (squash merge
      #     mutates main's head) and `pull-requests: write` (mutates PR state).
      #   - `gh pr merge --disable-auto` needs `pull-requests: write` only.
      #   - `gh pr comment` (the `@dependabot recreate` nudge) needs
      #     `issues: write` because PR conversation comments are issue comments in
      #     GitHub's permission model — without it the DIRTY recreate path 403s.
      # The codeowner-approver re-approval (`gh pr review --approve`) runs with
      # `APPROVE_TOKEN` (a PAT), not GITHUB_TOKEN, so it needs no scope here.
      contents: write
      issues: write
      pull-requests: write
    steps:
      # Mint a short-lived token from the `oss-automation-bot` GitHub App. Used
      # for `gh pr update-branch` so the resulting `synchronize` event is
      # attributed to the App identity rather than to `GITHUB_TOKEN` — GitHub's
      # anti-loop rule suppresses GITHUB_TOKEN-attributed synchronize events,
      # which would otherwise prevent downstream required-check workflows from
      # running on the new merge commit and leave the PR blocked by stale checks
      # under `strict_required_status_checks_policy: true`.
      #
      # `release.yaml` mints a token from a *different* App (`oss-release-bot`,
      # via `RELEASE_CLIENT_ID`) with the same action — the cross-reference is to
      # the pattern, not the identity. This workflow consumes the Automation Bot,
      # which has a narrower blast radius than the Release Bot (the two-App split
      # exists so a leak of the lower-risk identity doesn't force rotation of the
      # higher-risk one).
      - name: Mint oss-automation-bot token for update-branch
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # @v3 as 3.1.1
        with:
          client-id: ${{ vars.AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_PRIVATE_KEY }}

      - name: Reconcile open Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # Codeowner-approver PAT. One identity, held in both stores under the
          # same name: Actions store consumed here, Dependabot store consumed by
          # `dependabot-auto-merge.yaml`'s auto-approval step. Workflows
          # triggered by push/schedule/workflow_run/workflow_dispatch cannot read
          # Dependabot secrets and vice versa, so the value lives in both stores;
          # the trigger context determines which one this reference resolves
          # against. If unset, re-approve degrades to a warning and the PR waits
          # for manual approval.
          APPROVE_TOKEN: ${{ secrets.CODEOWNER_APPROVER_TOKEN }}
          # App-minted token from the `app-token` step above. The
          # `create-github-app-token` action fails the job if
          # `vars.AUTOMATION_CLIENT_ID` or `secrets.AUTOMATION_PRIVATE_KEY` is
          # missing, so by the time this step runs the token is always present —
          # no fallback path needed.
          UPDATE_BRANCH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Kill-switch (repository variable). Mirrors the gate in
          # `dependabot-auto-merge.yaml`: merge-advancing actions act only when
          # this is exactly 'true'.
          AUTOMERGE_ENABLED: ${{ vars.DEPENDABOT_AUTOMERGE_ENABLED }}
          # Prefix for the marker comment that gates the `@dependabot recreate`
          # nudge. Dependabot doesn't acknowledge the comment in a machine-
          # readable way, so we gate on our own marker rather than parsing
          # Dependabot's response. handle_dirty appends the PR head SHA to this
          # prefix so the nudge is posted at most once *per head SHA*: a stale
          # head (no recreate yet) stays suppressed, while a fresh head from a
          # recreate or an update-branch — i.e. a genuinely new conflict episode —
          # is nudged again. Bounds nudges to the head-change rate rather than
          # one-ever-per-PR (which would never re-nudge a recurring conflict).
          RECREATE_MARKER_PREFIX: "dependabot-reconciler:recreate"
          # Hard ceiling on total reconciler recreate nudges per PR, counted
          # across all heads. Per-head scoping re-nudges genuinely new conflicts,
          # but a conflict that stays DIRTY after each recreate would otherwise
          # nudge once per recreate without bound. After this many nudges the PR
          # is left for manual triage with a warning instead of being re-nudged.
          RECREATE_MAX_NUDGES: "5"
        run: |
          set -euo pipefail

          # Kill-switch parity with dependabot-auto-merge.yaml. The
          # merge-advancing actions (re-approve, arm auto-merge) act only when
          # DEPENDABOT_AUTOMERGE_ENABLED is exactly 'true'. update-branch and the
          # recreate nudge stay ungated — they keep PRs healthy for a human even
          # while auto-merge is paused. Conscious side-effect of leaving
          # update-branch ungated: a BEHIND PR updated during a pause has its
          # stale approval dismissed (the ruleset dismisses on push) without the
          # gated re-approve restoring it. Benign — it self-heals on resume, and
          # under strict policy a maintainer merging manually re-approves anyway.
          automerge_enabled() {
            [ "${AUTOMERGE_ENABLED:-}" = "true" ]
          }

          # Tri-state security-review label query. Returns "true"/"false" on a
          # successful gh response and "unknown" if the API call fails. Callers
          # fail closed on "unknown" — same pattern as the helper in
          # dependabot-auto-merge.yaml. Stderr is intentionally NOT redirected so
          # the underlying gh failure lands in the workflow log.
          security_review_state() {
            local pr=$1 result
            if ! result=$(gh pr view "$pr" --json labels --jq 'any(.labels[]; .name == "trust-boundary" or .name == "security-review-required")'); then
              echo "unknown"
              return
            fi
            echo "$result"
          }

          # Fetches the PR's first commit message (the Dependabot-authored one
          # carrying the `updated-dependencies:` block) and echoes it to stdout.
          # Callers capture via command substitution. Returns 0 on success, 1 on
          # API failure — callers fail closed by checking the exit status.
          fetch_commit_message() {
            local pr=$1
            gh api "repos/$GH_REPO/pulls/$pr/commits" --jq '.[0].commit.message'
          }

          # Fail-closed security-review re-check, called immediately before every
          # state-mutating action (update-branch, recreate comment, re-approve,
          # arm auto-merge). Returns 0 only when the label state is definitively
          # `false`; "true" and "unknown" both return non-zero with a warning so
          # a label applied after the top-of-loop check cannot race past us.
          gate_security_review() {
            local pr=$1 stage=$2 srs
            srs=$(security_review_state "$pr")
            if [ "$srs" != "false" ]; then
              echo "::warning::PR #${pr}: security-review state '$srs' immediately before ${stage}; skipping (fail-closed)."
              return 1
            fi
            return 0
          }

          # Verify that `gh pr merge --auto` actually left the PR in a reconciled
          # state. The command can exit 0 without `autoMergeRequest` being set —
          # the exact silent enable failure this reconciler exists to catch — so
          # checking the exit status alone would let us log "Armed auto-merge."
          # while the PR remains stranded. Mirrors `verify_auto_merge_or_terminal`
          # in dependabot-auto-merge.yaml. Distinguishes two failure modes:
          #   0 — verified-armed-or-terminal: MERGED/CLOSED, or OPEN with an
          #       active autoMergeRequest.
          #   1 — definitively-not-armed: OPEN with autoMergeRequest=null, or an
          #       unexpected PR state. Auto-merge demonstrably did not take.
          #   2 — state-unknown: the `gh pr view` API call itself failed. We
          #       genuinely don't know whether auto-merge armed, so the caller
          #       must perform best-effort cleanup.
          verify_arm_or_terminal() {
            local pr=$1 state_json pr_state has_auto
            if ! state_json=$(gh pr view "$pr" --json state,autoMergeRequest); then
              echo "::error::PR #${pr}: failed to verify PR state after gh pr merge --auto; cannot confirm whether auto-merge was actually enabled."
              return 2
            fi
            pr_state=$(jq -r '.state' <<<"$state_json")
            has_auto=$(jq -r '.autoMergeRequest != null' <<<"$state_json")
            case "$pr_state" in
              MERGED|CLOSED)
                echo "PR #${pr}: state is ${pr_state} after arm; reconciled."
                return 0 ;;
              OPEN)
                if [ "$has_auto" = "true" ]; then
                  return 0
                fi
                echo "::error::PR #${pr}: gh pr merge --auto exited cleanly but autoMergeRequest is still null on an OPEN PR — the enable failed silently (likely the github-actions bot lacks merge permission or the repository's 'Allow auto-merge' setting is disabled). Investigate immediately."
                return 1 ;;
              *)
                echo "::error::PR #${pr}: unexpected PR state '${pr_state}' after auto-merge attempt; cannot confirm reconciliation."
                return 1 ;;
            esac
          }

          # Apply the dependency policy gates from dependabot-auto-merge.yaml's
          # approve step. The re-approve and recreate paths gate on this
          # unconditionally; the update-branch path gates on it only until the PR
          # is APPROVED (an approved version is vetted, so privileged CI on it is
          # authorized); the arm-or-advance path skips it entirely (arming and
          # merging are ruleset-gated). The label gates (trust-boundary /
          # security-review-required) are handled separately by gate_security_review;
          # this checks the two remaining hold conditions from the approve step's
          # `if:`: a trust-boundary action bump (held by name, any update-type), and
          # a semver-major effective update-type. Reads the
          # Dependabot-authored first commit message because fetch-metadata is
          # unavailable outside the pull_request event. Returns 0 eligible, 1 a
          # gate refuses, 2 on commit-metadata fetch failure (fail-closed).
          check_dependency_gates() {
            local pr=$1 stage=$2 commit_msg unrecognized
            if ! commit_msg=$(fetch_commit_message "$pr"); then
              echo "::warning::PR #${pr}: failed to fetch commit metadata; skipping ${stage} (fail-closed)."
              return 2
            fi
            # No update-type trailer means a non-Dependabot-authored commit (a
            # maintainer amended/rebased, the message was scrubbed, or Dependabot
            # changed its format). Without it we cannot distinguish patch from
            # semver-major, and silently returning 0 would let a major through.
            # Fail closed.
            if ! grep -q "update-type: " <<<"$commit_msg"; then
              echo "::warning::PR #${pr}: commit message has no Dependabot 'update-type:' trailer; cannot classify update-type, failing closed and not performing ${stage}."
              return 1
            fi
            # Trust-boundary actions run with secrets in scope (App private key /
            # OPENAI_API_KEY) and are kept out of the github-actions group via
            # exclude-patterns in dependabot.yaml, so they arrive standalone.
            # Held by name regardless of update-type.
            if grep -q "dependency-name: actions/create-github-app-token" <<<"$commit_msg" \
               || grep -q "dependency-name: milanhorvatovic/codex-ai-code-review-action" <<<"$commit_msg"; then
              echo "PR #${pr}: contains a trust-boundary action bump; manual review required, not performing ${stage}."
              return 1
            fi
            # Any semver-major in a (possibly grouped) bump is held for review.
            if grep -q "update-type: version-update:semver-major" <<<"$commit_msg"; then
              echo "PR #${pr}: contains a semver-major update; manual review required, not performing ${stage}."
              return 1
            fi
            # Fail closed on any update-type value that is not an explicit
            # semver-minor / semver-patch, mirroring dependabot-auto-merge.yaml's
            # `else -> version-update:semver-major` default. The major check above
            # already held the known-major case; this counts every `update-type:`
            # line that is neither minor nor patch (an unrecognized or future
            # Dependabot value) so the reconciler can never be MORE permissive
            # than the workflow it backstops. The accepted value is anchored to
            # end-of-line (`[[:space:]]*$` tolerates trailing whitespace) so a
            # substring variant like `version-update:semver-patch-preview` is
            # treated as unrecognized and held, not accepted by a loose match.
            # The count is line-oriented, so a grouped PR's multiple trailers are
            # each checked independently.
            unrecognized=$(grep "update-type: " <<<"$commit_msg" \
              | grep -Evc "update-type: version-update:semver-(minor|patch)[[:space:]]*$" || true)
            if [ "${unrecognized:-0}" -gt 0 ]; then
              echo "PR #${pr}: ${unrecognized} update-type line(s) are not explicit semver-minor/patch (unrecognized value); failing closed, not performing ${stage}."
              return 1
            fi
            return 0
          }

          # DIRTY-path handler (real merge conflict). Posts the one-shot
          # `@dependabot recreate` nudge, gated by the marker comment so we don't
          # spam the PR. Extracted into a helper so the BEHIND→DIRTY transition
          # discovered after `update-branch` can re-enter the same logic instead
          # of waiting for the next reconciler tick.
          #
          # The marker is per-head-SHA (`<!-- ${RECREATE_MARKER_PREFIX}:<sha> -->`)
          # so the nudge fires at most once per head: a stale head stays
          # suppressed, but a recreate or an update-branch produces a new head and
          # re-nudges a genuinely new conflict episode (the static one-per-PR
          # marker never re-nudged a recurring conflict). The match is restricted
          # to comments authored by `github-actions[bot]` (the identity this
          # workflow posts under, via the default GH_TOKEN). Without that author
          # filter, an arbitrary commenter on a public PR could pre-seed the
          # marker into their own comment body and suppress this workflow's
          # recreate-nudge for a real DIRTY Dependabot PR. The author check is
          # load-bearing for the duplicate-suppression guarantee. If the posting
          # identity is ever migrated to a different bot, update the author check
          # here in lockstep.
          handle_dirty() {
            local pr=$1 comments_json head_sha marker nudge_count
            echo "DIRTY (real conflict)."
            # Apply the dependency policy gates before any recreate nudge so a
            # held bump (semver-major or a trust-boundary action) is left fully
            # untouched. The re-approve path gates the same way; the update-branch
            # path gates too but allows an already-approved PR through, and the
            # arm-or-advance path relies on the ruleset instead. The BEHIND callers
            # already gate before
            # update-branch, but the top-level DIRTY `elif` reaches here directly,
            # so gating inside handle_dirty makes every caller inherit the policy.
            # Unlike update-branch, `@dependabot recreate` is Dependabot-authored
            # (its rebuild runs CI in the restricted Dependabot context, not the
            # Actions-secrets context), so this is a leave-held-PRs-alone boundary
            # rather than the secret-escalation guard that motivates the
            # update-branch gate. Fail-closed on a metadata-fetch error (return 2).
            if ! check_dependency_gates "$pr" "recreate comment"; then
              return 0
            fi
            # Tag the marker with the current head SHA. A fetch failure fails
            # closed (skip posting) so a transient error can't drop the SHA and
            # collapse the per-head marker back to a coarse, easily-duplicated one.
            if ! head_sha=$(gh pr view "$pr" --json headRefOid --jq '.headRefOid'); then
              echo "::warning::PR #${pr}: failed to fetch head SHA; skipping recreate posting (fail-closed)."
              return 0
            fi
            marker="<!-- ${RECREATE_MARKER_PREFIX}:${head_sha} -->"
            if ! comments_json=$(gh pr view "$pr" --json comments); then
              echo "::warning::PR #${pr}: failed to fetch comments; skipping recreate posting (fail-closed to avoid duplicate comments)."
              return 0
            fi
            # Hard ceiling across all heads: count this workflow's prior nudges
            # (any head SHA) and stop once RECREATE_MAX_NUDGES is reached, so an
            # unresolvable conflict that stays DIRTY after each recreate surfaces
            # for manual triage instead of being re-nudged once per recreate
            # without bound. The count uses the same github-actions[bot] author
            # filter as the per-head check below.
            nudge_count=$(jq --arg prefix "<!-- ${RECREATE_MARKER_PREFIX}:" '[.comments[] | select(.author.login == "github-actions[bot]" and (.body | contains($prefix)))] | length' <<<"$comments_json")
            if [ "${nudge_count:-0}" -ge "${RECREATE_MAX_NUDGES}" ]; then
              echo "::warning::PR #${pr}: reconciler has already posted ${nudge_count} recreate nudge(s) (ceiling ${RECREATE_MAX_NUDGES}); not nudging again. The conflict is not resolving via recreate — manual triage required."
              return 0
            fi
            if jq -e --arg marker "$marker" 'any(.comments[]; .author.login == "github-actions[bot]" and (.body | contains($marker)))' <<<"$comments_json" >/dev/null; then
              echo "Recreate comment already posted for head ${head_sha}; skipping."
              return 0
            fi
            # Re-check the security-review state immediately before commenting —
            # posting `@dependabot recreate` on a PR a maintainer just flagged for
            # manual review would defeat the policy. Posting a comment is a write
            # the policy can refuse.
            if ! gate_security_review "$pr" "recreate comment"; then
              return 0
            fi
            if ! gh pr comment "$pr" --body "${marker}"$'\n@dependabot recreate'; then
              echo "::warning::PR #${pr}: failed to post recreate comment."
            else
              echo "Posted @dependabot recreate (head ${head_sha})."
            fi
            return 0
          }

          # Per-PR reconciliation. Always returns 0 — every failure path emits a
          # `::warning::` and returns early so the outer loop continues with the
          # next PR. Never let an unhandled non-zero exit escape this function;
          # `set -e` at the top level would otherwise kill the whole run. Severe
          # conditions set the sticky `had_critical_error` flag instead.
          reconcile_pr() {
            local pr=$1
            local state merge_state mergeable review has_auto srs verify_rc

            if ! state=$(gh pr view "$pr" --json mergeStateStatus,mergeable,reviewDecision,autoMergeRequest); then
              echo "::warning::PR #${pr}: failed to fetch PR state; skipping this iteration."
              return 0
            fi

            # Pre-action security-review check. Fail-closed: if the label state is
            # unknown we don't take any state-mutating action on this PR.
            srs=$(security_review_state "$pr")
            case "$srs" in
              true)
                echo "Security-review labeled; skipping."
                return 0 ;;
              unknown)
                echo "::warning::PR #${pr}: security-review state unknown; skipping (fail-closed)."
                return 0 ;;
            esac

            merge_state=$(jq -r '.mergeStateStatus' <<<"$state")
            mergeable=$(jq -r '.mergeable' <<<"$state")
            review=$(jq -r '.reviewDecision // ""' <<<"$state")
            has_auto=$(jq -r '.autoMergeRequest != null' <<<"$state")

            if [ "$merge_state" = "BEHIND" ]; then
              # Re-check the security-review state immediately before mutating the
              # PR branch — a maintainer may have applied the label since the
              # top-of-function check, and update-branch is itself a write.
              if ! gate_security_review "$pr" "update-branch"; then
                return 0
              fi
              # Apply the dependency policy gates BEFORE the App-authored
              # update-branch — UNLESS the PR's reviewDecision is already APPROVED
              # (the ruleset-required approving review — a code owner for owned paths).
              # `gh pr update-branch` with UPDATE_BRANCH_TOKEN creates a
              # non-Dependabot `synchronize` event, which (unlike a Dependabot-
              # authored run) executes the PR's workflows in the full Actions-
              # secrets context. For a held trust-boundary action bump that would
              # re-run CI with the new action version AND repository secrets in
              # scope — the escalation the trust-boundary hold exists to prevent —
              # so we gate it. But once reviewDecision is APPROVED a maintainer has
              # vetted the version, so the privileged CI an update-branch triggers
              # on it is authorized (each BEHIND cycle re-runs it, and the ruleset's
              # dismiss_stale_reviews_on_push means the maintainer re-approves each
              # cycle — see CONTRIBUTING). Skip the gate when APPROVED so its "not
              # performing update-branch" log can't contradict the override; an
              # unapproved held PR still hits the gate and is left BEHIND for manual
              # handling. The gate fails closed on a metadata-fetch error (return 2).
              if [ "$review" != "APPROVED" ] && ! check_dependency_gates "$pr" "update-branch"; then
                return 0
              fi
              echo "BEHIND main; calling update-branch."
              # `UPDATE_BRANCH_TOKEN` is the `oss-automation-bot` App-minted token
              # from the workflow-level `app-token` step (guaranteed present —
              # create-github-app-token fails the job upstream if its inputs are
              # missing). Using the App identity instead of `GITHUB_TOKEN` ensures
              # the resulting `synchronize` event is forwarded to downstream
              # required-check workflows (GITHUB_TOKEN's would be suppressed by
              # GitHub's anti-loop rule and the PR would stay blocked by stale
              # checks under `strict_required_status_checks_policy: true`).
              if ! GH_TOKEN="$UPDATE_BRANCH_TOKEN" gh pr update-branch "$pr"; then
                echo "::warning::PR #${pr}: update-branch failed (transient API error or branch protection refused the update)."
                return 0
              fi
              # Refresh state: the merge commit may have dismissed the bot review,
              # flipped `mergeable`, or invalidated `autoMergeRequest`. We also
              # re-read `mergeStateStatus` so a BEHIND→DIRTY transition (the merge
              # commit produced a real conflict) is handled this tick.
              if ! state=$(gh pr view "$pr" --json mergeStateStatus,mergeable,reviewDecision,autoMergeRequest); then
                echo "::warning::PR #${pr}: state refresh after update-branch failed; skipping downstream actions."
                return 0
              fi
              merge_state=$(jq -r '.mergeStateStatus' <<<"$state")
              mergeable=$(jq -r '.mergeable' <<<"$state")
              review=$(jq -r '.reviewDecision // ""' <<<"$state")
              has_auto=$(jq -r '.autoMergeRequest != null' <<<"$state")
              if [ "$merge_state" = "DIRTY" ]; then
                handle_dirty "$pr"
                return 0
              fi
              # GitHub recomputes `mergeable` asynchronously after a merge commit
              # lands on the PR branch. Immediately after `update-branch` it
              # commonly reports `UNKNOWN` for a few seconds — the arm gate below
              # requires `MERGEABLE`, so without a brief poll we'd skip this PR
              # every tick the recompute hadn't converged. Three retries × 10 s is
              # bounded (≤30 s per BEHIND PR) and only runs on PRs that just went
              # through update-branch this tick.
              local attempt
              for attempt in 1 2 3; do
                if [ "$mergeable" != "UNKNOWN" ]; then
                  break
                fi
                sleep 10
                echo "PR #${pr}: mergeable=UNKNOWN after update-branch; re-querying (attempt ${attempt}/3)."
                if ! state=$(gh pr view "$pr" --json mergeStateStatus,mergeable,reviewDecision,autoMergeRequest); then
                  echo "::warning::PR #${pr}: state re-query during mergeable poll failed; continuing with last-known values."
                  break
                fi
                merge_state=$(jq -r '.mergeStateStatus' <<<"$state")
                mergeable=$(jq -r '.mergeable' <<<"$state")
                review=$(jq -r '.reviewDecision // ""' <<<"$state")
                has_auto=$(jq -r '.autoMergeRequest != null' <<<"$state")
                if [ "$merge_state" = "DIRTY" ]; then
                  handle_dirty "$pr"
                  return 0
                fi
              done
            elif [ "$merge_state" = "DIRTY" ]; then
              # Real conflict — Dependabot's auto-rebase can't resolve it. Drop a
              # one-shot `@dependabot recreate` so Dependabot rebuilds the PR.
              handle_dirty "$pr"
              return 0
            fi

            # Re-approve only when auto-merge is already armed AND the kill-switch
            # is on. An armed PR is one dependabot-auto-merge.yaml already
            # processed; a non-APPROVED reviewDecision means either a push
            # (typically our own update-branch) dismissed the approval, or the
            # workflow's approve step could not post it from the Dependabot-secret
            # context. Either way we re-run the full policy gates below before
            # approving, so we never approve a PR the policy would hold — the
            # armed precondition (not a prior-approval check) is the boundary, so
            # on an armed-but-unapproved PR this can post the first approval by
            # design (see the Coverage boundary note in the header). Gating on
            # automerge_enabled keeps the switch authoritative: a paused switch
            # must not let the reconciler approve or arm.
            if [ "$has_auto" = "true" ] && [ "$review" != "APPROVED" ] && automerge_enabled; then
              # A non-APPROVED reviewDecision on an armed PR is not unique to a
              # dismissed bot approval. It also matches CHANGES_REQUESTED (a
              # deliberate maintainer block — never re-approve) and a maintainer
              # manually arming auto-merge on a semver-major / trust-boundary PR
              # for human review. Skip CHANGES_REQUESTED outright, then re-run the
              # same dependency gates the auto-merge approve step uses so the
              # reconciler can never re-approve a PR that workflow would refuse.
              if [ "$review" = "CHANGES_REQUESTED" ]; then
                echo "PR #${pr}: reviewDecision=CHANGES_REQUESTED; not re-approving (deliberate maintainer block)."
                return 0
              fi
              if ! gate_security_review "$pr" "re-approve"; then
                return 0
              fi
              if ! check_dependency_gates "$pr" "re-approve"; then
                return 0
              fi
              if [ -n "${APPROVE_TOKEN:-}" ]; then
                if GH_TOKEN="$APPROVE_TOKEN" gh pr review --approve \
                    --body "Re-approved by dependabot-reconciler after the prior approval was dismissed (typically by an automated update-branch push)." \
                    "$pr"; then
                  # `gh pr review --approve` can exit 0 even when the PAT identity
                  # does not satisfy the branch ruleset's CODEOWNER requirement —
                  # GitHub records the review but the authoritative reviewDecision
                  # stays REVIEW_REQUIRED and the PR cannot auto-merge. Re-query
                  # the decision; only treat the approval as effective when GitHub
                  # agrees.
                  local post_approve_decision
                  if ! post_approve_decision=$(gh pr view "$pr" --json reviewDecision --jq '.reviewDecision'); then
                    echo "::warning::PR #${pr}: re-approve posted but reviewDecision re-query failed; cannot confirm CODEOWNER satisfaction. Auto-merge may remain blocked; manual approval may still be required."
                  elif [ "$post_approve_decision" = "APPROVED" ]; then
                    review="APPROVED"
                    echo "Re-approved."
                  else
                    echo "::warning::PR #${pr}: re-approve posted but reviewDecision is '${post_approve_decision}' (need APPROVED). The CODEOWNER_APPROVER_TOKEN identity likely does not satisfy the branch ruleset's CODEOWNER requirement; auto-merge will remain blocked. Configure a token belonging to a code-owner."
                  fi
                else
                  echo "::warning::PR #${pr}: re-approve failed (likely a revoked or insufficiently-scoped CODEOWNER_APPROVER_TOKEN, or a non-CODEOWNER identity)."
                fi
              else
                echo "::warning::PR #${pr} is auto-merge-armed but reviewDecision=${review} and CODEOWNER_APPROVER_TOKEN is unset; cannot restore approval. Configure the secret or approve manually."
              fi
            fi

            # Arm-or-advance backstop. Fires on any approved + mergeable PR while
            # the kill-switch is on — regardless of whether auto-merge is already
            # armed. `gh pr merge --auto --squash` is idempotent: it arms a PR
            # whose open-time arm was dropped, and on an already-armed + approved +
            # green PR it completes the merge the async auto-merge worker may have
            # silently failed to fire. That advance case is tier 2's safety net:
            # a held PR is never approved by the bot, so its dependabot-auto-merge
            # run always falls back to arming and then relies entirely on the
            # worker; re-issuing the idempotent merge here each tick is the backstop.
            # Re-issuing on a PR that is already armed and still waiting on checks is
            # benign, NOT a failure: `gh pr merge --auto` returns "already enabled"
            # (tolerated by `|| true`), and verify_arm_or_terminal treats an
            # OPEN+armed PR as success — an armed-and-waiting PR never reddens the run.
            # check_dependency_gates is intentionally NOT applied: arming and
            # merging are ruleset-gated (the server refuses a non-bypass merge
            # without the required code-owner review), so a held PR cannot merge
            # until a human approves it — only *approval* is dangerous, and the
            # re-approve path above keeps the gate. gate_security_review and the
            # kill-switch remain the live guards.
            if [ "$mergeable" = "MERGEABLE" ] && [ "$review" = "APPROVED" ] && automerge_enabled; then
              if ! gate_security_review "$pr" "arm auto-merge"; then
                return 0
              fi
              # Re-check the security-review state IMMEDIATELY before the merge
              # call. `gh pr merge --auto --squash` can perform a synchronous
              # merge (not just enable auto-merge) when the PR already satisfies
              # every branch protection rule at this instant — the common path for
              # this arm branch. Between the earlier gate_security_review and this
              # point we did several gh API calls, giving a maintainer a
              # multi-second window to apply a security-review label. A completed
              # squash cannot be un-merged, so narrow the race to the next two gh
              # calls' latency.
              if ! gate_security_review "$pr" "arm auto-merge (pre-merge re-check)"; then
                return 0
              fi
              # Tolerate a non-zero exit from `gh pr merge --auto --squash` here:
              # the failure is just as likely to be a benign race against
              # dependabot-auto-merge.yaml (which can have merged or armed the PR
              # between our last view and this call) as a persistent config
              # failure. The immediate exit code can't distinguish the two;
              # verify_arm_or_terminal below queries the authoritative post-arm
              # state and decides.
              gh pr merge --auto --squash "$pr" 2>&1 || true
              if verify_arm_or_terminal "$pr"; then
                verify_rc=0
              else
                verify_rc=$?
              fi
              if [ "$verify_rc" -ne 0 ]; then
                # verify_rc=2 (post-arm state-unknown): we can't rule out that
                # auto-merge armed. If a security-review label landed during the
                # arm window, the reactive disable-auto-merge job may have already
                # fired on the labeled event before the arm completed — meaning
                # nothing else would disable it. Best-effort --disable-auto closes
                # that gap.
                if [ "$verify_rc" = "2" ]; then
                  case "$(security_review_state "$pr")" in
                    true|unknown)
                      echo "::warning::PR #${pr}: post-arm verify could not confirm whether auto-merge armed; security-review state is non-false. Attempting best-effort --disable-auto to close the silent-arm-plus-label race."
                      if ! gh pr merge --disable-auto "$pr"; then
                        echo "::warning::PR #${pr}: best-effort --disable-auto returned non-zero; this is expected if auto-merge never armed."
                      fi ;;
                  esac
                fi
                had_critical_error=1
                return 0
              fi
              # Post-arm security-review re-check (post-enable async race): a label
              # applied after `gh pr merge --auto` enabled auto-merge but before
              # the async merge completes. The reactive disable job may have fired
              # on the labeled event before our arm completed (nothing left to
              # revoke), so defensively disable here on `true` or `unknown`. A
              # failed defensive disable is a silent policy bypass — fail the run
              # via the sticky flag rather than `exit 1` (which would strand the
              # remaining PRs).
              case "$(security_review_state "$pr")" in
                true)
                  echo "::error::PR #${pr}: security-review label landed during the arm window; reverting auto-merge."
                  if ! gh pr merge --disable-auto "$pr"; then
                    echo "::error::PR #${pr}: failed to disable auto-merge on a security-review PR. The PR may still merge automatically, bypassing the manual-review policy. Investigate immediately."
                    had_critical_error=1
                  fi
                  return 0 ;;
                unknown)
                  echo "::error::PR #${pr}: failed to verify security-review label state after arming auto-merge. Defensively disabling auto-merge to avoid a possible policy bypass — the reactive disable job only fires on the labeled event, which may have already run."
                  if ! gh pr merge --disable-auto "$pr"; then
                    echo "::error::PR #${pr}: failed to defensively disable auto-merge on a possibly security-review-required PR. Investigate immediately."
                    had_critical_error=1
                  fi
                  return 0 ;;
              esac
              # Log from the authoritative post-call state, not the pre-call
              # has_auto: `gh pr merge --auto --squash` can merge synchronously, so
              # the PR may now be MERGED (verify_arm_or_terminal already logged that
              # as "reconciled"). Only emit an arm/advance line while still OPEN; the
              # pre-call has_auto then distinguishes a fresh arm from a re-confirmed
              # backstop advance.
              case "$(gh pr view "$pr" --json state --jq '.state' 2>/dev/null || echo UNKNOWN)" in
                OPEN)
                  if [ "$has_auto" = "true" ]; then
                    echo "Auto-merge already armed; re-confirmed (backstop advance)."
                  else
                    echo "Armed auto-merge."
                  fi ;;
                MERGED|CLOSED) : ;;  # verify_arm_or_terminal already logged this
                *) echo "PR #${pr}: post-arm state unverified for logging." ;;
              esac
            fi

            return 0
          }

          # One-line observability for the kill-switch, mirroring the always-run
          # report step in dependabot-auto-merge.yaml. A skipped action is
          # invisible; logging the resolved state distinguishes "deliberately
          # paused" from "vars not resolving".
          if automerge_enabled; then
            echo "DEPENDABOT_AUTOMERGE_ENABLED=true; reconciler merge-advancing paths (re-approve, arm) active."
          else
            echo "::notice::DEPENDABOT_AUTOMERGE_ENABLED is '${AUTOMERGE_ENABLED:-<unset>}' (not 'true'); reconciler will still update BEHIND branches and post recreate nudges, but will not re-approve or arm auto-merge."
          fi

          # Two-step list so a `gh pr list` failure is surfaced rather than
          # collapsing silently to an empty array. Capture the JSON into a
          # variable first; if that fails, exit non-zero so the run is visibly
          # broken and re-fires on the next trigger.
          #
          # `--limit 200` covers any plausible burst (Monday Dependabot batches
          # plus active feature PRs sit well under that; the default of 30 would
          # silently truncate during a backlog). `--app "dependabot"` is the gh
          # CLI's purpose-built filter for GitHub App authors; the jq filter below
          # is defense in depth on top of it. Accept both `app/dependabot` (the
          # form gh CLI emits in `--json author` output) and `dependabot[bot]`
          # (the form GitHub Actions event payloads use) — equivalent identities,
          # matching both keeps the reconciler functional regardless of which
          # shape gh returns. `isCrossRepository == false` matches the auto-merge
          # workflow's `head.repo.full_name == github.repository` filter.
          if ! prs_json=$(gh pr list \
              --app "dependabot" --state open --limit 200 \
              --json number,author,isCrossRepository); then
            echo "::error::Failed to list open Dependabot PRs; aborting this tick (next scheduled run will retry)."
            exit 1
          fi
          mapfile -t prs < <(jq -r '.[] | select((.author.login == "dependabot[bot]" or .author.login == "app/dependabot") and .isCrossRepository == false) | .number' <<<"$prs_json")

          if [ "${#prs[@]}" -eq 0 ]; then
            echo "No open in-repository Dependabot PRs."
            exit 0
          fi

          # Sticky cross-PR failure flag. reconcile_pr always returns 0 to
          # preserve per-PR isolation, but a handful of conditions are too severe
          # to silently log — surfacing them as a red run is the maintainer's only
          # signal that the reconciler is no longer doing its job:
          #   1. verify_arm_or_terminal returned 1 (definitively-not-armed) or 2
          #      (post-arm state-unknown) — the canonical silent-enable-failure.
          #   2. A failed defensive `gh pr merge --disable-auto` after a
          #      security-review label landed during the arm window — a policy
          #      bypass.
          # The loop-end check exits 1 so the run goes red.
          had_critical_error=0

          for pr in "${prs[@]}"; do
            echo "::group::PR #${pr}"
            reconcile_pr "$pr"
            echo "::endgroup::"
          done

          if [ "$had_critical_error" = "1" ]; then
            echo "::error::At least one PR encountered a critical reconciler failure (silent or unverifiable auto-merge enable, or a failed defensive disable on a security-review PR). Failing the run so the issue surfaces; see per-PR ::error:: lines above for the specific cause."
            exit 1
          fi
