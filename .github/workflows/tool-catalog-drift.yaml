name: Tool catalog drift

# Weekly sweep that compares the hand-maintained Claude Code tool
# catalog at ``skill-system-foundry/scripts/lib/configuration.yaml``
# (under ``skill.allowed_tools.catalogs.claude_code``) against the
# canonical upstream source URL.  The URL itself is read from
# ``skill.allowed_tools.catalog_provenance.claude_code.source_url``
# in the catalog YAML — that field is the single source of truth,
# so updating it is a YAML-only change and does not require editing
# this workflow.
#
# Behavior:
#   * No drift detected — no PR opened.  If a stale drift PR exists on
#     the rolling branch ``chore/tool-catalog-drift`` it is closed and
#     the branch deleted (drift was resolved manually since the last
#     run).
#   * Drift detected — additions are auto-applied to the catalog,
#     ``last_checked`` is bumped to today, and a single rolling PR is
#     opened or force-updated against ``chore/tool-catalog-drift``.
#     Removals are surfaced in the PR body as advisory candidates;
#     they are NEVER auto-applied (a regex miss or a one-version-wide
#     doc edit could falsely propose dropping a real tool).
#   * Drift detected AND auto-mergeable — the helper's JSON output
#     reports ``auto_mergeable: true`` only for additions-only drift
#     within ``MAX_AUTO_MERGE_ADDITIONS`` (see the helper for the
#     gate's policy rationale).  When eligible, this workflow waits
#     for required status checks via ``gh pr checks --required
#     --watch --fail-fast`` and squash-merges synchronously under
#     the bot's still-valid token.  If a check fails or the merge
#     races, it falls back to enabling GitHub auto-merge so a later
#     rerun-to-green can fire the merge without a manual workflow
#     re-trigger.  Drift outside the gate (removals present, or
#     additions over the threshold) routes through the original
#     manual-review path.
#   * Hard-fail on any fetch error, table-shape change, or
#     parse error — silent green is the worst outcome for a drift
#     sweep.
#
# Tracks the ``claude_code`` catalog only.  Adding a second harness
# is not a YAML-only edit: ``run`` and ``parse_catalog`` in the
# helper currently process the single default harness, so a future
# extension requires helper changes (and may need workflow updates
# for per-harness PR titles or reporting).  See the design comment
# on #118.
#
# Operator preconditions for the auto-merge path (see CLAUDE.md
# "Detecting Tool Catalog Drift" for the full setup):
#   * GitHub App installed on this repo with permissions
#     ``contents: write`` (push the rolling branch),
#     ``pull-requests: write`` (open / edit / merge the rolling
#     PR), ``issues: write`` (``gh pr close --comment`` posts via
#     the issues API — PR comments are issue comments in GitHub's
#     permission model), and ``checks: read`` + ``statuses: read``
#     (``gh pr checks --required --watch`` reads check-run and
#     legacy commit-status state).  These are App-level
#     permissions and must be granted at App-creation time; the
#     job-level ``permissions:`` block below scopes ``GITHUB_TOKEN``
#     only and CANNOT compensate for missing App permissions.  An
#     under-scoped App still mints a token successfully but then
#     403s on the corresponding gh call.  The app id and PEM
#     private key are stored as ``vars.AUTOMATION_APP_ID``
#     (variable, not secret — App IDs are not sensitive) and
#     ``secrets.AUTOMATION_PRIVATE_KEY``.  An App identity is
#     required (not the default ``GITHUB_TOKEN``) because
#     GITHUB_TOKEN-authored PRs do not trigger downstream workflow
#     runs — the auto-merge path needs CI to actually fire.
#   * Repository setting "Allow auto-merge" is enabled (Settings →
#     General → Pull Requests).  ``gh pr merge --auto`` errors out
#     when this is disabled.
#   * Branch ruleset on ``main`` includes a ``required_status_checks``
#     rule listing the checks that always fire on drift PRs (the
#     two ``python-tests / test (...)`` matrix entries and
#     ``ci-helper-tests / test``).  ``gh pr checks --required
#     --watch`` waits on this list; if it is empty the merge step
#     races CI.
#
# All four preconditions are HARD prerequisites for the workflow to
# function — there is no degraded "catalog-sync still works without
# the App" mode.  An unavailable App or missing secret hard-fails
# at the "Mint App token" step before any drift logic runs.

on:
  schedule:
    # Mondays at 12:00 UTC.  Single source-of-truth; do not duplicate
    # this expression in code reviews — change here only.
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

# A queued ``workflow_dispatch`` must not race the cron — drift PRs
# are force-pushed to a single rolling branch and concurrent runs
# would clobber each other.  ``cancel-in-progress: false`` so an
# in-flight run finishes before the queued one starts.
concurrency:
  group: tool-catalog-drift
  cancel-in-progress: false

jobs:
  detect-and-pr:
    runs-on: ubuntu-latest
    # ``gh pr checks --required --watch`` blocks until every required
    # check reaches a terminal state.  If a check hangs (stuck runner,
    # never-reporting integration, etc.) the run would otherwise wait
    # up to GitHub's 6-hour default and tie up the per-run concurrency
    # slot.  30 minutes is well above the realistic runtime of the
    # required checks (python-tests + ci-helper-tests finish in 1-3
    # minutes apiece) so a 30-minute cap surfaces a genuine hang as a
    # workflow failure without flaking on normal runs.
    timeout-minutes: 30
    # ``contents: write`` is required to push the rolling branch.
    # ``pull-requests: write`` is required to open / edit / close /
    # merge the rolling PR.  ``issues: write`` is required because
    # ``gh pr close --comment`` posts the closing comment via the
    # issues API (PR comments are issue comments in GitHub's
    # permission model) — without it the no-drift cleanup path
    # would fail exactly when a stale rolling PR needs to be closed.
    # ``checks: read`` and ``statuses: read`` are required by
    # ``gh pr checks --required --watch`` to read check-run and
    # legacy commit-status state.  Every write actually executed by
    # the gh CLI uses the App token from ``steps.app-token`` rather
    # than GITHUB_TOKEN, but the workflow's job-level permissions
    # still have to declare the matching scopes because the
    # ``actions/checkout`` step caches GITHUB_TOKEN credentials for
    # the initial fetch even though we override it via ``token:``.
    permissions:
      checks: read
      contents: write
      issues: write
      pull-requests: write
      statuses: read
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # @v3 as 3.1.1
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: main
          # Fetch full history so a force-push to the rolling branch
          # cleanly supersedes whatever was there before.
          fetch-depth: 0
          # Use the App token so the subsequent ``git push`` is
          # authenticated as the App identity.  Pushes authenticated
          # by GITHUB_TOKEN deliberately do not trigger downstream
          # workflows; the App identity does, which is the whole
          # point of switching off GITHUB_TOKEN here — without
          # downstream CI firing on the rolling PR, the auto-merge
          # path has nothing to wait on.
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # @v5 as 5.6.0
        with:
          python-version: "3.12"

      - name: Run drift helper
        id: helper
        env:
          SUMMARY_PATH: ${{ runner.temp }}/drift-summary.md
          STATE_PATH: ${{ runner.temp }}/drift-state.json
        run: |
          python .github/scripts/tool-catalog-drift.py \
            --json --summary-out "$SUMMARY_PATH" > "$STATE_PATH"
          echo "summary_path=$SUMMARY_PATH" >> "$GITHUB_OUTPUT"
          echo "state_path=$STATE_PATH" >> "$GITHUB_OUTPUT"

      - name: Detect drift and auto-merge eligibility
        id: detect
        env:
          STATE_PATH: ${{ steps.helper.outputs.state_path }}
        # Read the helper's authoritative drift signal AND
        # auto_mergeable signal from its JSON payload rather than
        # inferring from the YAML diff.  A removals-only run on a day
        # when ``last_checked`` already equals today produces a
        # byte-identical YAML, so a diff-based detection would miss
        # that drift case.  ``auto_mergeable`` encodes the strict
        # allowlist gate (additions-only, count <= threshold) — it is
        # always false when ``drift`` is false.
        run: |
          drift=$(python -c "import json,sys; print(str(json.load(open(sys.argv[1], encoding='utf-8'))['drift']).lower())" "$STATE_PATH")
          auto=$(python -c "import json,sys; print(str(json.load(open(sys.argv[1], encoding='utf-8'))['auto_mergeable']).lower())" "$STATE_PATH")
          echo "drift=$drift" >> "$GITHUB_OUTPUT"
          echo "auto_mergeable=$auto" >> "$GITHUB_OUTPUT"

      - name: Resolve stale drift PR (no drift this run)
        if: steps.detect.outputs.drift == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: chore/tool-catalog-drift
        run: |
          # If a previous run opened a PR but the drift was resolved
          # manually (or upstream recovered), close the PR and delete
          # the branch so the next genuine drift opens a fresh PR.
          # The branch may also exist without an open PR (e.g. someone
          # closed the PR manually without ticking "Delete branch") —
          # delete it here so the rolling-branch lifecycle stays tidy.
          # Filter to PRs whose head repo owner matches this repo's
          # owner so a PR opened from a fork using the same branch
          # name cannot be mistakenly matched, closed, or edited.
          # ``gh pr list --head`` accepts only a bare branch name (the
          # ``OWNER:BRANCH`` form is unsupported), so the cross-repo
          # filter has to come from the JSON output via ``--jq``.
          pr_number=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number,headRepositoryOwner --jq "[.[] | select(.headRepositoryOwner.login == \"$GITHUB_REPOSITORY_OWNER\") | .number][0] // empty")
          if [ -n "$pr_number" ]; then
            gh pr close "$pr_number" \
              --comment "Drift resolved upstream or manually; closing rolling PR." \
              --delete-branch
            echo "Closed rolling PR #$pr_number."
          elif git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$BRANCH"
            echo "Deleted stale rolling branch $BRANCH (no open PR)."
          else
            echo "No stale drift PR or rolling branch to clean up."
          fi

      - name: Resolve App bot identity for git committer
        if: steps.detect.outputs.drift == 'true'
        id: identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        # actions/create-github-app-token v3.1.1 outputs ``token``,
        # ``installation-id``, and ``app-slug`` — but not the bot
        # user id needed for the canonical
        # ``<id>+<slug>[bot]@users.noreply.github.com`` no-reply
        # email.  Resolve it via the public users API; the slug
        # mapping is stable (GitHub creates one bot account per App
        # at install time and never reassigns the username), so a
        # one-shot lookup per run is safe and cheap.
        run: |
          set -euo pipefail
          bot_id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${bot_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.detect.outputs.drift == 'true'
        env:
          GIT_NAME: ${{ steps.identity.outputs.name }}
          GIT_EMAIL: ${{ steps.identity.outputs.email }}
        run: |
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"

      - name: Commit and force-push to rolling branch
        if: steps.detect.outputs.drift == 'true'
        env:
          BRANCH: chore/tool-catalog-drift
          CATALOG_PATH: skill-system-foundry/scripts/lib/configuration.yaml
        run: |
          git switch -C "$BRANCH"
          git add "$CATALOG_PATH"
          # Removals are advisory and never auto-applied, so a
          # removals-only drift run leaves the YAML untouched.  Use
          # --allow-empty so the commit + force-push + PR-open steps
          # still run; the PR body's "Candidate removals" section
          # carries the advisory.
          if git diff --cached --quiet; then
            git commit --allow-empty -m "Report claude_code tool catalog drift (removals-only advisory)"
          else
            git commit -m "Sync claude_code tool catalog with upstream tools-reference"
          fi
          git push --force origin "$BRANCH"

      - name: Compose PR body
        if: steps.detect.outputs.drift == 'true'
        env:
          SUMMARY_PATH: ${{ steps.helper.outputs.summary_path }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AUTO_MERGEABLE: ${{ steps.detect.outputs.auto_mergeable }}
        run: |
          {
            echo "Auto-generated by [tool-catalog-drift run]($RUN_URL)."
            echo
            cat "$SUMMARY_PATH"
            echo
            echo "## How to handle removals"
            echo
            echo "Any \"Candidate removals\" listed above are advisory only — they are NOT applied to the catalog by this workflow. Verify each name against the upstream tools reference before deleting; possible false positives include upstream renames, table-format changes, or extraction misses."
            echo
            if [ "$AUTO_MERGEABLE" = "true" ]; then
              echo "## Auto-merge"
              echo
              echo "This drift is **additions-only** and within the configured threshold (\`MAX_AUTO_MERGE_ADDITIONS\` in \`.github/scripts/tool-catalog-drift.py\`), so the workflow will: (1) wait for required status checks via \`gh pr checks --required --watch --fail-fast\`; (2) squash-merge synchronously under the bot's token if all required checks pass; (3) fall back to enabling GitHub auto-merge if a check fails or mergeability changes between the watch and the merge call, so a later rerun-to-green can fire the merge without a manual workflow re-trigger."
              echo
              echo "If you want to halt the auto-merge — for example to inspect a name that looks suspicious — close this PR or revert the corresponding upstream change before the required checks turn green."
            else
              echo "## Manual review required"
              echo
              echo "This drift is NOT eligible for auto-merge. The summary above lists either removals (advisory only — never auto-applied) or an additions count above \`MAX_AUTO_MERGE_ADDITIONS\` in \`.github/scripts/tool-catalog-drift.py\` (an unusually large burst is a signal worth maintainer's eyes — catalog drifted silently for many weeks, or upstream format shifted in a way the regex still parses but represents differently than expected). Verify the diff against the upstream tools reference before merging manually."
            fi
          } > "$RUNNER_TEMP/pr-body.md"

      - name: Open or update rolling PR
        if: steps.detect.outputs.drift == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: chore/tool-catalog-drift
        run: |
          set -euo pipefail
          # Same fork-scoping rationale as in the no-drift cleanup
          # step: match only PRs whose head repo owner is this repo's
          # owner so a fork PR cannot be mistakenly edited.
          existing=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number,headRepositoryOwner --jq "[.[] | select(.headRepositoryOwner.login == \"$GITHUB_REPOSITORY_OWNER\") | .number][0] // empty")
          if [ -n "$existing" ]; then
            gh pr edit "$existing" \
              --title "Sync claude_code tool catalog with upstream" \
              --body-file "$RUNNER_TEMP/pr-body.md"
            echo "Updated rolling PR #$existing."
            echo "number=$existing" >> "$GITHUB_OUTPUT"
          else
            pr_url=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Sync claude_code tool catalog with upstream" \
              --body-file "$RUNNER_TEMP/pr-body.md")
            pr_number=$(basename "$pr_url")
            echo "Opened rolling PR #$pr_number."
            echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          fi

      # Defense against the rolling-branch reuse race.  The merge
      # step below can leave ``gh pr merge --auto`` armed on the
      # rolling PR as a fallback when the synchronous merge cannot
      # complete (Copilot left an unresolved thread, transient
      # mergeability flip, etc.).  That auto-merge persists across
      # workflow runs because the PR is reused.  If a subsequent run
      # produces drift that is NOT auto-mergeable (removals present,
      # or additions over the threshold), this workflow force-pushes
      # non-eligible content to the same PR — but the previously
      # armed auto-merge is still active.  Once the new commit's
      # required checks pass and any blocking condition resolves,
      # GitHub would auto-merge the now-out-of-policy drift,
      # bypassing the strict allowlist gate that the
      # ``auto_mergeable`` flag exists to enforce.
      #
      # Disarm defensively in the non-eligible path: query
      # ``autoMergeRequest``, call ``--disable-auto`` only when armed
      # (the command exits non-zero on a no-op disarm), then verify
      # the disarm took.  Failing to disarm is a hard error — a
      # silently-armed auto-merge on out-of-policy drift is the
      # exact security failure this defense prevents.
      - name: Disarm stale auto-merge if drift no longer eligible
        if: steps.detect.outputs.drift == 'true' && steps.detect.outputs.auto_mergeable != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          auto_merge=$(gh pr view "$PR_NUMBER" --json autoMergeRequest --jq '.autoMergeRequest')
          if [ "$auto_merge" = "null" ]; then
            echo "Auto-merge is not armed on this PR; nothing to disarm."
            exit 0
          fi
          if ! gh pr merge --disable-auto "$PR_NUMBER"; then
            echo "::error::Failed to disable a previously-armed auto-merge on the rolling PR. The PR may merge automatically when blocking conditions resolve, landing drift that is now outside the gate (removals present, or additions above MAX_AUTO_MERGE_ADDITIONS). Investigate and disable the armed auto-merge manually before the next push to this branch."
            exit 1
          fi
          # Verify the disarm actually took.  ``--disable-auto`` can
          # return success while the underlying mutation races with
          # other PR-state changes; querying ``autoMergeRequest``
          # post-call confirms it is now ``null``.
          auto_merge=$(gh pr view "$PR_NUMBER" --json autoMergeRequest --jq '.autoMergeRequest')
          if [ "$auto_merge" != "null" ]; then
            echo "::error::gh pr merge --disable-auto exited 0 but autoMergeRequest is still non-null on the rolling PR. The PR may merge automatically when blocking conditions resolve, landing out-of-policy drift. Investigate immediately."
            exit 1
          fi
          echo "Disarmed previously-armed auto-merge on PR #$PR_NUMBER."

      # Wait for required status checks, then squash-merge
      # synchronously when CI is green; otherwise fall back to
      # enabling GitHub auto-merge so a later rerun-to-green can fire
      # the merge.  The synchronous path eliminates the
      # enable-then-fire race that the server-side auto-merge worker
      # occasionally drops after the last required check transitions
      # green.  Pattern adapted from the dependabot-auto-merge
      # workflow in milanhorvatovic/codex-ai-code-review-action;
      # security-review label handling is omitted because drift PRs
      # have no equivalent operator-applied gate (the strict
      # allowlist on ``auto_mergeable`` is the equivalent — anything
      # outside the gate never reaches this step).
      - name: Wait for required checks, then squash-merge
        if: steps.detect.outputs.drift == 'true' && steps.detect.outputs.auto_mergeable == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          # ``gh pr merge --auto`` is allowed to exit non-zero
          # (already enabled, PR already merged/closed, transient API
          # error), but we then verify the desired state was actually
          # reached: PR is MERGED/CLOSED, or PR is OPEN with
          # auto-merge enabled.  If neither holds, the call failed
          # for a real reason (bot App lacks merge permission, repo
          # ``Allow auto-merge`` disabled, GitHub outage) and the PR
          # would be silently stranded — surface the failure as a
          # workflow error instead of pretending success.
          verify_auto_merge_or_terminal() {
            local state_json pr_state has_auto
            if ! state_json=$(gh pr view "$PR_NUMBER" --json state,autoMergeRequest); then
              echo "::error::Failed to verify PR state after the gh pr merge --auto call. Cannot confirm whether auto-merge was enabled; manual intervention required."
              return 1
            fi
            pr_state=$(jq -r '.state' <<<"$state_json")
            has_auto=$(jq -r '.autoMergeRequest != null' <<<"$state_json")
            case "$pr_state" in
              MERGED|CLOSED)
                echo "PR is $pr_state; nothing more to do."
                return 0 ;;
              OPEN)
                if [ "$has_auto" = "true" ]; then
                  return 0
                fi
                echo "::error::gh pr merge --auto exited but autoMergeRequest is still null on an OPEN PR. The auto-merge enable failed for a real reason — likely the bot App lacks merge permission, the repository's 'Allow auto-merge' setting is disabled, or a GitHub-side error. Investigate the gh pr merge output above and re-run after fixing."
                return 1 ;;
              *)
                echo "::error::Unexpected PR state '$pr_state' after auto-merge attempt; manual intervention required."
                return 1 ;;
            esac
          }

          # Enable GitHub auto-merge and verify the call took.
          # Returns 0 on full success, 1 on any verification failure
          # (with appropriate ``::error::`` annotations).  Used both
          # as the unhappy-path fallback and as the re-arm safety net
          # when a required check fails — see the watch step below.
          arm_auto_merge() {
            gh pr merge --auto --squash "$PR_NUMBER" 2>&1 || true
            if ! verify_auto_merge_or_terminal; then
              return 1
            fi
            return 0
          }

          # ``--required`` filters to checks listed in the branch
          # ruleset's ``required_status_checks`` rule.  ``--watch``
          # polls until each reaches a terminal conclusion.
          # ``--fail-fast`` aborts on the first required check that
          # fails, surfacing the failure rather than waiting on the
          # rest.
          #
          # If a required check fails (terminally or flakily) the
          # watch exits non-zero.  This workflow is triggered only by
          # ``schedule`` and ``workflow_dispatch``, not by check
          # events on PRs, so without a re-arm step a manual
          # rerun-to-green of the failed check has no path to finish
          # the merge — the PR strands until next Monday.  Re-arm
          # via auto-merge so the worker fires when the rerun lands,
          # going through the same verified ``arm_auto_merge`` helper
          # so a real auto-merge enable failure is surfaced as a
          # second ``::error::``.  Exit 1 unconditionally so the
          # check failure stays visible as a workflow failure.
          if ! gh pr checks "$PR_NUMBER" --required --watch --fail-fast; then
            echo "::warning::A required check failed during the wait; enabling GitHub auto-merge as a re-armed safety net so a later rerun-to-green of the failed check can fire the merge without a manual workflow re-trigger."
            arm_auto_merge || true
            exit 1
          fi

          # Mergeability isn't stable between the watch returning and
          # this call: the base branch can move (the ruleset may have
          # ``strict_required_status_checks_policy: true``, in which
          # case BEHIND blocks the merge), GitHub can return a
          # transient merge-state error, or another rule (e.g.
          # ``required_review_thread_resolution`` if Copilot's review
          # left an unresolved thread) can become pending.  This
          # workflow doesn't re-trigger on base-branch updates or
          # review events, so a naked failure here would strand the
          # PR.  Fall back to verified auto-merge — same
          # ``arm_auto_merge`` helper used elsewhere — so a later
          # branch-update, transient-error recovery, or thread
          # resolution still completes the merge.
          if ! gh pr merge --squash "$PR_NUMBER"; then
            echo "::warning::Synchronous squash merge failed (mergeability may have changed since the check wait completed — base branch advanced, transient API error, branch is BEHIND, or an unresolved review thread blocks merge). Enabling GitHub auto-merge so a later mergeability-restoring event can fire the merge."
            if ! arm_auto_merge; then
              exit 1
            fi
          fi
