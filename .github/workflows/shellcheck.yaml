name: ShellCheck

on:
  pull_request:
    paths: ['.github/scripts/*.sh']
  push:
    branches: [main]
    paths: ['.github/scripts/*.sh']

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # @v6 as 7.0.1

      - name: Run shellcheck
        run: |
          shopt -s nullglob
          files=(.github/scripts/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found in .github/scripts; skipping ShellCheck."
            exit 0
          fi
          shellcheck "${files[@]}"
