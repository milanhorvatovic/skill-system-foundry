name: ShellCheck

on:
  pull_request:
    paths: ['.github/scripts/*.sh']
  push:
    branches: [main]
    paths: ['.github/scripts/*.sh']

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2

      - name: Run shellcheck
        run: shellcheck .github/scripts/*.sh
