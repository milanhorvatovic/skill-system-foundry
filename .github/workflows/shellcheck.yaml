name: ShellCheck

on:
  pull_request:
    paths: ['.github/scripts/*.sh']
  push:
    branches: [main]
    paths: ['.github/scripts/*.sh']

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # @v6 as 6.0.3

      - name: Run shellcheck
        run: |
          shopt -s nullglob
          files=(.github/scripts/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found in .github/scripts; skipping ShellCheck."
            exit 0
          fi
          shellcheck "${files[@]}"
