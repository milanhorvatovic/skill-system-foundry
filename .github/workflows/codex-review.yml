name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: >-
      !github.event.pull_request.draft &&
      vars.CODEX_REVIEW_USERS != '' &&
      contains(
        format(',{0},', vars.CODEX_REVIEW_USERS),
        format(',{0},', github.event.pull_request.user.login)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' }}

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          fetch-depth: 0

      - name: Skip when OPENAI_API_KEY is missing
        if: ${{ env.HAS_OPENAI_API_KEY != 'true' }}
        run: echo "OPENAI_API_KEY is not set. Skipping Codex review."

      - name: Build PR diff
        id: diff
        if: ${{ env.HAS_OPENAI_API_KEY == 'true' }}
        run: |
          git diff --no-color --unified=3 \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" > pr.diff
          if [ -s pr.diff ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "Diff is empty — nothing to review."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Codex review
        if: ${{ env.HAS_OPENAI_API_KEY == 'true' && steps.diff.outputs.has_changes == 'true' }}
        id: codex
        uses: openai/codex-action@086169432f1d2ab2f4057540b1754d550f6a1189 # @v1 as 1.4
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.3-codex
          sandbox: read-only
          prompt: |
            You are reviewing a GitHub pull request for this repository.
            Analyze `pr.diff` and the referenced files.

            Prioritize:
            1) Behavioral bugs and regressions
            2) Security and safety issues
            3) Missing tests for risky changes
            4) Violations of repository conventions:
               - `.github/copilot-instructions.md` — applies to all files
               - `.github/instructions/markdown.instructions.md` — applies only to `**/*.md` files
               - `.github/instructions/scripts.instructions.md` — applies only to `skill-system-foundry/scripts/**/*.py` files

            Return a concise Markdown review:
            - Start with `No high-confidence issues found.` if there are none.
            - Otherwise list findings ordered by severity.
            - For each finding include: title, impact, and exact file path with line number.

            Pull request #${{ github.event.pull_request.number }}:
            Title: ${{ github.event.pull_request.title }}
            Body:
            ${{ github.event.pull_request.body }}

      - name: Upsert PR comment
        if: ${{ env.HAS_OPENAI_API_KEY == 'true' && steps.codex.outputs.final-message != '' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # @v8 as 8.0.0
        env:
          CODEX_REVIEW: ${{ steps.codex.outputs.final-message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- codex-pr-review -->';
            const footer = `---\n*Generated by [Codex Review](${process.env.RUN_URL}) using gpt-5.3-codex*`;
            const body = [marker, '## Codex Review', process.env.CODEX_REVIEW, footer]
              .join('\n\n')
              .trim();

            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
