name: CodeQL
# GitHub-native SAST for the Python scripts, additive to the existing Snyk scan.
# Non-blocking by design: these contexts are not listed in the branch ruleset's
# required status checks, so findings surface in the Security tab without gating
# merges (and without interfering with the tool-catalog-drift auto-merge path,
# which waits only on required checks).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "21 7 * * 1"  # Mondays 07:21 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write  # upload the analysis results
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # @v6 as 7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # @v3 as 4.37.0
        with:
          languages: python
          # Interpreted language: no build step required.

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # @v3 as 4.37.0
        with:
          category: "/language:python"
