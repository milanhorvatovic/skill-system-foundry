name: Description eval (LLM)

# Maintainer-only, on-demand LLM activation accuracy for the meta-skill's own
# corpus.  Heuristic mode runs on every PR via python-tests.yaml; this workflow
# spends API tokens only when triggered manually.  No threshold gate — it runs
# with --soft and uploads the JSON report as an artifact for inspection.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  llm-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # @v5 as 5.6.0
        with:
          python-version: "3.12"

      - name: Run LLM description eval
        working-directory: skill-system-foundry
        run: >
          python scripts/evaluate_descriptions.py
          ../tests/skill-corpus/skill-system-foundry
          --skill-set . --llm --soft --json
          | tee ../description-eval-llm.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUTF8: "1"

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4 as 4.6.2
        with:
          name: description-eval-llm
          path: description-eval-llm.json
