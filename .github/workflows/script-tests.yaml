name: Script tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # @v4 as 4.4.0
        with:
          node-version: '20'

      - name: Run publish-review smoke test
        run: node .github/scripts/test-publish-review.js

      - name: Run merge-review-chunks smoke test
        run: node .github/scripts/test-merge-review-chunks.js
