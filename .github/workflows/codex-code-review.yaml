name: Codex code review

# Security model:
# - Uses `on: pull_request` so workflow YAML is always loaded from the base
#   branch; PR-head changes to workflow files do not affect the running workflow.
# - CODEOWNERS requires code-owner approval for .github/ changes, preventing
#   unauthorized modifications to workflows and review configuration.
# - We intentionally avoid `pull_request_target` — it runs with write access
#   against potentially untrusted PR code and requires dedicated security review.
# - Fork PRs cannot access repository secrets per GitHub's security model.
# - Review job: contents read-only, no write access.
# - Publish job: contents read + pull-requests write, receives only data
#   artifacts from the review job.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      has-changes: ${{ steps.codex.outputs.has-changes }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Run Codex review
        uses: milanhorvatovic/codex-ai-code-review-action/review@2f712445b8130b25542f3bcb0d6500c2db87b1ae # @v1 as 1.0.3
        id: codex
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ vars.CODEX_REVIEW_MODEL }}
          allowed-users: ${{ vars.CODEX_REVIEW_USERS }}
          review-reference-file: .github/codex/review-reference.md

      - name: Upload review artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4 as 4.6.2
        if: ${{ steps.codex.outputs.skipped != 'true' && steps.codex.outputs.has-changes == 'true' }}
        with:
          name: codex-review
          path: |
            .codex/review-output.json
            .codex/pr.diff
          include-hidden-files: true
          retention-days: 1

  publish:
    needs: review
    if: ${{ needs.review.outputs.has-changes == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download review artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # @v4 as 4.3.0
        with:
          name: codex-review
          path: .codex/

      - name: Publish PR review
        uses: milanhorvatovic/codex-ai-code-review-action/publish@2f712445b8130b25542f3bcb0d6500c2db87b1ae # @v1 as 1.0.3
        with:
          model: ${{ vars.CODEX_REVIEW_MODEL }}
          review-effort: ${{ vars.CODEX_REVIEW_EFFORT }}
          min-confidence: ${{ vars.CODEX_MIN_CONFIDENCE || '0' }}
