name: Codex code review

# Security model:
# - Workflow YAML is loaded from base branch (GitHub guarantee)
# - The integrity check step is intentionally kept inline in this YAML rather than in a
#   script file. Since the PR checkout contains code from the PR author, any file under
#   .github/scripts/ could be tampered with by a malicious PR to bypass verification.
#   Inline logic in this YAML is trusted because GitHub guarantees it is loaded from the
#   base branch, not the PR branch.
# - Scripts in .github/scripts/ are validated against CODEX_SCRIPT_HASHES repository variable
#   before execution. The variable contains approved SHA-256 hashes for each script.
# - Any script change requires admin to update the variable with the new hash.
# - Bidirectional check: files on disk must match files in variable, and all hashes must match.
# - Security boundaries are enforced by job permissions, not script provenance:
#   * review job:  contents: read only — read-only sandbox, cannot modify repo
#   * publish job: pull-requests: write only — can only post PR comments
# - Fork PRs cannot access repository secrets per GitHub's security model,
#   so untrusted forks cannot exfiltrate OPENAI_API_KEY or other secrets.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

env:
  CODEX_MODEL: gpt-5.3-codex

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Two-job architecture for permission isolation:
  # - "review" runs Codex in a read-only sandbox (contents: read only),
  #   so the third-party Codex action never has write access to the repo.
  # - "publish" receives the review artifact and posts the PR review
  #   (pull-requests: write only). No checkout, no third-party actions.

  # ── Job 1: Run Codex review (read-only) ──────────────────────────────
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Codex sandbox may need up to 30 min for large diffs
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.allowlist.outputs.allowed }}
      has-review: ${{ steps.save.outputs.has-review }}
    env:
      HAS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
      REVIEW_USERS_RAW: ${{ vars.CODEX_REVIEW_USERS }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify script integrity
        id: verify
        env:
          SCRIPT_HASHES: ${{ vars.CODEX_SCRIPT_HASHES }}
        run: |
          set -euo pipefail

          if [ -z "${SCRIPT_HASHES:-}" ]; then
            echo "::error::CODEX_SCRIPT_HASHES repository variable is not set. Configure it in Settings → Actions → Variables."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! echo "$SCRIPT_HASHES" | jq -e . > /dev/null 2>&1; then
            echo "::error::CODEX_SCRIPT_HASHES is not valid JSON. Please check the variable format."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          disk_files=$(find .github/scripts -type f -exec basename {} \; | sort)
          json_files=$(echo "$SCRIPT_HASHES" | jq -r 'keys | .[]' | sort)

          if [ "$disk_files" != "$json_files" ]; then
            echo "::error::Script set mismatch. Disk: $disk_files, JSON: $json_files"
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Hash match check - enforce exactly one hash per file
          for file in $disk_files; do
            computed_hash=$(sha256sum ".github/scripts/$file" | awk '{print $1}')
            hash_count=$(echo "$SCRIPT_HASHES" | jq -r ".[\"$file\"] | length")
            if [ "$hash_count" -ne 1 ]; then
              echo "::error::Expected exactly one hash for $file, found $hash_count. Please ensure CODEX_SCRIPT_HASHES has exactly one hash per file."
              echo "allowed=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            approved_hash=$(echo "$SCRIPT_HASHES" | jq -r ".[\"$file\"][0]")
            if [ "$computed_hash" != "$approved_hash" ]; then
              echo "::error::Hash mismatch for $file. Computed: $computed_hash, Approved: $approved_hash"
              echo "allowed=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          done

          echo "::notice::Script integrity verified"
          echo "allowed=true" >> "$GITHUB_OUTPUT"

      # This step gates all subsequent steps via the "allowed" output.
      # It checks the OPENAI_API_KEY secret, the CODEX_REVIEW_USERS variable,
      # and whether the PR author is in the allowlist.
      - name: Check prerequisites
        id: allowlist
        if: ${{ steps.verify.outputs.allowed != 'false' }}
        run: bash .github/scripts/check-allowlist.sh

      - name: Build PR diff
        id: diff
        if: ${{ steps.allowlist.outputs.allowed == 'true' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/build-pr-diff.sh

      - name: Run Codex review
        if: ${{ steps.allowlist.outputs.allowed == 'true' && steps.diff.outputs.has-changes == 'true' }}
        id: codex
        uses: openai/codex-action@086169432f1d2ab2f4057540b1754d550f6a1189 # @v1 as 1.4
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ env.CODEX_MODEL }}
          sandbox: read-only
          prompt: |
            You are reviewing a GitHub pull request for this repository.
            Analyze `.codex/pr.diff` and the referenced files.

            Prioritize:
            1) Behavioral bugs and regressions
            2) Security and safety issues
            3) Missing tests for risky changes
            4) Violations of repository conventions:
               - `.github/copilot-instructions.md` — applies to all files
               - `.github/instructions/markdown.instructions.md` — applies only to `**/*.md` files
               - `.github/instructions/scripts.instructions.md` — applies only to `skill-system-foundry/scripts/**/*.py` files

            Return STRICT JSON only (no markdown/code fences) with this schema:
            {
              "summary": "1-5 sentence description of what the PR changes and why",
              "changes": [
                "short bullet describing a logical change"
              ],
              "files": [
                {
                  "path": "repo-relative/path.ext",
                  "description": "short description of what changed in this file"
                }
              ],
              "findings": [
                {
                  "title": "short issue title",
                  "severity": "high|medium|low",
                  "path": "repo-relative/path.ext",
                  "line": 123,
                  "startLine": 120,
                  "comment": "why this matters and concrete fix guidance",
                  "suggestion": "exact replacement code for lines startLine..line (optional)"
                }
              ]
            }

            Rules:
            - Always include `summary`, `changes`, and `files` — even when there are no findings.
            - If there are no high-confidence issues, set `findings` to an empty array.
            - Include only high-confidence findings in `findings`.
            - `path` must be a repo-relative path.
            - `line` in findings must refer to a changed line on the RIGHT side of this PR diff.
            - `startLine` is optional. Use it only when the suggestion spans multiple consecutive lines. It must be ≤ `line`.
            - When a finding has a concrete fix, include `suggestion` with the exact replacement source code (preserve indentation). The suggestion replaces lines `startLine` through `line` (or just `line` when `startLine` is omitted). Omit `suggestion` when the fix is non-trivial or ambiguous.
            - Keep all text concise and action-oriented.

            Pull request #${{ github.event.pull_request.number }}:
            Title: ${{ github.event.pull_request.title }}
            Body:
            ${{ github.event.pull_request.body }}

      - name: Save review output
        id: save
        if: ${{ steps.allowlist.outputs.allowed == 'true' && steps.codex.outputs.final-message != '' }}
        env:
          CODEX_REVIEW: ${{ steps.codex.outputs.final-message }}
        run: bash .github/scripts/prepare-codex-artifacts.sh

      - name: Upload review artifacts
        if: ${{ steps.save.outputs.has-review == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # @v7 as 7.0.0
        with:
          name: codex-review
          path: .codex/
          include-hidden-files: true
          retention-days: 1

  # ── Job 2: Publish PR review (write access) ──────────────────────────
  publish:
    needs: review
    if: ${{ needs.review.outputs.allowed == 'true' && needs.review.outputs.has-review == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      MAX_INLINE_CONVERSATIONS: '20'
      MAX_SUMMARY_CHARS: '4000'
      MAX_CHANGE_ITEMS: '50'
      MAX_FILES_IN_TABLE: '100'
      MAX_REVIEW_BODY_CHARS: '60000'
      GITHUB_MAX_BODY_CHARS: '65536'

    steps:
      - name: Download review artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # @v8 as 8.0.0
        with:
          name: codex-review
          path: .codex

      - name: Verify publish script integrity
        env:
          SCRIPT_HASHES: ${{ vars.CODEX_SCRIPT_HASHES }}
        run: |
          set -euo pipefail
          hash=$(sha256sum .codex/scripts/publish-review.js | awk '{print $1}')
          approved=$(echo "$SCRIPT_HASHES" | jq -r '.["publish-review.js"][]')
          if ! echo "$approved" | grep -q "^${hash}$"; then
            echo "::error::Hash mismatch for publish-review.js. Computed: $hash"
            exit 1
          fi
          echo "::notice::publish-review.js integrity verified"

      - name: Publish PR review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # @v8 as 8.0.0
        with:
          script: |
            const publish = require(`${process.env.GITHUB_WORKSPACE}/.codex/scripts/publish-review.js`)
            await publish({ github, context, core, process })
