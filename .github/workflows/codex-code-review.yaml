name: Codex code review

# Security model:
# - Uses `on: pull_request` so workflow YAML is always loaded from the base
#   branch; PR-head changes to workflow files do not affect the running workflow.
# - CODEOWNERS requires code-owner approval for .github/ changes, preventing
#   unauthorized modifications to workflows and review configuration.
# - We intentionally avoid `pull_request_target` — it runs with write access
#   against potentially untrusted PR code and requires dedicated security review.
# - Fork PRs cannot access repository secrets per GitHub's security model.
# - Prepare job: contents read-only, builds diff and prompts.
# - Review job: contents read-only, runs Codex per chunk via matrix strategy.
# - Publish job: contents read + pull-requests write, merges and posts review.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      has-changes: ${{ steps.prepare.outputs.has-changes }}
      chunk-count: ${{ steps.prepare.outputs.chunk-count }}
      chunk-matrix: ${{ steps.prepare.outputs.chunk-matrix }}
      skipped: ${{ steps.prepare.outputs.skipped }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare review
        uses: milanhorvatovic/codex-ai-code-review-action/prepare@10963e520adfc069726e98ecdc9c6eb530947928 # feat/codex-action-migration
        id: prepare
        with:
          allowed-users: ${{ vars.CODEX_REVIEW_USERS }}
          review-reference-file: .github/codex/review-reference.md

      - name: Upload prepare artifacts
        if: ${{ steps.prepare.outputs.skipped != 'true' && steps.prepare.outputs.has-changes == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # @v7 as 7.0.0
        with:
          name: codex-prepare
          path: .codex/
          include-hidden-files: true
          retention-days: 1

  review:
    needs: prepare
    if: ${{ needs.prepare.outputs.skipped != 'true' && needs.prepare.outputs.has-changes == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.chunk-matrix) }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Review chunk ${{ matrix.chunk }}
        uses: milanhorvatovic/codex-ai-code-review-action/review@10963e520adfc069726e98ecdc9c6eb530947928 # feat/codex-action-migration
        with:
          chunk: ${{ matrix.chunk }}
          model: ${{ vars.CODEX_REVIEW_MODEL }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

  publish:
    needs: [prepare, review]
    if: ${{ always() && needs.prepare.outputs.skipped != 'true' && needs.prepare.outputs.has-changes == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Publish PR review
        uses: milanhorvatovic/codex-ai-code-review-action/publish@10963e520adfc069726e98ecdc9c6eb530947928 # feat/codex-action-migration
        with:
          github-token: ${{ github.token }}
          expected-chunks: ${{ needs.prepare.outputs.chunk-count }}
          model: ${{ vars.CODEX_REVIEW_MODEL }}
          review-effort: ${{ vars.CODEX_REVIEW_EFFORT }}
          min-confidence: ${{ vars.CODEX_MIN_CONFIDENCE || '0' }}
