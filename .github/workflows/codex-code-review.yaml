name: Codex code review

# Security: uses `on: pull_request` so workflow YAML is always loaded from the
# base branch. The review job runs read-only; only the publish job gets
# pull-requests: write. Fork PRs cannot access repository secrets.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      has-changes: ${{ steps.codex.outputs.has-changes }}
    steps:
      - uses: milanhorvatovic/codex-ai-code-review-action/review@2f712445b8130b25542f3bcb0d6500c2db87b1ae # @v1 as 1.0.3
        id: codex
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ vars.CODEX_REVIEW_MODEL }}
          allowed-users: ${{ vars.CODEX_REVIEW_USERS }}
          review-reference-file: .github/codex/review-reference.md

  publish:
    needs: review
    if: ${{ needs.review.outputs.has-changes == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: milanhorvatovic/codex-ai-code-review-action/publish@2f712445b8130b25542f3bcb0d6500c2db87b1ae # @v1 as 1.0.3
        with:
          model: ${{ vars.CODEX_REVIEW_MODEL }}
          review-effort: ${{ vars.CODEX_REVIEW_EFFORT }}
          min-confidence: ${{ vars.CODEX_MIN_CONFIDENCE || '0' }}
