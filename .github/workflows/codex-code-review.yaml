name: Codex code review

# Security model:
# - Uses `on: pull_request` so workflow YAML is always loaded from the base
#   branch; PR-head changes to workflow files do not affect the running workflow.
# - CODEOWNERS requires code-owner approval for .github/ paths (workflows,
#   scripts, codex config), preventing unauthorized modifications.
# - We intentionally avoid `pull_request_target` — it runs with write access
#   against potentially untrusted PR code and requires dedicated security review.
# - Fork PRs cannot access repository secrets per GitHub's security model.
# - Prepare job: contents read-only, builds diff and prompts.
# - Review job: contents read-only, runs Codex per chunk via matrix strategy.
# - Publish job: contents read + pull-requests write. Runs the SHA-pinned
#   codex-ai-code-review-action/publish action to post review comments.
#   Only data artifacts from the prepare and review jobs are consumed.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      has-changes: ${{ steps.prepare.outputs.has-changes }}
      chunk-count: ${{ steps.prepare.outputs.chunk-count }}
      chunk-matrix: ${{ steps.prepare.outputs.chunk-matrix }}
      skipped: ${{ steps.prepare.outputs.skipped }}
    steps:
      - name: Validate retain-findings configuration
        env:
          RETAIN: ${{ vars.CODEX_RETAIN_FINDINGS }}
          DAYS: ${{ vars.CODEX_RETAIN_FINDINGS_DAYS }}
        run: |
          if [[ -z "$RETAIN" ]]; then
            echo "::error::CODEX_RETAIN_FINDINGS is not defined. Set it to 'true' or 'false' as a repository variable."
            exit 1
          fi
          if [[ "$RETAIN" != "true" && "$RETAIN" != "false" ]]; then
            echo "::error::CODEX_RETAIN_FINDINGS must be 'true' or 'false'. Got: '$RETAIN'"
            exit 1
          fi
          if [[ "$RETAIN" == "true" ]]; then
            if ! [[ "$DAYS" =~ ^[1-9][0-9]*$ ]] || (( 10#$DAYS > 90 )); then
              echo "::error::CODEX_RETAIN_FINDINGS=true requires CODEX_RETAIN_FINDINGS_DAYS to be an integer between 1 and 90. Got: '$DAYS'"
              exit 1
            fi
          fi

      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare review
        uses: milanhorvatovic/codex-ai-code-review-action/prepare@32cedc30758526efb279b82567144f0585be8321 # @v2 as 2.0.0
        id: prepare
        with:
          allow-users: ${{ vars.CODEX_REVIEW_USERS }}
          review-reference-file: .github/codex/review-reference.md

      - name: Upload prepare artifacts
        if: ${{ steps.prepare.outputs.skipped != 'true' && steps.prepare.outputs.has-changes == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # @v7 as 7.0.0
        with:
          name: codex-prepare
          path: .codex/
          include-hidden-files: true
          retention-days: 1

  review:
    needs: prepare
    if: ${{ needs.prepare.outputs.skipped != 'true' && needs.prepare.outputs.has-changes == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.chunk-matrix) }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Review chunk ${{ matrix.chunk }}
        uses: milanhorvatovic/codex-ai-code-review-action/review@32cedc30758526efb279b82567144f0585be8321 # @v2 as 2.0.0
        with:
          chunk: ${{ matrix.chunk }}
          model: ${{ vars.CODEX_REVIEW_MODEL }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

  publish:
    needs: [prepare, review]
    if: ${{ always() && needs.prepare.outputs.skipped != 'true' && needs.prepare.outputs.has-changes == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download review artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # @v8 as 8.0.0
        with:
          path: .codex/
          merge-multiple: true

      - name: Publish PR review
        uses: milanhorvatovic/codex-ai-code-review-action/publish@32cedc30758526efb279b82567144f0585be8321 # @v2 as 2.0.0
        with:
          github-token: ${{ github.token }}
          expected-chunks: ${{ needs.prepare.outputs.chunk-count }}
          model: ${{ vars.CODEX_REVIEW_MODEL }}
          review-effort: ${{ vars.CODEX_REVIEW_EFFORT }}
          min-confidence: ${{ vars.CODEX_MIN_CONFIDENCE || '0' }}
          retain-findings: ${{ vars.CODEX_RETAIN_FINDINGS }}
          retain-findings-days: ${{ vars.CODEX_RETAIN_FINDINGS_DAYS }}
