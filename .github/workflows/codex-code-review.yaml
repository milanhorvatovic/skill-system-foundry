name: Codex code review

# Security model:
# - This workflow uses `on: pull_request`. For same-repo PRs, the workflow YAML
#   is loaded from the PR branch (head). For fork PRs, secrets are not available.
# - Protection against tampering relies on CODEOWNERS (.github/CODEOWNERS requires
#   code-owner approval for .github/workflows/ and .github/scripts/) combined with
#   the "Require review from Code Owners" branch protection rule. Without both, a
#   merged PR could weaken the workflow for all subsequent PRs.
# - Security boundaries are enforced by job permissions, not script provenance:
#   * review job:  contents: read only — read-only sandbox, cannot modify repo
#   * publish job: pull-requests: write only — can only post PR comments
# - Fork PRs cannot access repository secrets per GitHub's security model,
#   so untrusted forks cannot exfiltrate OPENAI_API_KEY or other secrets.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Two-job architecture for permission isolation:
  # - "review" runs Codex in a read-only sandbox (contents: read only),
  #   so the third-party Codex action never has write access to the repo.
  # - "publish" receives the review artifact and posts the PR review
  #   (pull-requests: write only). No checkout, no third-party actions.

  # ── Job 1: Run Codex review (read-only) ──────────────────────────────
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Codex sandbox may need up to 30 min for large diffs
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.allowlist.outputs.allowed }}
      has-review: ${{ steps.save.outputs.has-review }}
    env:
      HAS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
      REVIEW_USERS_RAW: ${{ vars.CODEX_REVIEW_USERS }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      # This step gates all subsequent steps via the "allowed" output.
      # It checks the OPENAI_API_KEY secret, the CODEX_REVIEW_USERS variable,
      # and whether the PR author is in the allowlist.
      - name: Check prerequisites
        id: allowlist
        run: bash .github/scripts/check-allowlist.sh

      - name: Build PR diff
        id: diff
        if: ${{ steps.allowlist.outputs.allowed == 'true' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/build-pr-diff.sh

      - name: Build prompt
        if: ${{ steps.allowlist.outputs.allowed == 'true' && steps.diff.outputs.has-changes == 'true' }}
        env:
          PROMPT_FILE: .github/codex/review-prompt.md
          REFERENCE_FILE: .github/codex/review-reference.md
          DIFF_FILE: .codex/pr.diff
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_RUN_ID: ${{ github.run_id }}
          OUTPUT_FILE: .codex/prompt.txt
        run: bash .github/scripts/build-codex-prompt.sh

      # model input is optional: action.yml has required: false, default: "".
      # When CODEX_REVIEW_MODEL is undefined, GitHub substitutes an empty
      # string — identical to the action's default — so the action falls
      # back to its built-in model selection.
      - name: Run Codex review
        if: ${{ steps.allowlist.outputs.allowed == 'true' && steps.diff.outputs.has-changes == 'true' }}
        id: codex
        uses: openai/codex-action@086169432f1d2ab2f4057540b1754d550f6a1189 # @v1 as 1.4
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ vars.CODEX_REVIEW_MODEL }}
          sandbox: read-only
          prompt-file: .codex/prompt.txt
          output-schema-file: .github/codex/review-output-schema.json
          output-file: .codex/review-output.json

      - name: Save review output
        id: save
        if: ${{ steps.allowlist.outputs.allowed == 'true' && steps.codex.outcome == 'success' }}
        run: bash .github/scripts/prepare-codex-artifacts.sh

      - name: Upload review artifacts
        if: ${{ steps.save.outputs.has-review == 'true' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # @v7 as 7.0.0
        with:
          name: codex-review
          path: .codex/
          include-hidden-files: true
          retention-days: 1

  # ── Job 2: Publish PR review (write access) ──────────────────────────
  publish:
    needs: review
    if: ${{ needs.review.outputs.allowed == 'true' && needs.review.outputs.has-review == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      CODEX_REVIEW_MODEL: ${{ vars.CODEX_REVIEW_MODEL }}
      CODEX_REVIEW_EFFORT: ${{ vars.CODEX_REVIEW_EFFORT }}
      MIN_CONFIDENCE: '0'
      MAX_INLINE_CONVERSATIONS: '20'
      MAX_SUMMARY_CHARS: '4000'
      MAX_CHANGE_ITEMS: '50'
      MAX_FILES_IN_TABLE: '100'
      MAX_REVIEW_BODY_CHARS: '60000'
      GITHUB_MAX_BODY_CHARS: '65536'

    steps:
      - name: Download review artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # @v8 as 8.0.0
        with:
          name: codex-review
          path: .codex

      - name: Publish PR review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # @v8 as 8.0.0
        with:
          script: |
            const publish = require(`${process.env.GITHUB_WORKSPACE}/.codex/scripts/publish-review.js`)
            await publish({ github, context, core, process })
