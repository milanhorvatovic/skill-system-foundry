name: Codex code review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

env:
  CODEX_MODEL: gpt-5.3-codex

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Two-job architecture for permission isolation:
  # - "review" runs Codex in a read-only sandbox (contents: read only),
  #   so the third-party Codex action never has write access to the repo.
  # - "publish" receives the review artifact and posts the PR review
  #   (pull-requests: write only). No checkout, no third-party actions.

  # ── Job 1: Run Codex review (read-only) ──────────────────────────────
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Codex sandbox may need up to 30 min for large diffs
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.allowlist.outputs.allowed }}
      has-review: ${{ steps.save.outputs.has-review }}
    env:
      HAS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
      REVIEW_USERS_RAW: ${{ vars.CODEX_REVIEW_USERS }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}

    steps:
      # This step gates all subsequent steps via the "allowed" output.
      # It checks the OPENAI_API_KEY secret, the CODEX_REVIEW_USERS variable,
      # and whether the PR author is in the allowlist.
      - name: Check prerequisites
        id: allowlist
        run: |
          set -euo pipefail
          if [ "$HAS_OPENAI_API_KEY" != "true" ]; then
            echo "OPENAI_API_KEY is not set. Skipping Codex review."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$REVIEW_USERS_RAW" ]; then
            echo "CODEX_REVIEW_USERS is not set. Skipping Codex review."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          allowed=false
          pr_author_lower="$(printf '%s' "$PR_AUTHOR" | tr '[:upper:]' '[:lower:]')"
          normalized_users="$(
            printf '%s' "$REVIEW_USERS_RAW" \
              | tr '[:upper:]' '[:lower:]' \
              | tr ',\r\n\t' '\n' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
              | sed '/^$/d'
          )"

          while IFS= read -r username; do
            if [ "$username" = "$pr_author_lower" ]; then
              allowed=true
              break
            fi
          done <<< "$normalized_users"

          echo "allowed=$allowed" >> "$GITHUB_OUTPUT"
          if [ "$allowed" != "true" ]; then
            echo "PR author '$PR_AUTHOR' is not in CODEX_REVIEW_USERS. Skipping review."
          fi

      - name: Checkout PR
        if: ${{ steps.allowlist.outputs.allowed == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Build PR diff
        id: diff
        if: ${{ steps.allowlist.outputs.allowed == 'true' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # fetch-depth: 0 normally makes the base SHA available locally.
          # Fetch explicitly as a fallback (e.g. when the base branch was force-pushed).
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "::warning::Base SHA ${BASE_SHA} not found locally — fetching from origin"
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 -w0)" \
              fetch --no-tags origin "${BASE_SHA}"
          fi
          mkdir -p .codex
          git diff --no-color --unified=3 "${BASE_SHA}...${HEAD_SHA}" > .codex/pr.diff
          if [ -s .codex/pr.diff ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "Diff is empty — nothing to review."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Codex review
        if: ${{ steps.allowlist.outputs.allowed == 'true' && steps.diff.outputs.has-changes == 'true' }}
        id: codex
        uses: openai/codex-action@086169432f1d2ab2f4057540b1754d550f6a1189 # @v1 as 1.4
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ env.CODEX_MODEL }}
          sandbox: read-only
          prompt: |
            You are reviewing a GitHub pull request for this repository.
            Analyze `.codex/pr.diff` and the referenced files.

            Prioritize:
            1) Behavioral bugs and regressions
            2) Security and safety issues
            3) Missing tests for risky changes
            4) Violations of repository conventions:
               - `.github/copilot-instructions.md` — applies to all files
               - `.github/instructions/markdown.instructions.md` — applies only to `**/*.md` files
               - `.github/instructions/scripts.instructions.md` — applies only to `skill-system-foundry/scripts/**/*.py` files

            Return STRICT JSON only (no markdown/code fences) with this schema:
            {
              "summary": "1-5 sentence description of what the PR changes and why",
              "changes": [
                "short bullet describing a logical change"
              ],
              "files": [
                {
                  "path": "repo-relative/path.ext",
                  "description": "short description of what changed in this file"
                }
              ],
              "findings": [
                {
                  "title": "short issue title",
                  "severity": "high|medium|low",
                  "path": "repo-relative/path.ext",
                  "line": 123,
                  "startLine": 120,
                  "comment": "why this matters and concrete fix guidance",
                  "suggestion": "exact replacement code for lines startLine..line (optional)"
                }
              ]
            }

            Rules:
            - Always include `summary`, `changes`, and `files` — even when there are no findings.
            - If there are no high-confidence issues, set `findings` to an empty array.
            - Include only high-confidence findings in `findings`.
            - `path` must be a repo-relative path.
            - `line` in findings must refer to a changed line on the RIGHT side of this PR diff.
            - `startLine` is optional. Use it only when the suggestion spans multiple consecutive lines. It must be ≤ `line`.
            - When a finding has a concrete fix, include `suggestion` with the exact replacement source code (preserve indentation). The suggestion replaces lines `startLine` through `line` (or just `line` when `startLine` is omitted). Omit `suggestion` when the fix is non-trivial or ambiguous.
            - Keep all text concise and action-oriented.

            Pull request #${{ github.event.pull_request.number }}:
            Title: ${{ github.event.pull_request.title }}
            Body:
            ${{ github.event.pull_request.body }}

      - name: Save review output
        id: save
        if: ${{ steps.allowlist.outputs.allowed == 'true' && steps.codex.outputs.final-message != '' }}
        env:
          CODEX_REVIEW: ${{ steps.codex.outputs.final-message }}
        run: |
          mkdir -p .codex
          printf '%s' "$CODEX_REVIEW" > .codex/review-output.txt
          echo "has-review=true" >> "$GITHUB_OUTPUT"

      - name: Upload review artifacts
        if: ${{ steps.save.outputs.has-review == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4 as 4.6.2
        with:
          name: codex-review
          path: .codex/
          retention-days: 1

  # ── Job 2: Publish PR review (write access) ──────────────────────────
  publish:
    needs: review
    if: ${{ needs.review.outputs.allowed == 'true' && needs.review.outputs.has-review == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      MAX_INLINE_CONVERSATIONS: '20'
      MAX_SUMMARY_CHARS: '4000'
      MAX_CHANGE_ITEMS: '50'
      MAX_FILES_IN_TABLE: '100'
      MAX_REVIEW_BODY_CHARS: '60000'
      GITHUB_MAX_BODY_CHARS: '65536'
      MAX_FALLBACK_TEXT_CHARS: '12000'

    steps:
      - name: Download review artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # @v4 as 4.3.0
        with:
          name: codex-review
          path: .codex

      - name: Publish PR review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # @v8 as 8.0.0
        with:
          script: |
            const fs = require('node:fs');
            const crypto = require('node:crypto');

            const maxInlineConversations = Number(process.env.MAX_INLINE_CONVERSATIONS);
            const githubMaxBodyChars = Number(process.env.GITHUB_MAX_BODY_CHARS);
            const maxFallbackTextChars = Number(process.env.MAX_FALLBACK_TEXT_CHARS);
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const prHeadSha = context.payload.pull_request.head.sha;

            function tryParseJson(text) {
              try {
                return JSON.parse(text);
              } catch {
                return null;
              }
            }

            function parseStructuredReview(raw) {
              const trimmed = raw.trim();
              let parsed = tryParseJson(trimmed);
              if (parsed) return parsed;

              const fenced = trimmed.match(/```(?:json)?\s*([\s\S]*?)```/i);
              if (fenced) {
                parsed = tryParseJson(fenced[1].trim());
                if (parsed) return parsed;
              }

              const firstBrace = trimmed.indexOf('{');
              const lastBrace = trimmed.lastIndexOf('}');
              if (firstBrace !== -1 && lastBrace > firstBrace) {
                parsed = tryParseJson(trimmed.slice(firstBrace, lastBrace + 1));
                if (parsed) return parsed;
              }
              return null;
            }

            function parseAddedLinesByFile(diffText) {
              const addedByFile = new Map();
              let currentFile = null;
              let newLine = null;

              for (const rawLine of diffText.split('\n')) {
                const line = rawLine.replace(/\r$/, '');

                if (line.startsWith('diff --git ')) {
                  currentFile = null;
                  newLine = null;
                  continue;
                }

                // Only treat +++ as a file header before the first hunk.
                // Inside a hunk (newLine != null), +++ is a content line.
                if (line.startsWith('+++ ') && newLine == null) {
                  const nextPath = line.slice(4).trim();
                  if (nextPath === '/dev/null') {
                    currentFile = null;
                    continue;
                  }
                  currentFile = nextPath.startsWith('b/') ? nextPath.slice(2) : nextPath;
                  if (!addedByFile.has(currentFile)) {
                    addedByFile.set(currentFile, new Set());
                  }
                  continue;
                }

                const hunkMatch = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (hunkMatch) {
                  newLine = Number(hunkMatch[1]);
                  continue;
                }

                if (!currentFile || newLine == null) {
                  continue;
                }

                if (line.startsWith('+')) {
                  addedByFile.get(currentFile).add(newLine);
                  newLine += 1;
                  continue;
                }

                if (line.startsWith('-')) {
                  continue;
                }

                if (line.startsWith(' ')) {
                  newLine += 1;
                  continue;
                }
              }

              return addedByFile;
            }

            function normalizePath(pathValue) {
              return String(pathValue || '')
                .trim()
                .replace(/^`+|`+$/g, '')
                .replace(/^\.\/+/, '')
                .replace(/^(?:a|b)\//, '');
            }

            function escapeTableCell(text) {
              return String(text || '').trim().replace(/\|/g, '\\|').replace(/\n/g, ' ');
            }

            function normalizeFinding(finding) {
              const title = String(finding?.title || '').trim();
              const severity = String(finding?.severity || 'medium').trim().toLowerCase();
              const path = normalizePath(finding?.path);
              const line = Number(finding?.line);
              const startLine = Number(finding?.startLine) || null;
              const comment = String(finding?.comment || '').trim();
              const rawSuggestion = finding?.suggestion != null ? String(finding.suggestion) : '';
              const suggestion = rawSuggestion.length > 0 ? rawSuggestion : null;
              return { title, severity, path, line, startLine, comment, suggestion };
            }

            const codexReview = fs.readFileSync('.codex/review-output.txt', 'utf8');
            const parsed = parseStructuredReview(codexReview);
            const parsedFindings = Array.isArray(parsed?.findings) ? parsed.findings : [];
            const findings = parsedFindings.map(normalizeFinding);
            const summaryText = String(parsed?.summary || '').trim();
            const changes = Array.isArray(parsed?.changes) ? parsed.changes.map(c => String(c).trim()).filter(Boolean) : [];
            const files = Array.isArray(parsed?.files) ? parsed.files : [];

            const diffText = fs.readFileSync('.codex/pr.diff', 'utf8');
            const addedByFile = parseAddedLinesByFile(diffText);
            const totalChangedFiles = (diffText.match(/^diff --git /gm) || []).length;

            const reviewComments = [];
            let skippedInvalidLocation = 0;
            let skippedIncomplete = 0;

            const existingReviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number: issue_number,
              per_page: 100,
            });
            const existingInlineMarkers = new Set(
              existingReviewComments
                .filter((comment) => comment.user?.type === 'Bot')
                .map((comment) => {
                  const match = comment.body?.match(/<!-- codex-inline:([a-f0-9]{16}) -->/);
                  return match ? match[1] : null;
                })
                .filter(Boolean),
            );

            for (const finding of findings) {
              if (!finding.title || !finding.path || !Number.isInteger(finding.line) || finding.line <= 0 || !finding.comment) {
                skippedIncomplete += 1;
                continue;
              }

              const addedLines = addedByFile.get(finding.path);
              if (!addedLines || !addedLines.has(finding.line)) {
                skippedInvalidLocation += 1;
                continue;
              }

              const signature = crypto
                .createHash('sha256')
                .update(`${finding.path}|${finding.line}|${finding.title}|${finding.severity}`)
                .digest('hex')
                .slice(0, 16);
              if (existingInlineMarkers.has(signature)) {
                continue;
              }

              const alertType = { high: 'CAUTION', medium: 'WARNING', low: 'NOTE' }[finding.severity] || 'WARNING';
              const suggestionBlock = finding.suggestion
                ? `\n\n\`\`\`suggestion\n${finding.suggestion}\n\`\`\``
                : '';
              const commentBody = `> [!${alertType}]\n> **${finding.title}**\n\n${finding.comment}${suggestionBlock}\n\n<!-- codex-inline:${signature} -->`;
              const commentObj = {
                path: finding.path,
                line: finding.line,
                side: 'RIGHT',
                body: commentBody,
              };
              if (finding.startLine && Number.isInteger(finding.startLine) && finding.startLine > 0 && finding.startLine < finding.line && addedLines.has(finding.startLine)) {
                commentObj.start_line = finding.startLine;
                commentObj.start_side = 'RIGHT';
              }
              reviewComments.push(commentObj);

              if (reviewComments.length >= maxInlineConversations) {
                break;
              }
            }

            const reviewMarker = '<!-- codex-pr-review -->';
            const maxSummaryChars = Number(process.env.MAX_SUMMARY_CHARS);
            const maxChangeItems = Number(process.env.MAX_CHANGE_ITEMS);
            const maxFilesInTable = Number(process.env.MAX_FILES_IN_TABLE);
            const maxReviewBodyChars = Number(process.env.MAX_REVIEW_BODY_CHARS);

            // "N out of N" format matches Copilot's review output.
            function buildReviewedLine(commentCount) {
              const commentLabel = commentCount > 0 ? `${commentCount} comment(s)` : 'no new comments';
              return `Codex reviewed ${totalChangedFiles} out of ${totalChangedFiles} changed files in this pull request and generated ${commentLabel}.`;
            }

            function buildFirstReviewBody(commentCount) {
              const reviewedLine = buildReviewedLine(commentCount);
              const sections = ['## Pull request overview'];
              if (summaryText) {
                const summary = summaryText.length > maxSummaryChars
                  ? `${summaryText.slice(0, maxSummaryChars)}\n\n...(summary truncated)`
                  : summaryText;
                sections.push(summary);
              }
              if (changes.length > 0) {
                const limitedChanges = changes.slice(0, maxChangeItems);
                const changeLines = limitedChanges.map(c => `- ${c}`);
                if (changes.length > maxChangeItems) {
                  changeLines.push(`- ...and ${changes.length - maxChangeItems} more change(s)`);
                }
                sections.push(`**Changes:**\n${changeLines.join('\n')}`);
              }
              let fileTable = '';
              if (files.length > 0) {
                const limitedFiles = files.slice(0, maxFilesInTable);
                const rows = limitedFiles.map(f => `| \`${normalizePath(f.path)}\` | ${escapeTableCell(f.description)} |`);
                if (files.length > maxFilesInTable) {
                  rows.push(`| ... | ${files.length - maxFilesInTable} more file(s) not shown |`);
                }
                fileTable = `| File | Description |\n| ---- | ----------- |\n${rows.join('\n')}`;
              }
              const reviewedSection = fileTable
                ? `### Reviewed changes\n\n${reviewedLine}\n\n<details>\n<summary>Show a summary per file</summary>\n\n${fileTable}\n\n</details>`
                : `### Reviewed changes\n\n${reviewedLine}`;
              sections.push(reviewedSection);
              let body = sections.join('\n\n');
              if (body.length > maxReviewBodyChars) {
                body = `${body.slice(0, maxReviewBodyChars)}\n\n...(review truncated to fit GitHub limits)`;
              }
              return body;
            }

            function buildSubsequentReviewBody(commentCount) {
              const reviewedLine = buildReviewedLine(commentCount);
              return `## Pull request overview\n\n${reviewedLine}`;
            }

            function buildFallbackBody() {
              const fallbackText = codexReview.trim();
              const fallbackTextLimited = fallbackText.length > maxFallbackTextChars ? `${fallbackText.slice(0, maxFallbackTextChars)}\n...(truncated)` : fallbackText;
              return fallbackText
                ? `## Pull request overview\n\nCould not parse structured Codex output. Raw response:\n\n\`\`\`\n${fallbackTextLimited}\n\`\`\``
                : '## Pull request overview\n\nCodex returned an empty response.';
            }

            function buildMetadataSection(skippedLoc, skippedInc, error) {
              const notes = [
                skippedLoc > 0 ? `Skipped ${skippedLoc} finding(s) not on changed RIGHT-side lines.` : null,
                skippedInc > 0 ? `Skipped ${skippedInc} incomplete finding(s).` : null,
                error ? `Failed to post inline conversations: ${error}` : null,
              ].filter(Boolean);
              return notes.length > 0 ? `\n\n<details>\n<summary>Review metadata</summary>\n\n${notes.join('\n')}\n\n</details>` : '';
            }

            function buildFooter() {
              return `\n\n---\n*Generated by [Codex Review](${process.env.RUN_URL}) using ${process.env.CODEX_MODEL}*`;
            }

            // GitHub hard limit for review body is 65,536 characters.
            // Apply this after all sections (marker, metadata, footer) are assembled.
            function capReviewBody(body) {
              if (body.length <= githubMaxBodyChars) return body;
              const suffix = '\n\n...(review truncated to fit GitHub limits)';
              return body.slice(0, githubMaxBodyChars - suffix.length) + suffix;
            }

            // Detect isFirstReview via pulls.listReviews
            const existingReviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: issue_number,
              per_page: 100,
            });
            const isFirstReview = !existingReviews.some(
              (review) => review.user?.type === 'Bot' && review.body?.includes(reviewMarker),
            );

            // Each push creates a NEW review (never upserted). This matches
            // Copilot's behavior: every synchronize event produces a fresh review
            // so the PR timeline shows the review history per push.
            let inlineError = '';
            try {
              const commentCount = reviewComments.length;
              let body;
              if (!parsed) {
                body = buildFallbackBody();
              } else if (isFirstReview) {
                body = buildFirstReviewBody(commentCount);
              } else {
                body = buildSubsequentReviewBody(commentCount);
              }
              body += buildMetadataSection(skippedInvalidLocation, skippedIncomplete, '');
              body += buildFooter();
              body = capReviewBody(`${reviewMarker}\n\n${body}`);

              const reviewPayload = {
                owner,
                repo,
                pull_number: issue_number,
                commit_id: prHeadSha,
                event: 'COMMENT',
                body,
              };
              if (reviewComments.length > 0) {
                reviewPayload.comments = reviewComments;
              }
              await github.rest.pulls.createReview(reviewPayload);
            } catch (error) {
              inlineError = error.message;
              core.warning(`Failed to create review: ${inlineError}`);

              // If review with comments failed, retry without comments
              if (reviewComments.length > 0) {
                try {
                  let body;
                  if (!parsed) {
                    body = buildFallbackBody();
                  } else if (isFirstReview) {
                    body = buildFirstReviewBody(0);
                  } else {
                    body = buildSubsequentReviewBody(0);
                  }
                  body += buildMetadataSection(skippedInvalidLocation, skippedIncomplete, inlineError);
                  body += buildFooter();
                  body = capReviewBody(`${reviewMarker}\n\n${body}`);

                  await github.rest.pulls.createReview({
                    owner,
                    repo,
                    pull_number: issue_number,
                    commit_id: prHeadSha,
                    event: 'COMMENT',
                    body,
                  });
                } catch (retryError) {
                  core.warning(`Failed to create fallback review: ${retryError.message}`);
                }
              }
            }
