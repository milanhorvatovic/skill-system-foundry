name: Codex code review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: >-
      !github.event.pull_request.draft &&
      vars.CODEX_REVIEW_USERS != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
      REVIEW_USERS_RAW: ${{ vars.CODEX_REVIEW_USERS }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      CODEX_MODEL: gpt-5.3-codex

    steps:
      - name: Check PR author allowlist
        id: allowlist
        shell: bash
        run: |
          allowed=false
          pr_author_lower="$(printf '%s' "$PR_AUTHOR" | tr '[:upper:]' '[:lower:]')"
          normalized_users="$(
            printf '%s' "$REVIEW_USERS_RAW" \
              | tr '[:upper:]' '[:lower:]' \
              | tr ',\r\n\t' '\n' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
              | sed '/^$/d'
          )"

          while IFS= read -r username; do
            if [ "$username" = "$pr_author_lower" ]; then
              allowed=true
              break
            fi
          done <<< "$normalized_users"

          echo "allowed=$allowed" >> "$GITHUB_OUTPUT"
          if [ "$allowed" != "true" ]; then
            echo "PR author '$PR_AUTHOR' is not in CODEX_REVIEW_USERS. Skipping review."
          fi

      - name: Checkout PR
        if: ${{ steps.allowlist.outputs.allowed == 'true' && env.HAS_OPENAI_API_KEY == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6 as 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Skip when OPENAI_API_KEY is missing
        if: ${{ steps.allowlist.outputs.allowed == 'true' && env.HAS_OPENAI_API_KEY != 'true' }}
        run: echo "OPENAI_API_KEY is not set. Skipping Codex review."

      - name: Build PR diff
        id: diff
        if: ${{ steps.allowlist.outputs.allowed == 'true' && env.HAS_OPENAI_API_KEY == 'true' }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          git diff --no-color --unified=3 \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" > pr.diff
          if [ -s pr.diff ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "Diff is empty — nothing to review."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Codex review
        if: ${{ steps.allowlist.outputs.allowed == 'true' && env.HAS_OPENAI_API_KEY == 'true' && steps.diff.outputs.has_changes == 'true' }}
        id: codex
        uses: openai/codex-action@086169432f1d2ab2f4057540b1754d550f6a1189 # @v1 as 1.4
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ env.CODEX_MODEL }}
          sandbox: read-only
          prompt: |
            You are reviewing a GitHub pull request for this repository.
            Analyze `pr.diff` and the referenced files.

            Prioritize:
            1) Behavioral bugs and regressions
            2) Security and safety issues
            3) Missing tests for risky changes
            4) Violations of repository conventions:
               - `.github/copilot-instructions.md` — applies to all files
               - `.github/instructions/markdown.instructions.md` — applies only to `**/*.md` files
               - `.github/instructions/scripts.instructions.md` — applies only to `skill-system-foundry/scripts/**/*.py` files

            Return STRICT JSON only (no markdown/code fences) with this schema:
            {
              "summary": "1-5 sentence description of what the PR changes and why",
              "changes": [
                "short bullet describing a logical change"
              ],
              "files": [
                {
                  "path": "repo-relative/path.ext",
                  "description": "short description of what changed in this file"
                }
              ],
              "findings": [
                {
                  "title": "short issue title",
                  "severity": "high|medium|low",
                  "path": "repo-relative/path.ext",
                  "line": 123,
                  "startLine": 120,
                  "comment": "why this matters and concrete fix guidance",
                  "suggestion": "exact replacement code for lines startLine..line (optional)"
                }
              ]
            }

            Rules:
            - Always include `summary`, `changes`, and `files` — even when there are no findings.
            - If there are no high-confidence issues, set `findings` to an empty array.
            - Include only high-confidence findings in `findings`.
            - `path` must be a repo-relative path.
            - `line` in findings must refer to a changed line on the RIGHT side of this PR diff.
            - `startLine` is optional. Use it only when the suggestion spans multiple consecutive lines. It must be ≤ `line`.
            - When a finding has a concrete fix, include `suggestion` with the exact replacement source code (preserve indentation). The suggestion replaces lines `startLine` through `line` (or just `line` when `startLine` is omitted). Omit `suggestion` when the fix is non-trivial or ambiguous.
            - Keep all text concise and action-oriented.

            Pull request #${{ github.event.pull_request.number }}:
            Title: ${{ github.event.pull_request.title }}
            Body:
            ${{ github.event.pull_request.body }}

      - name: Upsert summary and publish inline conversations
        if: ${{ steps.allowlist.outputs.allowed == 'true' && env.HAS_OPENAI_API_KEY == 'true' && steps.codex.outputs.final-message != '' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # @v8 as 8.0.0
        env:
          CODEX_REVIEW: ${{ steps.codex.outputs.final-message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CODEX_MODEL: ${{ env.CODEX_MODEL }}
        with:
          script: |
            const fs = require('node:fs');
            const crypto = require('node:crypto');

            const summaryMarker = '<!-- codex-pr-review -->';
            const maxInlineConversations = 20;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const prHeadSha = context.payload.pull_request.head.sha;

            function tryParseJson(text) {
              try {
                return JSON.parse(text);
              } catch {
                return null;
              }
            }

            function parseStructuredReview(raw) {
              const trimmed = raw.trim();
              let parsed = tryParseJson(trimmed);
              if (parsed) return parsed;

              const fenced = trimmed.match(/```(?:json)?\s*([\s\S]*?)```/i);
              if (fenced) {
                parsed = tryParseJson(fenced[1].trim());
                if (parsed) return parsed;
              }

              const firstBrace = trimmed.indexOf('{');
              const lastBrace = trimmed.lastIndexOf('}');
              if (firstBrace !== -1 && lastBrace > firstBrace) {
                parsed = tryParseJson(trimmed.slice(firstBrace, lastBrace + 1));
                if (parsed) return parsed;
              }
              return null;
            }

            function parseAddedLinesByFile(diffText) {
              const addedByFile = new Map();
              let currentFile = null;
              let newLine = null;

              for (const rawLine of diffText.split('\n')) {
                const line = rawLine.replace(/\r$/, '');

                if (line.startsWith('diff --git ')) {
                  currentFile = null;
                  newLine = null;
                  continue;
                }

                if (line.startsWith('+++ ')) {
                  const nextPath = line.slice(4).trim();
                  if (nextPath === '/dev/null') {
                    currentFile = null;
                    continue;
                  }
                  currentFile = nextPath.startsWith('b/') ? nextPath.slice(2) : nextPath;
                  if (!addedByFile.has(currentFile)) {
                    addedByFile.set(currentFile, new Set());
                  }
                  continue;
                }

                const hunkMatch = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (hunkMatch) {
                  newLine = Number(hunkMatch[1]);
                  continue;
                }

                if (!currentFile || newLine == null) {
                  continue;
                }

                if (line.startsWith('+') && !line.startsWith('+++ ')) {
                  addedByFile.get(currentFile).add(newLine);
                  newLine += 1;
                  continue;
                }

                if (line.startsWith('-') && !line.startsWith('--- ')) {
                  continue;
                }

                if (line.startsWith(' ')) {
                  newLine += 1;
                  continue;
                }
              }

              return addedByFile;
            }

            function normalizePath(pathValue) {
              return String(pathValue || '')
                .trim()
                .replace(/^`+|`+$/g, '')
                .replace(/^\.\/+/, '');
            }

            function escapeTableCell(text) {
              return String(text || '').trim().replace(/\|/g, '\\|').replace(/\n/g, ' ');
            }

            function normalizeFinding(finding) {
              const title = String(finding?.title || '').trim();
              const severity = String(finding?.severity || 'medium').trim().toLowerCase();
              const path = normalizePath(finding?.path);
              const line = Number(finding?.line);
              const startLine = Number(finding?.startLine) || null;
              const comment = String(finding?.comment || '').trim();
              const rawSuggestion = finding?.suggestion != null ? String(finding.suggestion) : '';
              const suggestion = rawSuggestion.length > 0 ? rawSuggestion : null;
              return { title, severity, path, line, startLine, comment, suggestion };
            }

            const parsed = parseStructuredReview(process.env.CODEX_REVIEW || '');
            const parsedFindings = Array.isArray(parsed?.findings) ? parsed.findings : [];
            const findings = parsedFindings.map(normalizeFinding);
            const summaryText = String(parsed?.summary || '').trim();
            const changes = Array.isArray(parsed?.changes) ? parsed.changes.map(c => String(c).trim()).filter(Boolean) : [];
            const files = Array.isArray(parsed?.files) ? parsed.files : [];

            const diffText = fs.readFileSync('pr.diff', 'utf8');
            const addedByFile = parseAddedLinesByFile(diffText);
            const totalChangedFiles = (diffText.match(/^diff --git /gm) || []).length;

            const reviewComments = [];
            let skippedInvalidLocation = 0;
            let skippedIncomplete = 0;

            const existingReviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number: issue_number,
              per_page: 100,
            });
            const existingInlineMarkers = new Set(
              existingReviewComments
                .filter((comment) => comment.user?.type === 'Bot')
                .map((comment) => {
                  const match = comment.body?.match(/<!-- codex-inline:([a-f0-9]{16}) -->/);
                  return match ? match[1] : null;
                })
                .filter(Boolean),
            );

            for (const finding of findings) {
              if (!finding.title || !finding.path || !Number.isInteger(finding.line) || finding.line <= 0 || !finding.comment) {
                skippedIncomplete += 1;
                continue;
              }

              const addedLines = addedByFile.get(finding.path);
              if (!addedLines || !addedLines.has(finding.line)) {
                skippedInvalidLocation += 1;
                continue;
              }

              const signature = crypto
                .createHash('sha256')
                .update(`${finding.path}|${finding.line}|${finding.title}|${finding.severity}`)
                .digest('hex')
                .slice(0, 16);
              if (existingInlineMarkers.has(signature)) {
                continue;
              }

              const alertType = { high: 'CAUTION', medium: 'WARNING', low: 'NOTE' }[finding.severity] || 'WARNING';
              const suggestionBlock = finding.suggestion
                ? `\n\n\`\`\`suggestion\n${finding.suggestion}\n\`\`\``
                : '';
              const commentBody = `> [!${alertType}]\n> **${finding.title}**\n> ${finding.comment.split('\n').join('\n> ')}${suggestionBlock}\n\n<!-- codex-inline:${signature} -->`;
              const commentObj = {
                path: finding.path,
                line: finding.line,
                side: 'RIGHT',
                body: commentBody,
              };
              if (finding.startLine && Number.isInteger(finding.startLine) && finding.startLine > 0 && finding.startLine < finding.line) {
                commentObj.start_line = finding.startLine;
                commentObj.start_side = 'RIGHT';
              }
              reviewComments.push(commentObj);

              if (reviewComments.length >= maxInlineConversations) {
                break;
              }
            }

            function buildReviewedLine(commentCount) {
              const commentLabel = commentCount > 0 ? `${commentCount} comment(s)` : 'no new comments';
              return `Codex reviewed ${totalChangedFiles} out of ${totalChangedFiles} changed files in this pull request and generated ${commentLabel}.`;
            }

            function buildReviewBody(commentCount) {
              const reviewedLine = buildReviewedLine(commentCount);
              const sections = ['## Pull request overview'];
              if (summaryText) sections.push(summaryText);
              if (changes.length > 0) {
                sections.push(`**Changes:**\n${changes.map(c => `- ${c}`).join('\n')}`);
              }
              const fileTable = files.length > 0
                ? `| File | Description |\n|------|-------------|\n${files.map(f => `| \`${normalizePath(f.path)}\` | ${escapeTableCell(f.description)} |`).join('\n')}`
                : '';
              const reviewedSection = fileTable
                ? `## Reviewed changes\n\n${reviewedLine}\n\n${fileTable}`
                : `## Reviewed changes\n\n${reviewedLine}`;
              sections.push(reviewedSection);
              return sections.join('\n\n');
            }

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existingSummaryComment = issueComments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                comment.body?.includes(summaryMarker),
            );
            const isFirstReview = !existingSummaryComment;

            let inlinePosted = 0;
            let inlineError = '';
            try {
              if (reviewComments.length > 0) {
                await github.rest.pulls.createReview({
                  owner,
                  repo,
                  pull_number: issue_number,
                  commit_id: prHeadSha,
                  event: 'COMMENT',
                  body: isFirstReview ? buildReviewBody(reviewComments.length) : buildReviewedLine(reviewComments.length),
                  comments: reviewComments,
                });
                inlinePosted = reviewComments.length;
              } else if (isFirstReview && parsed && findings.length === 0) {
                await github.rest.pulls.createReview({
                  owner,
                  repo,
                  pull_number: issue_number,
                  commit_id: prHeadSha,
                  event: 'COMMENT',
                  body: isFirstReview ? buildReviewBody(0) : buildReviewedLine(0),
                });
              }
            } catch (error) {
              inlineError = error.message;
              console.warn(`Failed to create review: ${inlineError}`);
            }

            const fallbackText = (process.env.CODEX_REVIEW || '').trim();
            const fallbackTextLimited = fallbackText.length > 12000 ? `${fallbackText.slice(0, 12000)}\n...<truncated>` : fallbackText;
            const fallbackSummary = fallbackText
              ? `Could not parse structured Codex output. Raw response:\n\n\`\`\`\n${fallbackTextLimited}\n\`\`\``
              : 'Codex returned an empty response.';

            const executionNotes = [
              skippedInvalidLocation > 0 ? `Skipped ${skippedInvalidLocation} finding(s) not on changed RIGHT-side lines.` : null,
              skippedIncomplete > 0 ? `Skipped ${skippedIncomplete} incomplete finding(s).` : null,
              inlineError ? `Failed to post inline conversations: ${inlineError}` : null,
            ]
              .filter(Boolean)
              .join('\n');

            const reviewedLine = buildReviewedLine(inlinePosted);
            const footer = `---\n*Generated by [Codex Review](${process.env.RUN_URL}) using ${process.env.CODEX_MODEL}*`;
            const bodySections = [
              summaryMarker,
              '## Pull request overview',
              parsed ? [summaryText, reviewedLine].filter(Boolean).join('\n\n') : fallbackSummary,
              executionNotes ? `### Review metadata\n${executionNotes}` : '',
              footer,
            ].filter(Boolean);
            const body = bodySections.join('\n\n').trim();

            if (existingSummaryComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingSummaryComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
