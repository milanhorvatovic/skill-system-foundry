# Dependency update automation.
# Bumps the SHA-pinned GitHub Actions (verify-action-pins.yaml requires SHA
# pins; Dependabot understands them and rewrites both the pin and its version
# comment) and the Python dev dependency declared in requirements-dev.txt.
#
# Each ecosystem opens one rolling group PR per week for minor + patch bumps.
# Semver-major bumps split into standalone PRs so the auto-merge workflow's
# semver-major gate can route them to manual review without holding unrelated
# patch/minor bumps along with them.
#
# Trust-boundary actions that execute with secrets in scope are excluded from
# the github-actions group so they always arrive as standalone PRs that the
# auto-merge exclude-by-name guard holds for manual review, instead of one of
# their bumps poisoning the whole group's auto-merge:
#   - actions/create-github-app-token mints the App private key.
#   - milanhorvatovic/codex-ai-code-review-action runs with OPENAI_API_KEY.
# Extend exclude-patterns when a new action-level trust-boundary dependency is
# added to the repo — in lockstep with the approve-step guard in
# dependabot-auto-merge.yaml, the check_dependency_gates guard in
# dependabot-reconciler.yaml, and the contributor-facing copy in CONTRIBUTING.md
# (this list lives in all four).
#
# Static labels per ecosystem entry (applied to grouped and standalone PRs
# alike): `dependencies` + the ecosystem + `release: patch`. A dependency bump
# is at most a project patch (dependencies are not shipped in the skill bundle),
# so this static `release: patch` is the final release label for every Dependabot
# PR — semver-major bumps are NOT escalated to `release: major`. The auto-merge
# hold for semver-major and trust-boundary-action bumps is driven by the
# Dependabot update-type metadata, not by this label. dependabot-release-label.yaml
# only backfills `release: patch` when a PR (e.g. a security-update group) does
# not inherit this static list.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    # Raised from 5: majors and the two excluded trust-boundary actions now
    # split into standalone PRs, structurally increasing the open-PR count.
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
        exclude-patterns:
          - "actions/create-github-app-token"
          - "milanhorvatovic/codex-ai-code-review-action"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "github-actions"
      - "release: patch"

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-dev:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "python"
      - "release: patch"
