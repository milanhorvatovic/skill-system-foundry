# Validation rules and domain policy for skill-system-foundry.
# Loaded by constants.py — edit this file to tune validation behavior.
#
# Patterns with (?i) are compiled case-insensitive.
# Backslash sequences (e.g. \b) are preserved as-is by the
# yaml_parser — no escape processing occurs.

# ============================================================
# Skill Validation
# ============================================================
skill:
  name:
    max_length: 64
    min_length: 2
    format_pattern: ^[a-z0-9][a-z0-9-]*[a-z0-9]$|^[a-z0-9]$
    reserved_words:
      - anthropic
      - claude
    # Names reserved by the Windows / NTFS filesystem.  A skill or
    # capability whose base name (case-insensitive) matches any of
    # these cannot be created on Windows even though POSIX accepts it,
    # so the rule fails on every host to keep the foundry's
    # cross-platform contract consistent.  Match is case-insensitive
    # and applies to the path component before any extension (NTFS
    # rejects ``con.txt`` the same way it rejects ``CON``).
    windows_reserved_names:
      - CON
      - PRN
      - AUX
      - NUL
      - COM0
      - COM1
      - COM2
      - COM3
      - COM4
      - COM5
      - COM6
      - COM7
      - COM8
      - COM9
      - LPT0
      - LPT1
      - LPT2
      - LPT3
      - LPT4
      - LPT5
      - LPT6
      - LPT7
      - LPT8
      - LPT9
  description:
    max_length: 1024
    xml_tag_pattern: <[^>]+>
    # Heuristic phrase list for the trigger-clause check.  The
    # agentskills.io spec requires descriptions to state both *what* the
    # skill does and *when* it activates; this list enforces the
    # "when" half by case-insensitive substring match against the
    # folded description.  Detection is heuristic — phrase matching
    # cannot enumerate every valid wording — so the rule emits WARN,
    # not FAIL.  Extend the list via PR when a legitimate pattern is
    # missed.
    #
    # Match semantics: case-insensitive substring on the lowered,
    # folded description.  Phrases match anywhere — including inside
    # longer words ("activates when" matches "activates whenever").
    # Avoid phrases short or generic enough to collide with incidental
    # prose ("use for" matched "use forensic" / "use for example",
    # which is why it is not in the starter set).
    trigger_phrases:
      - triggers on
      - triggers when
      - activates on
      - activates when
      - use when
      - when to use
      - invoked on
      - invoked when
    voice_patterns:
      first_person: (?i)\b(I can|I will|I help|I am)\b
      first_person_plural: (?i)\b(we can|we will|we help|our tool|our skill)\b
      second_person: (?i)\b(you can|you will|your|you should)\b
      imperative_start: (?i)^(Create|Design|Build|Run|Execute|Deploy|Generate|Manage|Configure|Set up|Install|Analyze|Process|Handle|Implement|Define|Write|Read|Update|Delete|Check|Validate|Test|Review|Fix|Debug|Monitor|Track|Scan|Parse|Fetch|Send|Transform|Convert|Extract|Load|Save|Export|Import|Migrate|Provision|Orchestrate|Wire|Scaffold|Audit)\b
  body:
    max_lines: 500
    # Cross-file reference patterns.
    #
    # ``markdown_link`` is deliberately broad — markdown links are
    # intentional, structured references that should always resolve.
    # Match shapes:
    # - skill-root-anchored paths: ``[x](references/foo.md)``
    #   (recognized top-level dirs).
    # - external references from a capability:
    #   ``[x](../../references/foo.md)`` (any number of leading
    #   ``../`` segments before a recognized top-level dir).
    # - file-relative bare siblings and parent files:
    #   ``[x](foo.md)``, ``[x](../capability.md)`` (any leading
    #   ``../`` segments followed by a filename ending in a
    #   recognized extension).
    #
    # ``backtick`` is intentionally narrow — inline-code path
    # mentions in prose are common, and matching every bare filename
    # produces false positives for prose discussions.  Restrict to
    # paths that contain a recognized top-level directory segment so
    # inline mentions of script names (``validate_skill.py``) are
    # not treated as references.  Authors who want a backtick path
    # treated as a real reference can use the directory-anchored
    # form (``scripts/validate_skill.py``).
    #
    # The resolver in ``lib/reachability.py`` and
    # ``validate_skill._check_references`` interprets every captured
    # path file-relative under the redefined rule
    # (see references/path-resolution.md).
    reference_patterns:
      # Six alternatives, ordered from most-specific to most-general:
      #
      # - directory-anchored paths (``capabilities/foo.md``,
      #   ``../../references/foo.md``) — recognized top-level dir
      #   prefix with optional ``./`` or ``../`` traversal.
      # - bare-sibling files (``foo.md``, ``./foo.md``,
      #   ``../foo.md``) — relative path with no internal slash, file
      #   extension at the end.  Captures optional anchor/query
      #   suffixes (``#section``, ``?v=2``) and markdown link title
      #   annotations (``foo.md "Title"``) so the resolver sees the
      #   full link before it hands it to ``strip_fragment``.
      # - parent-traversal multi-segment paths
      #   (``../beta/capability.md`` into a sibling capability) —
      #   requires at least one ``../`` to block URLs.
      # - generic multi-segment relative paths through unrecognized
      #   directories (``guides/setup.md``, ``examples/case.md``)
      #   without a ``../`` prefix.  ``[^):\s]`` excludes ``:``,
      #   which keeps URL schemes (``https://``, ``mailto:``) from
      #   matching while still capturing standard markdown
      #   file-relative links that don't anchor on a recognized
      #   top-level directory.  Without this branch a broken
      #   ``guides/setup.md`` link from a reference file would slip
      #   past validation and the conformance gate.
      # - POSIX absolute paths (``/foo.md``, ``/tmp/foo.md``) —
      #   leading ``/`` followed by a non-slash, non-colon
      #   character so URL schemes (``http://...``) cannot reach
      #   this branch.  Spec-violating; the resolver emits a WARN
      #   via ``os.path.isabs``.
      # - Windows drive-qualified paths (``C:foo.md``, ``C:/foo.md``,
      #   ``C:\foo.md``) — single drive letter, ``:``, then a path
      #   that excludes ``:`` and whitespace so multi-letter URL
      #   schemes (``mailto:``, ``myproto:``) cannot reach this
      #   branch.  Spec-violating; the resolver emits a WARN via
      #   ``is_drive_qualified``.  Without these last two
      #   alternatives, an absolute or drive-qualified link would
      #   never enter the extractor at all and the resolver's
      #   defensive checks would be unreachable from the capture.
      #
      # Leading-prefix groups use ``(?:\.{1,2}/)*`` so both ``./``
      # and ``../`` are accepted — standard markdown treats
      # ``./foo.md`` as equivalent to ``foo.md``.
      #
      # The literal token ``__EXT_ALT__`` is substituted at
      # constants load time with the alternation built from
      # ``path_resolution.reference_extensions`` (see
      # ``constants.RE_MARKDOWN_LINK_REF``), so the supported
      # extension list lives in exactly one place — but only
      # alternatives that *carry an extension match* consume it.
      # Specifically: the bare-sibling, parent-traversal, and
      # generic multi-segment alternatives below substitute
      # ``__EXT_ALT__`` into a literal extension test, and the
      # ``is_glob_path`` boundary regex in ``lib/references.py``
      # uses the same alternation.  The directory-anchored
      # alternative (capabilities / references / scripts / assets /
      # shared) and the ``backtick`` regex below both rely on the
      # directory whitelist as their discriminator and capture any
      # path under those directories regardless of file extension —
      # asset references, capability-local templates, and similar
      # legitimately appear there with arbitrary extensions, so an
      # extension filter would silently drop them.  Editing
      # ``reference_extensions`` therefore controls the extension-
      # matching alternatives only; the directory-anchored capture
      # is governed by the directory whitelist.
      markdown_link: \[.*?\]\(((?:\.{1,2}/)*(?:capabilities|references|scripts|assets|shared)/[^)]+|(?:\.{1,2}/)*[A-Za-z0-9_][^):/]*\.(?:__EXT_ALT__)(?:[?#][^)\s]*)?(?:\s+["'][^"']*["'])?|(?:\.\./)+[A-Za-z0-9_][^)\s]*\.(?:__EXT_ALT__)(?:[?#][^)\s]*)?(?:\s+["'][^"']*["'])?|(?:\.{1,2}/)*[A-Za-z0-9_][^):\s]*/[^):\s)]*\.(?:__EXT_ALT__)(?:[?#][^)\s]*)?(?:\s+["'][^"']*["'])?|/[A-Za-z0-9_][^):\s]*\.(?:__EXT_ALT__)(?:[?#][^)\s]*)?(?:\s+["'][^"']*["'])?|[A-Za-z]:[^):\s]+\.(?:__EXT_ALT__)(?:[?#][^)\s]*)?(?:\s+["'][^"']*["'])?)\)
      backtick: "`((?:\.{1,2}/)*(?:capabilities|references|scripts|assets|shared)/[^`]+)`"
  compatibility:
    max_length: 500

  # Known frontmatter keys — used to detect misspelled or unrecognized keys.
  # Keys not in this list trigger an INFO-level warning.
  known_frontmatter_keys:
    - name
    - description
    - compatibility
    - allowed-tools
    - license
    - metadata

  # "Did you mean?" suggestions for unrecognized frontmatter keys.
  # Parameters are passed to ``difflib.get_close_matches`` in
  # ``validate_known_keys``.  Calibrated against the known-key set above:
  # cutoff=0.5 pulls in false positives (meta → name at 0.5); cutoff=0.7
  # silently drops real typos (meta → metadata at 0.67).
  frontmatter_suggestions:
    max_matches: 3
    cutoff: 0.6

  # allowed-tools validation (space-delimited tool names in frontmatter)
  allowed_tools:
    # Upper bound on tool count — skills requesting too many tools
    # likely need to be split.  Increase if justified.
    max_tools: 20
    # Token-shape patterns used by the pattern-fallback recognition
    # tier in ``validate_allowed_tools``.  Patterns live here (single
    # source of truth) and are compiled in ``constants.py``.
    # - mcp_tool_pattern: ``mcp__server__tool`` convention; case-mixed
    #   tokens are valid (e.g. ``mcp__claude_ai_Atlassian__addCommentToJiraIssue``).
    # - harness_tool_shape_pattern: matches bare PascalCase tokens.
    #   Callers strip the optional ``(...)`` argument suffix before
    #   applying this pattern, so the pattern itself does not model
    #   parens.
    mcp_tool_pattern: ^mcp__[A-Za-z0-9_]+__[A-Za-z0-9_]+$
    harness_tool_shape_pattern: ^[A-Z][A-Za-z0-9]*$
    # Per-harness catalogs of tool names recognized in the
    # `allowed-tools` field.  Today only claude_code consumes this
    # field; codex tool descriptors (MCP server type/transport/url)
    # live under `codex_config:` and can migrate into this structure
    # with their own bucket shape when convenient.
    catalogs:
      claude_code:
        harness_tools:
          - Bash
          - Read
          - Edit
          - Write
          - Glob
          - Grep
          - WebFetch
          - WebSearch
          - NotebookEdit
          - Task
          - Skill
        # Generic CLI names sometimes written into allowed-tools.
        # NOT harness primitives — listing `bash` does not grant the
        # harness Bash tool.  Retained so typo-detection on third-party
        # skills does not regress.
        cli_tools:
          - bash
          - python
          - gh
          - git
          - docker
          - npm
          - pip
          - curl
          - wget
          - node
          - make
          - cargo
          - go
    # Provenance for the canonical upstream source of truth.  The
    # ``source_url`` is the page consumed by the
    # ``tool-catalog-drift`` workflow at
    # ``.github/workflows/tool-catalog-drift.yaml`` (helper at
    # ``.github/scripts/tool-catalog-drift.py``).  ``last_checked``
    # is rewritten only when the helper auto-applies additions —
    # the date marks the last actual catalog change, not every
    # drift-detection run.  Quiet runs and removals-only drift
    # (advisory only, never applied) both leave the date
    # untouched, so an unchanged value means no auto-applied
    # update was recorded; the GitHub Actions run history
    # provides the "did the sweep run" signal.  These values were
    # comments before #118 promoted them to structured YAML so
    # the drift helper has a single source of truth.
    catalog_provenance:
      claude_code:
        source_url: https://code.claude.com/docs/en/tools-reference.md
        last_checked: "2026-05-01"
    # Fence/script-presence signals for the coherence rule.  Maps a
    # harness-tool name (PascalCase, must appear in
    # ``catalogs.claude_code.harness_tools``) to its body-fence
    # languages and an explicit flag indicating that a top-level
    # ``scripts/`` directory is a presence signal for the same tool.
    # Adding a tool is a YAML edit only — no Python changes required.
    fence_languages:
      Bash:
        languages:
          - bash
          - sh
          - shell
          - zsh
        # ``scripts/`` typically holds shell helpers invoked through
        # the harness Bash tool.  Other tools (e.g. NotebookEdit) do
        # not have an analogous filesystem signal — leave the flag
        # off or omit it.
        scripts_dir_indicator: true

  # metadata sub-field validation (foundry conventions — spec allows arbitrary values)
  metadata:
    version:
      # Semver-like pattern: MAJOR.MINOR.PATCH with optional pre-release suffix.
      # Foundry recommendation only — the spec allows any string value.
      pattern: ^\d+\.\d+\.\d+(-[a-zA-Z0-9.-]+)?$
    author:
      # Reasonable upper bound for an author name or identifier (foundry convention)
      max_length: 128

  # license validation — common SPDX identifiers
  license:
    known_spdx:
      - MIT
      - Apache-2.0
      - GPL-2.0-only
      - GPL-2.0-or-later
      - GPL-3.0-only
      - GPL-3.0-or-later
      - BSD-2-Clause
      - BSD-3-Clause
      - ISC
      - MPL-2.0
      - LGPL-2.1-only
      - LGPL-2.1-or-later
      - LGPL-3.0-only
      - LGPL-3.0-or-later
      - AGPL-3.0-only
      - AGPL-3.0-or-later
      - Unlicense
      - CC0-1.0
      - CC-BY-4.0
      - CC-BY-SA-4.0
      - 0BSD
      - Artistic-2.0
      - Zlib
      - BSL-1.0
      - EUPL-1.2

  recognized_subdirectories:
    - scripts
    - references
    - assets
    - shared
    - capabilities
    - agents

  # Capability frontmatter governance (foundry convention).
  #
  # The meta-skill uses a *bottom-up aggregation* model for capability
  # frontmatter: each capability may declare its own scoped fields
  # (today only ``allowed-tools``), and the parent SKILL.md is
  # validated as a superset of the union of capability declarations.
  #
  # ``skill_only_fields`` enumerates frontmatter keys whose
  # authoritative home is the parent SKILL.md.  When a capability
  # declares any of these, the validator emits an INFO suggesting
  # removal — the capability's value is informational only and the
  # parent governs the field.  Dotted entries traverse nested
  # mappings (``metadata.author`` targets ``frontmatter['metadata']['author']``).
  capability_frontmatter:
    skill_only_fields:
      - license
      - compatibility
      - metadata.author
      - metadata.version
      - metadata.spec

# ============================================================
# Plain Scalar Divergence Detection
# ============================================================
# YAML 1.2 indicator character categories for _check_plain_scalar.
# Characters in each set trigger findings when they appear at the
# start of an unquoted value (or in the colon-scan for separators).
plain_scalar:
  indicators:
    # Unconditional FAIL — always rejected by strict parsers
    flow: "[]{},"
    alias: "*"
    reserved: "@`"
    directive: "%"
    # Context-sensitive FAIL — only when followed by whitespace
    block_entry: "-"
    mapping_key: "?"
    anchor: "&"
    # FAIL — invalid block scalar headers (followed by text)
    block_scalar: "|>"
    # FAIL — unterminated quotes (split into two entries because both
    # characters cannot coexist in a single YAML scalar without escape
    # processing; constants.py concatenates them at load time)
    quote_single: "'"
    quote_double: '"'
    # WARN — silently consumed by strict parsers
    tag: "!"
  # Characters that activate context-sensitive indicators (space and
  # tab).  Tab is stored as the token "TAB" because the subset parser
  # does not process escape sequences; constants.py decodes it.
  context_whitespace:
    - " "
    - TAB

# ============================================================
# Prose YAML Validation (in-Markdown ```yaml fences)
# ============================================================
# Settings for the doc-snippet validator (validate_prose_yaml).  See
# references/authoring-principles.md (section "Counter-example
# convention for prose YAML fences") for the author-facing convention.
prose_yaml:
  # HTML-comment marker that opts a fence out of validation when it
  # appears on the line immediately above the fence-open line (no
  # blank line between).  Strict adjacency.
  opt_out_marker: "<!-- yaml-ignore -->"
  # Globs (relative to the skill root) that the prose check walks.
  # Other markdown files inside the skill (CLAUDE.md, README.md,
  # CHANGELOG.md, assets/**) are out of scope by design.
  in_scope_globs:
    - SKILL.md
    - capabilities/**/*.md
    - references/**/*.md

# ============================================================
# YAML Conformance (parser hardening + corpus)
# ============================================================
# Canonical enumeration of the construct-id tokens used in the parser's
# pinned ValueError message format ("unsupported YAML 1.2.2 construct:
# <construct-id> (spec §n.n)") and matched by rejected/ corpus fixtures.
# Adding a new rejection appends a token here and emits the same format
# from yaml_parser.py.
yaml_conformance:
  construct_ids:
    - anchor-with-trailing-in-key
    - indent-indicator-block-scalar
    - tag-in-mapping-key

# ============================================================
# Codex Configuration (agents/openai.yaml)
# ============================================================
codex_config:
  # Known schema keys for agents/openai.yaml validation.
  # Keys not in these lists trigger INFO-level unrecognized-key warnings.
  known_top_level_keys:
    - interface
    - policy
    - dependencies
  known_interface_keys:
    - display_name
    - short_description
    - icon_small
    - icon_large
    - brand_color
    - default_prompt
  known_policy_keys:
    - allow_implicit_invocation
  known_dependencies_keys:
    - tools
  known_tool_keys:
    - type
    - value
    - description
    - transport
    - url
  interface:
    max_display_name_length: 64
    max_short_description_length: 200
    hex_color_pattern: ^#[0-9A-Fa-f]{6}$
  dependencies:
    known_tool_types:
      - mcp
    known_transports:
      - streamable_http

# ============================================================
# Dependency Direction
# ============================================================
dependency_direction:
  roles_ref_pattern: roles/
  sibling_capability_ref_pattern: \.\./[a-z].*?/SKILL\.md

# ============================================================
# Role Composition
# ============================================================
role_composition:
  # Minimum number of unique skills/capabilities a role must compose.
  # Roles with fewer references are flagged as single-skill passthroughs.
  min_skills: 2
  # Patterns that identify skill/capability references in role files.
  # Applied to the "Skills Used" section of role markdown.
  skill_ref_pattern: \bskills/[a-z0-9-]+/SKILL\.md(?![.\w])
  capability_ref_pattern: \bskills/[a-z0-9-]+/capabilities/[a-z0-9-]+/capability\.md(?![.\w])

# ============================================================
# Orphan Reference Audit
# ============================================================
# The orphan-reference rule (see audit_skill_system / validate_skill)
# walks the per-skill reference graph from every SKILL.md and every
# capabilities/<name>/capability.md, then flags any file under a
# references/ directory (top-level references/ AND
# capabilities/<name>/references/) that the walk did not reach.
#
# allowed_orphans entries opt specific paths out of the rule.  Paths
# use forward-slash POSIX form regardless of platform.  Two keying
# forms are accepted in the same flat list:
#
#   - skills/<name>/...           audit-root-relative; matches that
#                                 specific skill in a deployed-system
#                                 audit (entry must start with
#                                 'skills/').
#   - <anything else>             skill-root-relative; matches in
#                                 every skill's local check.
#
# Entries are normalized to POSIX form before comparison so Windows
# checkouts and POSIX checkouts behave identically.  The list is empty
# by default — the meta-skill itself reports zero orphans without any
# entries.  To opt out, add block-style list items under
# allowed_orphans, e.g.:
#
#   orphan_references:
#     allowed_orphans:
#       - references/staged-for-review.md
#       - skills/foo/references/staged.md
orphan_references:
  allowed_orphans:

# ============================================================
# Path Resolution (cross-file references)
# ============================================================
# Cross-file references inside a skill follow standard markdown
# semantics: resolve file-relative from the file that contains
# the link.  Two scopes own their own subgraphs — the skill root
# (containing SKILL.md, references/, assets/, scripts/, optional
# shared/) and each capability root (containing capability.md
# and its own optional references/, assets/, scripts/).  External
# references from a capability into the shared skill root use
# the explicit ``../../<dir>/<file>`` form (parent-traversal
# segments are how the validator recognizes external refs).
#
# See references/path-resolution.md for the canonical rule, the
# liftability invariant, the migration cheat sheet, and the
# spec-divergence note.
path_resolution:
  # Identifier surfaced in finding text and ``--json`` output so
  # consumers can filter or group findings by rule.
  rule_name: path-resolution
  # Skill-root-relative path to the canonical reference doc.
  # ``validate_skill`` and ``audit_skill_system`` emit a top-level
  # ``path_resolution`` block (``rule_name`` + ``documentation_path``)
  # in their ``--json`` payloads, and ``validate_skill --fix`` cites
  # this path in the unfixable-findings header, so an integrator can
  # navigate to the rule from any output stream.
  documentation_path: references/path-resolution.md
  # File extensions a markdown link target may carry to be treated
  # as a cross-file reference.  This list is the single source of
  # truth: the body ``reference_patterns`` regex above and the
  # ``is_glob_path`` helper in ``lib/references.py`` both build
  # their extension match from this value.  Adding or removing an
  # extension here flows through to extraction, glob discrimination,
  # and the rewriter without code changes.
  reference_extensions:
    - md
    - py
    - sh
    - yaml
    - yml
    - json
    - toml
    - txt

# ============================================================
# Bundle Packaging
# ============================================================
bundle:
  # Max transitive reference depth when scanning external files.
  # Prevents runaway traversal. Increase if deeply nested reference
  # chains are legitimate in your skill system.
  max_reference_depth: 25
  # Claude.ai consumer platform enforces 200-char description limit
  # (stricter than the 1024-char Agent Skills spec limit).
  # bundle.py fails if description exceeds this when targeting zip distribution.
  description_max_length: 200
  # Max directory levels to walk up when inferring the system root
  # from the skill path.  Prevents scanning to the filesystem root.
  infer_max_walk_depth: 5
  # Recognized consumer platform targets for bundling.
  # 'claude' enforces the description_max_length as an error;
  # other targets downgrade it to a warning.
  valid_targets:
    - claude
    - gemini
    - generic
  default_target: claude
  # Filesystem patterns excluded from the bundle archive.
  exclude_patterns:
    - .git
    - __pycache__
    - .DS_Store
    - Thumbs.db
    - Desktop.ini
    - $RECYCLE.BIN
    - "*.pyc"
    - "*.lnk"
  # Long-path pre-flight thresholds for cross-platform safety.  Windows
  # historically caps full paths at MAX_PATH (260 chars) without a
  # registry override; the worst-case extraction path on a typical
  # Windows checkout is the user-prefix budget plus the bundle
  # arcname.  ``threshold`` is the absolute cap any path may reach
  # after the user prefix is added; ``user_prefix_budget`` reserves
  # bytes for a representative ``C:\Users\<name>\<repo>\`` location.
  # Values configurable so integrators with longer install paths can
  # tighten the budget.
  long_path:
    threshold: 260
    user_prefix_budget: 80

# ============================================================
# Stats (Token-Budget Proxy)
# ============================================================
stats:
  # Per-file line-ending detection toggle.  When enabled, ``stats.py``
  # reports ``line_endings`` on every counted file (``lf`` / ``crlf``
  # / ``mixed``) and produces normalized ``*_lf`` companions to the
  # raw byte counts so consumers can compare across CRLF and LF
  # checkouts without re-reading any files.  The raw counts continue
  # to be reported as the deterministic on-disk signal.
  line_endings:
    enabled: true
