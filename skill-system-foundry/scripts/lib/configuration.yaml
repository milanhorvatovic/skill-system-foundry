# Validation rules and domain policy for skill-system-foundry.
# Loaded by constants.py — edit this file to tune validation behavior.
#
# Patterns with (?i) are compiled case-insensitive.
# Backslash sequences (e.g. \b) are preserved as-is by the
# yaml_parser — no escape processing occurs.

# ============================================================
# Skill Validation
# ============================================================
skill:
  name:
    max_length: 64
    min_length: 2
    format_pattern: ^[a-z0-9][a-z0-9-]*[a-z0-9]$|^[a-z0-9]$
    reserved_words:
      - anthropic
      - claude
  description:
    max_length: 1024
    xml_tag_pattern: <[^>]+>
    voice_patterns:
      first_person: (?i)\b(I can|I will|I help|I am)\b
      first_person_plural: (?i)\b(we can|we will|we help|our tool|our skill)\b
      second_person: (?i)\b(you can|you will|your|you should)\b
      imperative_start: (?i)^(Create|Design|Build|Run|Execute|Deploy|Generate|Manage|Configure|Set up|Install|Analyze|Process|Handle|Implement|Define|Write|Read|Update|Delete|Check|Validate|Test|Review|Fix|Debug|Monitor|Track|Scan|Parse|Fetch|Send|Transform|Convert|Extract|Load|Save|Export|Import|Migrate|Provision|Orchestrate|Wire|Scaffold|Audit)\b
  body:
    max_lines: 500
    reference_patterns:
      markdown_link: \[.*?\]\(((?:references|scripts|assets)/[^)]+)\)
      backtick: "`((?:references|scripts|assets)/[^`]+)`"
  compatibility:
    max_length: 500

  # Known frontmatter keys — used to detect misspelled or unrecognized keys.
  # Keys not in this list trigger an INFO-level warning.
  known_frontmatter_keys:
    - name
    - description
    - compatibility
    - allowed-tools
    - license
    - metadata

  # allowed-tools validation (space-delimited tool names in frontmatter)
  allowed_tools:
    known_tools:
      - Bash
      - Read
      - Edit
      - Write
      - Glob
      - Grep
      - WebFetch
      - Task
      - bash
      - python
      - gh
      - git
      - docker
      - npm
      - pip
      - curl
      - wget
      - node
      - make
      - cargo
      - go
    # Upper bound on tool count — skills requesting too many tools
    # likely need to be split.  Increase if justified.
    max_tools: 20

  # metadata sub-field validation (foundry conventions — spec allows arbitrary values)
  metadata:
    version:
      # Semver-like pattern: MAJOR.MINOR.PATCH with optional pre-release suffix.
      # Foundry recommendation only — the spec allows any string value.
      pattern: ^\d+\.\d+\.\d+(-[a-zA-Z0-9.-]+)?$
    author:
      # Reasonable upper bound for an author name or identifier (foundry convention)
      max_length: 128

  # license validation — common SPDX identifiers
  license:
    known_spdx:
      - MIT
      - Apache-2.0
      - GPL-2.0-only
      - GPL-2.0-or-later
      - GPL-3.0-only
      - GPL-3.0-or-later
      - BSD-2-Clause
      - BSD-3-Clause
      - ISC
      - MPL-2.0
      - LGPL-2.1-only
      - LGPL-2.1-or-later
      - LGPL-3.0-only
      - LGPL-3.0-or-later
      - AGPL-3.0-only
      - AGPL-3.0-or-later
      - Unlicense
      - CC0-1.0
      - CC-BY-4.0
      - CC-BY-SA-4.0
      - 0BSD
      - Artistic-2.0
      - Zlib
      - BSL-1.0
      - EUPL-1.2

  recognized_subdirectories:
    - scripts
    - references
    - assets
    - shared
    - capabilities
    - agents

# ============================================================
# Codex Configuration (agents/openai.yaml)
# ============================================================
codex_config:
  # Known schema keys for agents/openai.yaml validation.
  # Keys not in these lists trigger INFO-level unrecognized-key warnings.
  known_top_level_keys:
    - interface
    - policy
    - dependencies
  known_interface_keys:
    - display_name
    - short_description
    - icon_small
    - icon_large
    - brand_color
    - default_prompt
  known_policy_keys:
    - allow_implicit_invocation
  known_dependencies_keys:
    - tools
  known_tool_keys:
    - type
    - value
    - description
    - transport
    - url
  interface:
    max_display_name_length: 64
    max_short_description_length: 200
    hex_color_pattern: ^#[0-9A-Fa-f]{6}$
  dependencies:
    known_tool_types:
      - mcp
    known_transports:
      - streamable_http

# ============================================================
# Dependency Direction
# ============================================================
dependency_direction:
  roles_ref_pattern: roles/
  sibling_capability_ref_pattern: \.\./[a-z].*?/SKILL\.md

# ============================================================
# Role Composition
# ============================================================
role_composition:
  # Minimum number of unique skills/capabilities a role must compose.
  # Roles with fewer references are flagged as single-skill passthroughs.
  min_skills: 2
  # Patterns that identify skill/capability references in role files.
  # Applied to the "Skills Used" section of role markdown.
  skill_ref_pattern: \bskills/[a-z0-9-]+/SKILL\.md(?![.\w])
  capability_ref_pattern: \bskills/[a-z0-9-]+/capabilities/[a-z0-9-]+/capability\.md(?![.\w])

# ============================================================
# Bundle Packaging
# ============================================================
bundle:
  # Max transitive reference depth when scanning external files.
  # Prevents runaway traversal. Increase if deeply nested reference
  # chains are legitimate in your skill system.
  max_reference_depth: 25
  # Claude.ai consumer platform enforces 200-char description limit
  # (stricter than the 1024-char Agent Skills spec limit).
  # bundle.py fails if description exceeds this when targeting zip distribution.
  description_max_length: 200
  # Max directory levels to walk up when inferring the system root
  # from the skill path.  Prevents scanning to the filesystem root.
  infer_max_walk_depth: 5
  # Recognized consumer platform targets for bundling.
  # 'claude' enforces the description_max_length as an error;
  # other targets downgrade it to a warning.
  valid_targets:
    - claude
    - gemini
    - generic
  default_target: claude
  # Filesystem patterns excluded from the bundle archive.
  exclude_patterns:
    - .git
    - __pycache__
    - .DS_Store
    - Thumbs.db
    - Desktop.ini
    - $RECYCLE.BIN
    - "*.pyc"
    - "*.lnk"
